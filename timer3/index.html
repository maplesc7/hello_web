<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>機械式ウェブタイマー</title>
  <style>
    :root {
      --背景1: #0b1220;
      --背景2: #141e31;
      --背景3: #060a11;
      --金属明: #edf3ff;
      --金属中: #99a8bf;
      --金属暗: #445062;
      --金属影: rgba(0, 0, 0, 0.62);
      --発光色: #7fdcff;
      --発光強: #baf3ff;
      --消灯色: #142133;
      --警戒色: #ffd36f;
      --本文色: #f4f8ff;
      --補助色: #bdc9d7;
      --リング率: 1turn;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Hiragino Sans", "Yu Gothic UI", sans-serif;
      color: var(--本文色);
      background:
        radial-gradient(circle at top, rgba(127, 220, 255, 0.22), transparent 28%),
        linear-gradient(160deg, #182134 0%, #0f1725 48%, #04070c 100%);
      display: grid;
      place-items: center;
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      background:
        repeating-linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.02) 0 1px,
          transparent 1px 42px
        ),
        repeating-linear-gradient(
          0deg,
          rgba(255, 255, 255, 0.015) 0 1px,
          transparent 1px 42px
        );
      opacity: 0.22;
    }

    body::after {
      background:
        radial-gradient(circle at center, transparent 55%, rgba(0, 0, 0, 0.42) 100%);
    }

    .アプリ {
      width: min(94vw, 1040px);
      padding: clamp(20px, 4vw, 40px);
      display: grid;
      grid-template-columns: minmax(300px, 1.1fr) minmax(260px, 0.9fr);
      gap: clamp(20px, 4vw, 36px);
      align-items: center;
    }

    .計器盤 {
      position: relative;
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      display: grid;
      place-items: center;
      padding: clamp(18px, 3vw, 28px);
      background:
        radial-gradient(circle at 30% 25%, rgba(255, 255, 255, 0.2), transparent 18%),
        linear-gradient(145deg, #dbe6f4 0%, #7e8ba3 18%, #414c5e 48%, #dfe9f6 100%);
      box-shadow:
        0 28px 48px rgba(0, 0, 0, 0.48),
        inset 0 4px 10px rgba(255, 255, 255, 0.55),
        inset 0 -8px 14px rgba(0, 0, 0, 0.4);
    }

    .計器盤::before {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 50%;
      background:
        linear-gradient(145deg, #f9fdff 0%, #b8c4d5 18%, #495567 44%, #cbd4e3 80%, #f6fbff 100%);
      box-shadow:
        inset 0 2px 4px rgba(255, 255, 255, 0.55),
        inset 0 -4px 8px rgba(0, 0, 0, 0.45);
    }

    .リング {
      position: absolute;
      inset: clamp(22px, 3.8vw, 36px);
      border-radius: 50%;
      background:
        conic-gradient(
          var(--消灯色) 0turn calc(1turn - var(--リング率)),
          var(--発光色) calc(1turn - var(--リング率)) 1turn
        );
      box-shadow:
        0 0 0 2px rgba(255, 255, 255, 0.08),
        0 0 18px rgba(127, 220, 255, 0.25),
        inset 0 0 18px rgba(255, 255, 255, 0.16);
      transition: background 0.12s linear, box-shadow 0.2s ease;
      isolation: isolate;
    }

    .リング::before,
    .リング::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
    }

    .リング::before {
      background:
        repeating-conic-gradient(
          rgba(255, 255, 255, 0.22) 0deg 1.1deg,
          transparent 1.1deg 5deg
        );
      mix-blend-mode: screen;
      opacity: 0.45;
    }

    .リング::after {
      inset: clamp(22px, 4vw, 34px);
      background:
        radial-gradient(circle at 50% 38%, rgba(255, 255, 255, 0.18), transparent 38%),
        radial-gradient(circle, #142033 0%, #0d1320 64%, #06090f 100%);
      box-shadow:
        inset 0 10px 18px rgba(255, 255, 255, 0.08),
        inset 0 -14px 22px rgba(0, 0, 0, 0.62);
    }

    .目盛り {
      position: absolute;
      inset: clamp(34px, 5vw, 50px);
      border-radius: 50%;
      pointer-events: none;
      z-index: 2;
      background:
        repeating-conic-gradient(
          from -90deg,
          rgba(247, 252, 255, 0.95) 0deg 1.4deg,
          transparent 1.4deg 6deg
        );
      -webkit-mask:
        radial-gradient(circle, transparent 0 72%, #000 72% 75%, transparent 75%);
      mask:
        radial-gradient(circle, transparent 0 72%, #000 72% 75%, transparent 75%);
      opacity: 0.75;
    }

    .中心盤 {
      position: relative;
      z-index: 3;
      width: min(60%, 360px);
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      padding: clamp(18px, 3vw, 24px);
      display: grid;
      place-items: center;
      text-align: center;
      background:
        radial-gradient(circle at 50% 22%, rgba(255, 255, 255, 0.2), transparent 30%),
        linear-gradient(180deg, rgba(223, 236, 248, 0.14), rgba(9, 14, 23, 0.88));
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow:
        inset 0 2px 6px rgba(255, 255, 255, 0.16),
        inset 0 -8px 16px rgba(0, 0, 0, 0.56),
        0 16px 30px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(6px);
    }

    .中心盤::before {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: inset 0 0 30px rgba(127, 220, 255, 0.05);
    }

    .ラベル {
      margin: 0 0 10px;
      font-size: clamp(0.76rem, 1.8vw, 0.95rem);
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--補助色);
    }

    .時間表示 {
      margin: 0;
      font-size: clamp(2.2rem, 7vw, 4.9rem);
      font-weight: 700;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.06em;
      text-shadow:
        0 0 18px rgba(127, 220, 255, 0.28),
        0 2px 5px rgba(0, 0, 0, 0.65);
    }

    .状態表示 {
      margin-top: 10px;
      min-height: 1.4em;
      font-size: clamp(0.86rem, 1.9vw, 1rem);
      color: var(--警戒色);
      letter-spacing: 0.08em;
    }

    .設定盤 {
      position: relative;
      padding: clamp(20px, 4vw, 28px);
      border-radius: 28px;
      background:
        linear-gradient(160deg, rgba(246, 250, 255, 0.12), rgba(44, 57, 77, 0.78)),
        linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(5, 9, 15, 0.8));
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.2),
        inset 0 -1px 0 rgba(0, 0, 0, 0.4),
        0 24px 44px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(8px);
    }

    .設定盤::before {
      content: "";
      position: absolute;
      inset: 16px;
      border-radius: 22px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      pointer-events: none;
    }

    .設定見出し {
      margin: 0 0 18px;
      font-size: 1.08rem;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .入力群 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .入力項目 {
      display: grid;
      gap: 8px;
    }

    .入力項目 span {
      font-size: 0.82rem;
      color: var(--補助色);
      letter-spacing: 0.08em;
    }

    .時間入力 {
      width: 100%;
      padding: 14px 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.12), rgba(6, 10, 16, 0.56));
      color: var(--本文色);
      font-size: 1.15rem;
      font-weight: 700;
      text-align: center;
      box-shadow:
        inset 0 2px 4px rgba(255, 255, 255, 0.1),
        inset 0 -5px 8px rgba(0, 0, 0, 0.42);
    }

    .時間入力:focus {
      outline: 2px solid rgba(127, 220, 255, 0.65);
      outline-offset: 2px;
    }

    .時間入力:disabled {
      opacity: 0.58;
      cursor: not-allowed;
    }

    .プリセット群,
    .操作群 {
      display: grid;
      gap: 10px;
    }

    .プリセット群 {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      margin-bottom: 18px;
    }

    .操作群 {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .ボタン {
      appearance: none;
      border: 0;
      border-radius: 14px;
      padding: 14px 12px;
      color: #f6fbff;
      font-size: 0.96rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.24), rgba(0, 0, 0, 0.18)),
        linear-gradient(145deg, #4b586b, #1c2431);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.3),
        inset 0 -2px 4px rgba(0, 0, 0, 0.42),
        0 10px 18px rgba(0, 0, 0, 0.3);
      transition: transform 0.16s ease, box-shadow 0.16s ease, filter 0.16s ease;
    }

    .ボタン:hover {
      filter: brightness(1.08);
      transform: translateY(-1px);
    }

    .ボタン:active {
      transform: translateY(1px);
      box-shadow:
        inset 0 3px 5px rgba(0, 0, 0, 0.38),
        0 5px 10px rgba(0, 0, 0, 0.24);
    }

    .ボタン:focus-visible {
      outline: 2px solid rgba(127, 220, 255, 0.78);
      outline-offset: 3px;
    }

    .ボタン[data-種類="主"] {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.24), rgba(0, 0, 0, 0.2)),
        linear-gradient(145deg, #60b8d9, #1b4e70);
    }

    .ボタン[data-種類="警戒"] {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.22), rgba(0, 0, 0, 0.22)),
        linear-gradient(145deg, #d3b36d, #70551b);
      color: #fff7df;
    }

    .補助文 {
      margin: 16px 2px 0;
      color: var(--補助色);
      font-size: 0.86rem;
      line-height: 1.6;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 860px) {
      .アプリ {
        grid-template-columns: 1fr;
        max-width: 620px;
      }

      .中心盤 {
        width: min(64%, 340px);
      }
    }

    @media (max-width: 520px) {
      .アプリ {
        width: min(96vw, 520px);
        padding: 14px;
        gap: 16px;
      }

      .計器盤 {
        padding: 16px;
      }

      .リング {
        inset: 18px;
      }

      .リング::after {
        inset: 19px;
      }

      .目盛り {
        inset: 28px;
      }

      .中心盤 {
        width: 66%;
        padding: 16px;
      }

      .入力群,
      .プリセット群,
      .操作群 {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="アプリ">
    <section class="計器盤" aria-label="残り時間の表示">
      <div class="リング" id="リング" aria-hidden="true"></div>
      <div class="目盛り" aria-hidden="true"></div>
      <section class="中心盤">
        <p class="ラベル">MECHANICAL TIMER</p>
        <p class="時間表示" id="時間表示" aria-live="polite">0:30:00</p>
        <p class="状態表示" id="状態表示">待機中</p>
      </section>
    </section>

    <section class="設定盤" aria-labelledby="設定見出し">
      <h1 class="設定見出し" id="設定見出し">時間設定</h1>

      <div class="入力群">
        <label class="入力項目">
          <span>時</span>
          <input class="時間入力" id="時入力" type="number" min="0" max="99" inputmode="numeric" value="0">
        </label>
        <label class="入力項目">
          <span>分</span>
          <input class="時間入力" id="分入力" type="number" min="0" max="59" inputmode="numeric" value="30">
        </label>
        <label class="入力項目">
          <span>秒</span>
          <input class="時間入力" id="秒入力" type="number" min="0" max="59" inputmode="numeric" value="0">
        </label>
      </div>

      <div class="プリセット群" aria-label="プリセット時間">
        <button class="ボタン" type="button" data-プリセット="300">5分</button>
        <button class="ボタン" type="button" data-プリセット="900">15分</button>
        <button class="ボタン" type="button" data-プリセット="1800">30分</button>
      </div>

      <div class="操作群" aria-label="タイマー操作">
        <button class="ボタン" id="開始ボタン" type="button" data-種類="主">開始</button>
        <button class="ボタン" id="一時停止ボタン" type="button" data-種類="警戒">一時停止</button>
        <button class="ボタン" id="リセットボタン" type="button">リセット</button>
      </div>

      <p class="補助文">
        外周リングは12時位置から時計回りに残量を示す。動作中は入力を固定し、停止中に再設定できる。
      </p>
      <p class="sr-only" id="操作説明">
        時、分、秒を設定して開始を押すと、残り時間に合わせて外周リングが減っていく。
      </p>
    </section>
  </main>

  <script>
    const 時入力 = document.getElementById("時入力");
    const 分入力 = document.getElementById("分入力");
    const 秒入力 = document.getElementById("秒入力");
    const 時間表示 = document.getElementById("時間表示");
    const 状態表示 = document.getElementById("状態表示");
    const リング = document.getElementById("リング");
    const 開始ボタン = document.getElementById("開始ボタン");
    const 一時停止ボタン = document.getElementById("一時停止ボタン");
    const リセットボタン = document.getElementById("リセットボタン");
    const プリセットボタン群 = document.querySelectorAll("[data-プリセット]");

    const 初期秒数 = 30 * 60;
    let 設定秒数 = 初期秒数;
    let 残りミリ秒 = 初期秒数 * 1000;
    let 終了予定時刻 = null;
    let 動作中 = false;
    let 描画番号 = null;

    function 数値を整える(値, 最小, 最大) {
      const 数値 = Number.isFinite(値) ? Math.trunc(値) : 0;
      return Math.min(最大, Math.max(最小, 数値));
    }

    function 表示用に整形(合計秒数) {
      const 安全秒数 = Math.max(0, Math.ceil(合計秒数));
      const 時 = Math.floor(安全秒数 / 3600);
      const 分 = Math.floor((安全秒数 % 3600) / 60);
      const 秒 = 安全秒数 % 60;
      return `${時}:${String(分).padStart(2, "0")}:${String(秒).padStart(2, "0")}`;
    }

    function リングを更新(比率) {
      const 正規化比率 = Math.min(1, Math.max(0, 比率));
      リング.style.setProperty("--リング率", `${正規化比率}turn`);

      const 影強度 = 0.18 + 正規化比率 * 0.2;
      リング.style.boxShadow = `
        0 0 0 2px rgba(255, 255, 255, 0.08),
        0 0 18px rgba(127, 220, 255, ${影強度}),
        inset 0 0 18px rgba(255, 255, 255, 0.16)
      `;
    }

    function 入力秒数を取得() {
      const 時 = 数値を整える(Number(時入力.value), 0, 99);
      const 分 = 数値を整える(Number(分入力.value), 0, 59);
      const 秒 = 数値を整える(Number(秒入力.value), 0, 59);

      時入力.value = String(時);
      分入力.value = String(分);
      秒入力.value = String(秒);

      return 時 * 3600 + 分 * 60 + 秒;
    }

    function 秒数を入力欄へ反映(合計秒数) {
      const 安全秒数 = Math.max(0, Math.trunc(合計秒数));
      const 時 = Math.floor(安全秒数 / 3600);
      const 分 = Math.floor((安全秒数 % 3600) / 60);
      const 秒 = 安全秒数 % 60;

      時入力.value = String(時);
      分入力.value = String(分);
      秒入力.value = String(秒);
    }

    function 入力ロックを切り替え(無効化) {
      [時入力, 分入力, 秒入力].forEach((要素) => {
        要素.disabled = 無効化;
      });

      プリセットボタン群.forEach((要素) => {
        要素.disabled = 無効化;
      });
    }

    function 表示を更新() {
      時間表示.textContent = 表示用に整形(残りミリ秒 / 1000);
      const 比率 = 設定秒数 > 0 ? 残りミリ秒 / (設定秒数 * 1000) : 0;
      リングを更新(比率);
    }

    function 停止する() {
      動作中 = false;
      終了予定時刻 = null;
      if (描画番号 !== null) {
        cancelAnimationFrame(描画番号);
        描画番号 = null;
      }
      入力ロックを切り替え(false);
    }

    function 完了にする() {
      残りミリ秒 = 0;
      表示を更新();
      状態表示.textContent = "時間切れ";
      停止する();
    }

    function 描画する() {
      if (!動作中 || 終了予定時刻 === null) {
        return;
      }

      残りミリ秒 = Math.max(0, 終了予定時刻 - performance.now());
      表示を更新();

      if (残りミリ秒 <= 0) {
        完了にする();
        return;
      }

      描画番号 = requestAnimationFrame(描画する);
    }

    function 開始する() {
      if (動作中) {
        return;
      }

      if (残りミリ秒 <= 0) {
        設定秒数 = 入力秒数を取得();
        残りミリ秒 = 設定秒数 * 1000;
      }

      if (設定秒数 <= 0 || 残りミリ秒 <= 0) {
        状態表示.textContent = "1秒以上を設定";
        表示を更新();
        return;
      }

      動作中 = true;
      終了予定時刻 = performance.now() + 残りミリ秒;
      状態表示.textContent = "計測中";
      入力ロックを切り替え(true);
      描画番号 = requestAnimationFrame(描画する);
    }

    function 一時停止する() {
      if (!動作中) {
        return;
      }

      残りミリ秒 = Math.max(0, 終了予定時刻 - performance.now());
      停止する();
      状態表示.textContent = 残りミリ秒 > 0 ? "一時停止中" : "待機中";
      表示を更新();
    }

    function リセットする() {
      停止する();
      残りミリ秒 = 設定秒数 * 1000;
      状態表示.textContent = "待機中";
      秒数を入力欄へ反映(設定秒数);
      表示を更新();
    }

    function 設定を確定する() {
      if (動作中) {
        return;
      }

      設定秒数 = 入力秒数を取得();
      残りミリ秒 = 設定秒数 * 1000;
      状態表示.textContent = 設定秒数 > 0 ? "待機中" : "1秒以上を設定";
      表示を更新();
    }

    [時入力, 分入力, 秒入力].forEach((要素) => {
      要素.addEventListener("change", 設定を確定する);
      要素.addEventListener("blur", 設定を確定する);
    });

    プリセットボタン群.forEach((ボタン) => {
      ボタン.addEventListener("click", () => {
        if (動作中) {
          return;
        }

        const 秒数 = Number(ボタン.dataset.プリセット || "0");
        設定秒数 = 秒数;
        残りミリ秒 = 秒数 * 1000;
        秒数を入力欄へ反映(秒数);
        状態表示.textContent = "待機中";
        表示を更新();
      });
    });

    開始ボタン.addEventListener("click", 開始する);
    一時停止ボタン.addEventListener("click", 一時停止する);
    リセットボタン.addEventListener("click", リセットする);

    秒数を入力欄へ反映(設定秒数);
    表示を更新();
  </script>
</body>
</html>
