<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Flow Log</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230f172a'/%3E%3Crect x='8' y='8' width='48' height='48' rx='11' fill='%2313274c' stroke='%237dd3fc' stroke-width='2.5'/%3E%3Cpath d='M20 33l8 8 16-19' stroke='%235be7ff' stroke-width='6' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" />
  <style>
    :root {
      --task-ratio: 50;
      --bg: #f7f7f8;
      --bg-grad-1: #fdfdfe;
      --bg-grad-2: #edf0f6;
      --blob-1: rgba(182, 193, 214, 0.42);
      --blob-2: rgba(149, 160, 186, 0.3);
      --blob-shape-1: radial-gradient(circle at 30% 30%, var(--blob-1), transparent 68%);
      --blob-shape-2: radial-gradient(circle at 40% 40%, var(--blob-2), transparent 70%);
      --panel: rgba(255, 255, 255, 0.42);
      --panel-strong: rgba(255, 255, 255, 0.56);
      --text: #1a1a1a;
      --muted: #6b7280;
      --placeholder: rgba(75, 85, 99, 0.92);
      --line: rgba(255, 255, 255, 0.48);
      --btn-bg: rgba(20, 27, 42, 0.72);
      --btn-text: #ffffff;
      --accent: #2563eb;
      --accent-2: #7bffb6;
      --overlay: rgba(9, 11, 19, 0.35);
      --glass-shadow: 0 18px 36px rgba(17, 24, 39, 0.18);
      --glass-inset: inset 0 1px 0 rgba(255, 255, 255, 0.45);
      --btn-glow: 0 10px 24px rgba(37, 99, 235, 0.28);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100dvh;
      background: var(--bg);
      background-image: linear-gradient(145deg, var(--bg-grad-1), var(--bg-grad-2));
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      position: relative;
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      filter: blur(12px);
    }

    body::before {
      width: min(44vw, 540px);
      aspect-ratio: 1;
      left: -10vw;
      top: 52vh;
      background: var(--blob-shape-1);
    }

    body::after {
      width: min(40vw, 500px);
      aspect-ratio: 1;
      right: -8vw;
      top: 8vh;
      background: var(--blob-shape-2);
    }

    .app {
      width: 100%;
      max-width: none;
      margin: 0;
      padding: 12px 18px;
      position: relative;
      z-index: 1;
      height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 10px;
    }

    .toolbar {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
    }

    .clock {
      border: 1px solid var(--line);
      background: linear-gradient(135deg, var(--panel-strong), var(--panel));
      color: var(--text);
      border-radius: 8px;
      min-width: 94px;
      height: 36px;
      padding: 0 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 0.04em;
      font-variant-numeric: tabular-nums;
      backdrop-filter: blur(16px) saturate(130%);
      -webkit-backdrop-filter: blur(16px) saturate(130%);
      box-shadow: var(--glass-shadow), var(--glass-inset);
    }

    .gear {
      border: 1px solid var(--line);
      background: linear-gradient(135deg, var(--panel-strong), var(--panel));
      color: var(--text);
      border-radius: 8px;
      min-width: 36px;
      padding: 0 10px;
      height: 36px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      backdrop-filter: blur(16px) saturate(130%);
      -webkit-backdrop-filter: blur(16px) saturate(130%);
      box-shadow: var(--glass-shadow), var(--glass-inset);
    }

    .clear {
      border: 1px solid var(--line);
      background: linear-gradient(135deg, var(--panel-strong), var(--panel));
      color: var(--text);
      border-radius: 8px;
      height: 38px;
      padding: 0 14px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      backdrop-filter: blur(14px) saturate(130%);
      -webkit-backdrop-filter: blur(14px) saturate(130%);
      box-shadow: var(--glass-shadow), var(--glass-inset);
      transition: transform 0.25s ease;
    }

    .clear:hover {
      transform: translateY(-2px);
    }

    .export {
      border: 1px solid transparent;
      background: linear-gradient(140deg, var(--accent), var(--accent-2));
      color: var(--btn-text);
      border-radius: 8px;
      height: 38px;
      padding: 0 14px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      backdrop-filter: blur(14px) saturate(130%);
      -webkit-backdrop-filter: blur(14px) saturate(130%);
      box-shadow: var(--btn-glow);
      transition: transform 0.25s ease;
    }

    .export:hover {
      transform: translateY(-2px);
    }

    .work {
      min-height: 0;
      display: grid;
      grid-template-rows: minmax(120px, calc(var(--task-ratio) * 1%)) 14px minmax(120px, 1fr);
      gap: 0;
    }

    .task-pane,
    .memo-pane {
      min-height: 0;
    }

    .list {
      border: 1px solid var(--line);
      background: linear-gradient(135deg, var(--panel-strong), var(--panel));
      border-radius: 10px;
      padding: 8px 10px;
      height: 100%;
      overflow-y: auto;
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);
      box-shadow: var(--glass-shadow), var(--glass-inset);
    }

    .splitter {
      cursor: ns-resize;
      display: grid;
      place-items: center;
      user-select: none;
      touch-action: none;
    }

    .splitter::before {
      content: "";
      width: 100%;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, var(--line), transparent);
    }

    .memo {
      width: 100%;
      height: 100%;
      resize: none;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: linear-gradient(135deg, var(--panel-strong), var(--panel));
      color: var(--text);
      padding: 10px 12px;
      font: inherit;
      line-height: 1.6;
      overflow-y: auto;
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);
      box-shadow: var(--glass-shadow), var(--glass-inset);
    }

    .memo::placeholder {
      color: var(--muted);
    }

    input::placeholder {
      color: var(--placeholder);
      opacity: 1;
    }

    .row {
      display: flex;
      align-items: baseline;
      min-height: 30px;
      line-height: 1.6;
      white-space: pre;
      width: 100%;
    }

    .indent {
      color: var(--text);
      user-select: none;
    }

    .status {
      cursor: pointer;
      user-select: none;
    }

    .title {
      flex: 1;
      min-width: 1ch;
      outline: none;
      display: inline-block;
    }

    .title:empty::before {
      content: "";
      display: inline-block;
      width: 1ch;
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      background: var(--overlay);
      z-index: 4;
    }

    .modal.open { display: grid; }

    .panel {
      width: 420px;
      max-width: calc(100vw - 32px);
      border: 1px solid var(--line);
      background: linear-gradient(135deg, var(--panel-strong), var(--panel));
      border-radius: 12px;
      padding: 14px;
      backdrop-filter: blur(20px) saturate(140%);
      -webkit-backdrop-filter: blur(20px) saturate(140%);
      box-shadow: var(--glass-shadow), var(--glass-inset);
    }

    .head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .close {
      border: 1px solid var(--line);
      background: linear-gradient(135deg, var(--panel-strong), var(--panel));
      color: var(--text);
      border-radius: 8px;
      width: 30px;
      height: 30px;
      cursor: pointer;
      font: inherit;
      backdrop-filter: blur(12px) saturate(130%);
      -webkit-backdrop-filter: blur(12px) saturate(130%);
    }

    .field { margin-bottom: 12px; }

    .label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    select, input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(135deg, var(--panel-strong), var(--panel));
      color: var(--text);
      padding: 8px 10px;
      font: inherit;
      backdrop-filter: blur(10px) saturate(130%);
      -webkit-backdrop-filter: blur(10px) saturate(130%);
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="toolbar">
      <button class="export" id="export" type="button">全出力</button>
      <button class="clear" id="clear" type="button">クリア</button>
      <button class="gear" id="gear" type="button" aria-label="設定">設定</button>
      <span class="clock" id="clock" aria-live="polite" aria-label="現在時刻">--:--</span>
    </div>

    <div class="work" id="work">
      <div class="task-pane">
        <div class="list" id="list"></div>
      </div>
      <div class="splitter" id="splitter" role="separator" aria-label="タスクとメモの高さを調整" aria-orientation="horizontal"></div>
      <div class="memo-pane">
        <textarea class="memo" id="memo" placeholder="メモ専用エリアです。ここは時刻や完了状態の管理を行わず、自由に記録できます。"></textarea>
      </div>
    </div>
  </div>

  <div class="modal" id="modal" aria-hidden="true">
    <div class="panel">
      <div class="head">
        <strong>設定</strong>
        <button class="close" id="close" type="button">×</button>
      </div>
      <div class="field">
        <label class="label" for="fontPreset">フォント</label>
        <select id="fontPreset">
          <option value="ui-monospace, SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace">システム等幅</option>
          <option value="Consolas, 'Courier New', monospace">Consolas</option>
          <option value="Menlo, Monaco, monospace">Menlo</option>
          <option value="custom">カスタム</option>
        </select>
      </div>
      <div class="field">
        <label class="label" for="fontCustom">カスタム font-family</label>
        <input id="fontCustom" type="text" placeholder="例: 'Fira Code', monospace" />
      </div>
      <div class="field">
        <label class="label" for="colorMode">カラーモード</label>
        <select id="colorMode">
          <option value="オーロラガラス">オーロラガラス</option>
          <option value="ミストフォグ">ミストフォグ</option>
          <option value="ライト">ライト</option>
          <option value="ダーク">ダーク</option>
          <option value="アイスバーグライト">アイスバーグライト</option>
          <option value="アイスバーグダーク">アイスバーグダーク</option>
          <option value="スチールライト">スチールライト</option>
          <option value="スチールダーク">スチールダーク</option>
        </select>
      </div>
    </div>
  </div>

    function hhmmNow() {
      const d = new Date();
      const h = String(d.getHours()).padStart(2, '0');
      const m = String(d.getMinutes()).padStart(2, '0');
      return h + m;
    }

    function clockTextNow() {
      const d = new Date();
      const h = String(d.getHours()).padStart(2, '0');
      const m = String(d.getMinutes()).padStart(2, '0');
      return h + ':' + m;
    }

    function renderClock() {
      clockEl.textContent = clockTextNow();
    }

    function rowPrefix(row) {
      const start = row.dataset.start;
      if (row.dataset.done === '1') {
        return '✅' + start + '-' + row.dataset.end + FULL_WIDTH_SPACE;
      }
      return '🟨' + start + '-' + FULL_WIDTH_SPACE;
    }

    function renderRow(row) {
      row.querySelector('.indent').textContent = FULL_WIDTH_SPACE.repeat(Number(row.dataset.indent || 0));
      row.querySelector('.status').textContent = rowPrefix(row);
    }

    function placeCaretEnd(el) {
      el.focus();
      const range = document.createRange();
      range.selectNodeContents(el);
      range.collapse(false);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    }

    function caretOffset(el) {
      const sel = window.getSelection();
      if (!sel || sel.rangeCount === 0) return (el.textContent || '').length;
      const range = sel.getRangeAt(0);
      if (!el.contains(range.startContainer)) return (el.textContent || '').length;
      const pre = range.cloneRange();
      pre.selectNodeContents(el);
      pre.setEnd(range.startContainer, range.startOffset);
      return pre.toString().length;
    }

    function placeCaretOffset(el, offset) {
      el.focus();
      const text = el.textContent || '';
      const target = Math.max(0, Math.min(offset, text.length));
      const range = document.createRange();
      range.selectNodeContents(el);

      const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT);
      let node = null;
      let remaining = target;
      while ((node = walker.nextNode())) {
        const len = node.textContent.length;
        if (remaining <= len) {
          range.setStart(node, remaining);
          range.collapse(true);
          const sel = window.getSelection();
          sel.removeAllRanges();
          sel.addRange(range);
          return;
        }
        remaining -= len;
      }

      range.collapse(false);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    }

    function selectionOffsetsInContentEditable(el) {
      const textLen = (el.textContent || '').length;
      const sel = window.getSelection();
      if (!sel || sel.rangeCount === 0) return { start: textLen, end: textLen };
      const range = sel.getRangeAt(0);
      if (!el.contains(range.startContainer) || !el.contains(range.endContainer)) {
        return { start: textLen, end: textLen };
      }
      const preStart = range.cloneRange();
      preStart.selectNodeContents(el);
      preStart.setEnd(range.startContainer, range.startOffset);
      const preEnd = range.cloneRange();
      preEnd.selectNodeContents(el);
      preEnd.setEnd(range.endContainer, range.endOffset);
      return { start: preStart.toString().length, end: preEnd.toString().length };
    }

    function textPointAt(el, offset) {
      const text = el.textContent || '';
      const target = Math.max(0, Math.min(offset, text.length));
      const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT);
      let node = null;
      let remaining = target;
      let last = null;
      while ((node = walker.nextNode())) {
        last = node;
        const len = node.textContent.length;
        if (remaining <= len) return { node, offset: remaining };
        remaining -= len;
      }
      if (last) return { node: last, offset: last.textContent.length };
      return { node: el, offset: 0 };
    }

    function placeSelectionOffsets(el, start, end) {
      const text = el.textContent || '';
      const s = Math.max(0, Math.min(start, text.length));
      const e = Math.max(0, Math.min(end, text.length));
      if (s === e) {
        placeCaretOffset(el, s);
        return;
      }
      el.focus();
      const p1 = textPointAt(el, s);
      const p2 = textPointAt(el, e);
      const range = document.createRange();
      range.setStart(p1.node, p1.offset);
      range.setEnd(p2.node, p2.offset);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    }

    function createRow(afterRow, focusTitle, indentLevel = 0, state = null) {
      const row = document.createElement('div');
      row.className = 'row';
      row.dataset.start = typeof state?.start === 'string' ? state.start : hhmmNow();
      row.dataset.end = typeof state?.end === 'string' ? state.end : '';
      row.dataset.done = state?.done === '1' ? '1' : '0';
      row.dataset.indent = String(Number.isFinite(state?.indent) ? Math.max(0, state.indent) : indentLevel);

      const indent = document.createElement('span');
      indent.className = 'indent';

      const status = document.createElement('span');
      status.className = 'status';

      const title = document.createElement('span');
      title.className = 'title';
      title.contentEditable = 'true';
      title.spellcheck = false;
      title.textContent = typeof state?.title === 'string' ? state.title : '';

      row.append(indent, status, title);
      if (afterRow && afterRow.parentNode === listEl) {
        afterRow.insertAdjacentElement('afterend', row);
      } else {
        listEl.appendChild(row);
      }

      renderRow(row);
      if (focusTitle) placeCaretEnd(title);
      return row;
    }

    function serializeRows() {
      return Array.from(listEl.querySelectorAll('.row')).map((row) => ({
        start: row.dataset.start || hhmmNow(),
        end: row.dataset.end || '',
        done: row.dataset.done === '1' ? '1' : '0',
        indent: Math.max(0, Number(row.dataset.indent || 0)),
        title: row.querySelector('.title')?.textContent || ''
      }));
    }

    function taskFocusState() {
      const active = document.activeElement;
      if (!active || !active.classList || !active.classList.contains('title')) return null;
      const row = active.closest('.row');
      if (!row) return null;
      const rows = Array.from(listEl.querySelectorAll('.row'));
      const rowIndex = rows.indexOf(row);
      if (rowIndex < 0) return null;
      const sel = selectionOffsetsInContentEditable(active);
      return { rowIndex, start: sel.start, end: sel.end };
    }

    function taskState() {
      return {
        rows: serializeRows(),
        focus: taskFocusState()
      };
    }

    function sameTaskState(a, b) {
      if (!a || !b) return false;
      return JSON.stringify(a) === JSON.stringify(b);
    }

    const TASK_HISTORY_LIMIT = 300;
    const HISTORY_GROUP_WINDOW_MS = 900;
    let taskUndoStack = [];
    let taskRedoStack = [];
    let taskApplyingHistory = false;
    let taskLastEditMeta = null;

    function resetTaskHistory() {
      taskUndoStack = [taskState()];
      taskRedoStack = [];
      taskLastEditMeta = null;
    }

    function pushTaskUndoState(state, options = {}) {
      if (taskApplyingHistory) return;
      const last = taskUndoStack[taskUndoStack.length - 1];
      if (!sameTaskState(last, state)) taskUndoStack.push(state);
      if (taskUndoStack.length > TASK_HISTORY_LIMIT) taskUndoStack.shift();
      taskRedoStack = [];
      if (!options.keepGroup) taskLastEditMeta = null;
    }

    function taskBeforeInputMeta(title, inputType) {
      const row = title?.closest('.row');
      if (!row) return null;
      const rows = Array.from(listEl.querySelectorAll('.row'));
      const rowIndex = rows.indexOf(row);
      if (rowIndex < 0) return null;
      const sel = selectionOffsetsInContentEditable(title);
      return {
        time: Date.now(),
        inputType,
        rowIndex,
        start: sel.start,
        end: sel.end
      };
    }

    function isGroupableInputType(inputType) {
      return inputType === 'insertText' || inputType === 'deleteContentBackward' || inputType === 'deleteContentForward';
    }

    function shouldPushTaskBoundary(meta) {
      if (!meta) return false;
      if (!isGroupableInputType(meta.inputType)) return true;
      if (!taskLastEditMeta) return true;
      if (!isGroupableInputType(taskLastEditMeta.inputType)) return true;
      if (meta.inputType !== taskLastEditMeta.inputType) return true;
      if (meta.rowIndex !== taskLastEditMeta.rowIndex) return true;
      if (meta.time - taskLastEditMeta.time > HISTORY_GROUP_WINDOW_MS) return true;
      if (meta.start !== meta.end) return true;
      if (taskLastEditMeta.start !== taskLastEditMeta.end) return true;
      return Math.abs(meta.start - taskLastEditMeta.start) > 1;
    }

    function restoreTaskFocus(focus) {
      if (!focus) return;
      const rows = Array.from(listEl.querySelectorAll('.row'));
      if (rows.length === 0) return;
      const idx = Math.max(0, Math.min(focus.rowIndex, rows.length - 1));
      const title = rows[idx].querySelector('.title');
      if (!title) return;
      placeSelectionOffsets(title, Number(focus.start || 0), Number(focus.end || 0));
    }

    function applyTaskState(state) {
      if (!state || !Array.isArray(state.rows)) return;
      taskApplyingHistory = true;
      taskLastEditMeta = null;
      listEl.innerHTML = '';
      if (state.rows.length === 0) {
        createRow(null, false);
      } else {
        for (const row of state.rows) createRow(null, false, 0, row);
      }
      restoreTaskFocus(state.focus);
      taskApplyingHistory = false;
      scheduleSaveContent();
    }

    function taskUndo() {
      const current = taskState();
      if (taskUndoStack.length === 0) return;
      let prev = taskUndoStack.pop();
      while (prev && sameTaskState(prev, current) && taskUndoStack.length > 0) {
        prev = taskUndoStack.pop();
      }
      if (!prev || sameTaskState(prev, current)) return;
      taskRedoStack.push(current);
      applyTaskState(prev);
    }

    function taskRedo() {
      const current = taskState();
      if (taskRedoStack.length === 0) return;
      const next = taskRedoStack.pop();
      if (!next || sameTaskState(next, current)) return;
      taskUndoStack.push(current);
      applyTaskState(next);
    }

    function isInitialEmptyState(rows, memoText) {
      if ((memoText || '') !== '') return false;
      if (!Array.isArray(rows) || rows.length !== 1) return false;
      const row = rows[0];
      return row.done === '0' && row.end === '' && row.indent === 0 && row.title === '';
    }

    function saveContentNow() {
      const rows = serializeRows();
      const memoText = memoEl.value || '';
      if (isInitialEmptyState(rows, memoText)) {
        try {
          localStorage.removeItem(CONTENT_KEY);
          hasUnsavedChanges = false;
        } catch (_) {}
        return;
      }

      const payload = {
        version: 1,
        savedAt: Date.now(),
        memo: memoText,
        rows
      };
      try {
        localStorage.setItem(CONTENT_KEY, JSON.stringify(payload));
        hasUnsavedChanges = false;
      } catch (_) {}
    }

    function scheduleSaveContent() {
      hasUnsavedChanges = true;
      if (saveTimer) clearTimeout(saveTimer);
      saveTimer = setTimeout(() => {
        saveTimer = null;
        saveContentNow();
      }, SAVE_DEBOUNCE_MS);
    }

    function clearSavedContent() {
      if (saveTimer) {
        clearTimeout(saveTimer);
        saveTimer = null;
      }
      try {
        localStorage.removeItem(CONTENT_KEY);
      } catch (_) {}
      hasUnsavedChanges = false;
    }

    function loadContent() {
      try {
        const raw = localStorage.getItem(CONTENT_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== 'object') return null;

        const savedAt = Number(parsed.savedAt);
        if (!Number.isFinite(savedAt)) return null;
        if (Date.now() - savedAt > CONTENT_TTL_MS) {
          localStorage.removeItem(CONTENT_KEY);
          return null;
        }

        const rows = Array.isArray(parsed.rows) ? parsed.rows : [];
        const normalizedRows = rows
          .map((r) => ({
            start: typeof r?.start === 'string' ? r.start : hhmmNow(),
            end: typeof r?.end === 'string' ? r.end : '',
            done: r?.done === '1' ? '1' : '0',
            indent: Math.max(0, Number(r?.indent || 0)),
            title: typeof r?.title === 'string' ? r.title : ''
          }));

        return {
          memo: typeof parsed.memo === 'string' ? parsed.memo : '',
          rows: normalizedRows
        };
      } catch (_) {
        return null;
      }
    }

    function resetTaskMemoToInitial() {
      listEl.innerHTML = '';
      memoEl.value = '';
      createRow(null, false);
      hasUnsavedChanges = false;
      resetTaskHistory();
      resetMemoHistory();
    }

    function restoreOrInitContent() {
      const loaded = loadContent();
      if (!loaded || loaded.rows.length === 0) {
        resetTaskMemoToInitial();
        return;
      }

      listEl.innerHTML = '';
      memoEl.value = loaded.memo;
      for (const row of loaded.rows) {
        createRow(null, false, 0, row);
      }
      hasUnsavedChanges = false;
      resetTaskHistory();
      resetMemoHistory();
    }

    function lineText(row) {
      const indent = FULL_WIDTH_SPACE.repeat(Number(row.dataset.indent || 0));
      const title = row.querySelector('.title').textContent || '';
      return indent + rowPrefix(row) + title;
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch (_) {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        ta.remove();
      }
    }

    function normalizeToCrlf(text) {
      return String(text || '').replace(/\r?\n/g, '\r\n');
    }

    function plainClipboardText(e) {
      const text = e.clipboardData?.getData('text/plain');
      return typeof text === 'string' ? text : '';
    }

    function insertPlainTextIntoContentEditable(el, text) {
      el.focus();
      const sel = window.getSelection();
      if (!sel || sel.rangeCount === 0) return;
      const range = sel.getRangeAt(0);
      range.deleteContents();
      const node = document.createTextNode(text);
      range.insertNode(node);
      range.setStartAfter(node);
      range.collapse(true);
      sel.removeAllRanges();
      sel.addRange(range);
    }

    function insertPlainTextIntoTextarea(el, text) {
      const start = el.selectionStart ?? el.value.length;
      const end = el.selectionEnd ?? el.value.length;
      const before = el.value.slice(0, start);
      const after = el.value.slice(end);
      el.value = before + text + after;
      const pos = start + text.length;
      el.setSelectionRange(pos, pos);
    }

    function memoState() {
      return {
        value: memoEl.value || '',
        start: memoEl.selectionStart ?? 0,
        end: memoEl.selectionEnd ?? 0
      };
    }

    function sameMemoState(a, b) {
      if (!a || !b) return false;
      return a.value === b.value && a.start === b.start && a.end === b.end;
    }

    const MEMO_HISTORY_LIMIT = 300;
    let memoUndoStack = [];
    let memoRedoStack = [];
    let memoApplyingHistory = false;
    let memoLastEditMeta = null;

    function resetMemoHistory() {
      memoUndoStack = [memoState()];
      memoRedoStack = [];
      memoLastEditMeta = null;
    }

    function pushMemoUndoState(state, options = {}) {
      const last = memoUndoStack[memoUndoStack.length - 1];
      if (!sameMemoState(last, state)) memoUndoStack.push(state);
      if (memoUndoStack.length > MEMO_HISTORY_LIMIT) memoUndoStack.shift();
      memoRedoStack = [];
      if (!options.keepGroup) memoLastEditMeta = null;
    }

    function memoBeforeInputMeta(inputType) {
      const state = memoState();
      return {
        time: Date.now(),
        inputType,
        start: state.start,
        end: state.end
      };
    }

    function shouldPushMemoBoundary(meta) {
      if (!meta) return false;
      if (!isGroupableInputType(meta.inputType)) return true;
      if (!memoLastEditMeta) return true;
      if (!isGroupableInputType(memoLastEditMeta.inputType)) return true;
      if (meta.inputType !== memoLastEditMeta.inputType) return true;
      if (meta.time - memoLastEditMeta.time > HISTORY_GROUP_WINDOW_MS) return true;
      if (meta.start !== meta.end) return true;
      if (memoLastEditMeta.start !== memoLastEditMeta.end) return true;
      return Math.abs(meta.start - memoLastEditMeta.start) > 1;
    }

    function applyMemoState(state) {
      if (!state) return;
      memoApplyingHistory = true;
      memoLastEditMeta = null;
      memoEl.value = state.value;
      memoEl.setSelectionRange(state.start, state.end);
      memoApplyingHistory = false;
      scheduleSaveContent();
    }

    function memoUndo() {
      const current = memoState();
      if (memoUndoStack.length === 0) return;
      let prev = memoUndoStack.pop();
      while (prev && sameMemoState(prev, current) && memoUndoStack.length > 0) {
        prev = memoUndoStack.pop();
      }
      if (!prev || sameMemoState(prev, current)) return;
      memoRedoStack.push(current);
      applyMemoState(prev);
    }

    function memoRedo() {
      const current = memoState();
      if (memoRedoStack.length === 0) return;
      const next = memoRedoStack.pop();
      if (!next || sameMemoState(next, current)) return;
      memoUndoStack.push(current);
      applyMemoState(next);
    }

    function toggleRowState(row) {
      if (!row) return;
      if (row.dataset.done === '1') {
        row.dataset.done = '0';
        row.dataset.end = '';
      } else {
        row.dataset.done = '1';
        row.dataset.end = hhmmNow();
      }
      renderRow(row);
      scheduleSaveContent();
    }

    function setTaskRatio(percent) {
      const clamped = Math.min(SPLIT_MAX, Math.max(SPLIT_MIN, percent));
      document.documentElement.style.setProperty('--task-ratio', String(clamped));
      splitterEl.setAttribute('aria-valuenow', String(Math.round(clamped)));
    }

    function currentTaskRatio() {
      const raw = getComputedStyle(document.documentElement).getPropertyValue('--task-ratio');
      const n = Number.parseFloat(raw);
      return Number.isFinite(n) ? n : 50;
    }

    function memoLineRangeAt(value, pos) {
      const idx = Math.max(0, Math.min(pos, value.length));
      const start = value.lastIndexOf('\n', Math.max(0, idx - 1)) + 1;
      const next = value.indexOf('\n', idx);
      const end = next === -1 ? value.length : next;
      return { start, end, text: value.slice(start, end) };
    }

    function isMemoClickRightOfLine(el, lineText, clientX) {
      const style = getComputedStyle(el);
      const rect = el.getBoundingClientRect();
      const borderLeft = Number.parseFloat(style.borderLeftWidth) || 0;
      const paddingLeft = Number.parseFloat(style.paddingLeft) || 0;
      const x = clientX - rect.left - borderLeft - paddingLeft + el.scrollLeft;
      const canvas = isMemoClickRightOfLine._canvas || (isMemoClickRightOfLine._canvas = document.createElement('canvas'));
      const ctx = canvas.getContext('2d');
      if (!ctx) return false;
      ctx.font = style.font;
      const width = ctx.measureText(lineText).width;
      return x >= width - 2;
    }

    function normalizeMemoCaretOnClick(clientX) {
      const start = memoEl.selectionStart;
      const end = memoEl.selectionEnd;
      if (start == null || end == null) return;
      if (start !== end) return;
      const value = memoEl.value || '';
      const line = memoLineRangeAt(value, start);

      if (line.text.length === 0) {
        memoEl.setSelectionRange(line.end, line.end);
        return;
      }

      if (isMemoClickRightOfLine(memoEl, line.text, clientX)) {
        memoEl.setSelectionRange(line.end, line.end);
      }
    }

    function initSplitResize() {
      let dragging = false;

      splitterEl.addEventListener('pointerdown', (e) => {
        dragging = true;
        splitterEl.setPointerCapture(e.pointerId);
      });

      splitterEl.addEventListener('pointermove', (e) => {
        if (!dragging) return;
        const rect = workEl.getBoundingClientRect();
        const usable = rect.height - splitterEl.offsetHeight;
        if (usable <= 0) return;
        const top = e.clientY - rect.top - splitterEl.offsetHeight / 2;
        setTaskRatio((top / usable) * 100);
      });

      splitterEl.addEventListener('pointerup', (e) => {
        dragging = false;
        splitterEl.releasePointerCapture(e.pointerId);
        saveSettings();
      });

      splitterEl.addEventListener('pointercancel', (e) => {
        dragging = false;
        if (splitterEl.hasPointerCapture(e.pointerId)) {
          splitterEl.releasePointerCapture(e.pointerId);
        }
        saveSettings();
      });
    }

    listEl.addEventListener('click', (e) => {
      const status = e.target.closest('.status');
      if (status) {
        pushTaskUndoState(taskState());
        toggleRowState(status.closest('.row'));
        return;
      }

      const title = e.target.closest('.title');
      if (title) {
        return;
      }

      const row = e.target.closest('.row');
      if (row) {
        placeCaretEnd(row.querySelector('.title'));
        return;
      }

      const last = listEl.querySelector('.row:last-child');
      if (last) placeCaretEnd(last.querySelector('.title'));
    });

    listEl.addEventListener('beforeinput', (e) => {
      const title = e.target.closest('.title');
      if (!title) return;
      if (taskApplyingHistory) return;
      const inputType = String(e.inputType || '');
      if (inputType === 'historyUndo' || inputType === 'historyRedo') return;
      const meta = taskBeforeInputMeta(title, inputType);
      if (shouldPushTaskBoundary(meta)) {
        pushTaskUndoState(taskState(), { keepGroup: true });
      }
      taskLastEditMeta = meta;
    });

    listEl.addEventListener('keydown', (e) => {
      const title = e.target.closest('.title');
      if (!title) return;
      const row = title.closest('.row');
      if (!row) return;

      if (e.ctrlKey && !e.altKey) {
        const key = String(e.key).toLowerCase();
        if (key === 'z' && !e.shiftKey) {
          e.preventDefault();
          taskUndo();
          return;
        }
        if (key === 'y' || (key === 'z' && e.shiftKey)) {
          e.preventDefault();
          taskRedo();
          return;
        }
      }

      if (e.altKey && String(e.key).toLowerCase() === 'c') {
        e.preventDefault();
        pushTaskUndoState(taskState());
        toggleRowState(row);
        return;
      }

      if (e.key === 'Enter') {
        e.preventDefault();
        pushTaskUndoState(taskState());
        createRow(row, true, Number(row.dataset.indent || 0));
        scheduleSaveContent();
        return;
      }

      if (e.key === 'ArrowLeft') {
        const offset = caretOffset(title);
        if (offset === 0) {
          const prev = row.previousElementSibling;
          if (prev && prev.classList.contains('row')) {
            e.preventDefault();
            placeCaretEnd(prev.querySelector('.title'));
          }
        }
        return;
      }

      if (e.key === 'ArrowRight') {
        const offset = caretOffset(title);
        const len = (title.textContent || '').length;
        if (offset >= len) {
          const next = row.nextElementSibling;
          if (next && next.classList.contains('row')) {
            e.preventDefault();
            placeCaretOffset(next.querySelector('.title'), 0);
          }
        }
        return;
      }

      if (e.key === 'ArrowUp') {
        const prev = row.previousElementSibling;
        if (prev && prev.classList.contains('row')) {
          e.preventDefault();
          const offset = caretOffset(title);
          placeCaretOffset(prev.querySelector('.title'), offset);
        }
        return;
      }

      if (e.key === 'ArrowDown') {
        const next = row.nextElementSibling;
        if (next && next.classList.contains('row')) {
          e.preventDefault();
          const offset = caretOffset(title);
          placeCaretOffset(next.querySelector('.title'), offset);
        }
        return;
      }

      if (e.key === 'Tab') {
        e.preventDefault();
        pushTaskUndoState(taskState());
        const n = Number(row.dataset.indent || 0);
        row.dataset.indent = String(e.shiftKey ? Math.max(0, n - 1) : n + 1);
        renderRow(row);
        scheduleSaveContent();
        return;
      }

      if (e.key === 'Backspace') {
        const text = title.textContent || '';
        if (text.length === 0) {
          e.preventDefault();
          pushTaskUndoState(taskState());
          const prev = row.previousElementSibling;
          row.remove();
          scheduleSaveContent();
          if (prev && prev.classList.contains('row')) {
            placeCaretEnd(prev.querySelector('.title'));
          }
        }
      }
    });

    listEl.addEventListener('input', (e) => {
      if (taskApplyingHistory) return;
      if (e.target.closest('.title')) scheduleSaveContent();
    });

    listEl.addEventListener('paste', (e) => {
      const title = e.target.closest('.title');
      if (!title) return;
      e.preventDefault();
      pushTaskUndoState(taskState());
      insertPlainTextIntoContentEditable(title, plainClipboardText(e));
      scheduleSaveContent();
    });

    memoEl.addEventListener('beforeinput', (e) => {
      if (memoApplyingHistory) return;
      const inputType = String(e.inputType || '');
      if (inputType === 'historyUndo' || inputType === 'historyRedo') return;
      const meta = memoBeforeInputMeta(inputType);
      if (shouldPushMemoBoundary(meta)) {
        pushMemoUndoState(memoState(), { keepGroup: true });
      }
      memoLastEditMeta = meta;
    });

    memoEl.addEventListener('keydown', (e) => {
      if (!e.ctrlKey || e.altKey) return;
      const key = String(e.key).toLowerCase();
      if (key === 'z' && !e.shiftKey) {
        e.preventDefault();
        memoUndo();
        return;
      }
      if (key === 'y' || (key === 'z' && e.shiftKey)) {
        e.preventDefault();
        memoRedo();
      }
    });

    memoEl.addEventListener('input', () => {
      if (memoApplyingHistory) return;
      scheduleSaveContent();
    });

    memoEl.addEventListener('paste', (e) => {
      e.preventDefault();
      pushMemoUndoState(memoState());
      insertPlainTextIntoTextarea(memoEl, plainClipboardText(e));
      scheduleSaveContent();
    });

    let memoPointerStartX = 0;
    let memoPointerStartY = 0;
    let memoPointerMoved = false;
    memoEl.addEventListener('pointerdown', (e) => {
      memoPointerStartX = e.clientX;
      memoPointerStartY = e.clientY;
      memoPointerMoved = false;
    });
    memoEl.addEventListener('pointermove', (e) => {
      if (memoPointerMoved) return;
      const dx = e.clientX - memoPointerStartX;
      const dy = e.clientY - memoPointerStartY;
      if ((dx * dx + dy * dy) > 9) memoPointerMoved = true;
    });
    memoEl.addEventListener('pointerup', (e) => {
      if (memoPointerMoved) return;
      requestAnimationFrame(() => {
        normalizeMemoCaretOnClick(e.clientX);
      });
    });

    exportBtn.addEventListener('click', async () => {
      const rows = Array.from(listEl.querySelectorAll('.row'));
      const out = normalizeToCrlf(rows.map(lineText).join('\n'));
      await copyText(out);
      listEl.innerHTML = '';
      createRow(null, false);
      scheduleSaveContent();
    });

    clearBtn.addEventListener('click', () => {
      clearSavedContent();
      resetTaskMemoToInitial();
    });

    function applyTheme(mode) {
      const vars = THEMES[mode] || THEMES.オーロラガラス;
      for (const [k, v] of Object.entries(vars)) {
        document.documentElement.style.setProperty(k, v);
      }
    }

    function applyFont() {
      const preset = fontPresetEl.value;
      const font = preset === 'custom'
        ? (fontCustomEl.value.trim() || "ui-monospace, SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace")
        : preset;
      document.body.style.fontFamily = font;
    }

    function saveSettings() {
      const settings = {
        colorMode: colorModeEl.value,
        fontPreset: fontPresetEl.value,
        fontCustom: fontCustomEl.value,
        taskRatio: currentTaskRatio()
      };
      try {
        localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
      } catch (_) {}
    }

    function loadSettings() {
      const defaults = {
        colorMode: 'オーロラガラス',
        fontPreset: "ui-monospace, SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace",
        fontCustom: '',
        taskRatio: 50
      };
      try {
        const raw = localStorage.getItem(SETTINGS_KEY);
        if (!raw) return defaults;
        const parsed = JSON.parse(raw);
        const taskRatio = Number.parseFloat(parsed.taskRatio);
        return {
          colorMode: typeof parsed.colorMode === 'string' ? parsed.colorMode : defaults.colorMode,
          fontPreset: typeof parsed.fontPreset === 'string' ? parsed.fontPreset : defaults.fontPreset,
          fontCustom: typeof parsed.fontCustom === 'string' ? parsed.fontCustom : defaults.fontCustom,
          taskRatio: Number.isFinite(taskRatio) ? Math.min(SPLIT_MAX, Math.max(SPLIT_MIN, taskRatio)) : defaults.taskRatio
        };
      } catch (_) {
        return defaults;
      }
    }

    gearBtn.addEventListener('click', () => {
      modalEl.classList.add('open');
      modalEl.setAttribute('aria-hidden', 'false');
    });

    closeBtn.addEventListener('click', () => {
      modalEl.classList.remove('open');
      modalEl.setAttribute('aria-hidden', 'true');
    });

    modalEl.addEventListener('click', (e) => {
      if (e.target === modalEl) {
        modalEl.classList.remove('open');
        modalEl.setAttribute('aria-hidden', 'true');
      }
    });

    colorModeEl.addEventListener('change', () => {
      applyTheme(colorModeEl.value);
      saveSettings();
    });

    fontPresetEl.addEventListener('change', () => {
      applyFont();
      saveSettings();
    });

    fontCustomEl.addEventListener('input', () => {
      if (fontPresetEl.value === 'custom') applyFont();
      saveSettings();
    });

    window.addEventListener('beforeunload', (e) => {
      if (!hasUnsavedChanges) return;
      e.preventDefault();
      e.returnValue = '';
    });

    const settings = loadSettings();
    colorModeEl.value = THEMES[settings.colorMode] ? settings.colorMode : 'オーロラガラス';
    fontCustomEl.value = settings.fontCustom;
    const presetExists = Array.from(fontPresetEl.options).some((o) => o.value === settings.fontPreset);
    fontPresetEl.value = presetExists ? settings.fontPreset : fontPresetEl.options[0].value;

    applyTheme(colorModeEl.value);
    applyFont();
    setTaskRatio(settings.taskRatio);
    initSplitResize();
    renderClock();
    setInterval(renderClock, 1000);
    restoreOrInitContent();
  </script>
</body>
</html>
