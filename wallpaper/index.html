<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Wireframe Wallpaper</title>
  <style>
    :root{
      --base-bg-rgb: 20 27 39;
      --base-deep-rgb: 10 16 24;
      --base-mid-rgb: 32 44 63;
      --text-main-rgb: 214 232 244;
      --text-sub-rgb: 127 147 170;
      --accent-base-rgb: 95 143 188;
      --accent-strong-rgb: 131 203 231;
      --accent-soft-rgb: 212 244 255;

      --ui-bg-rgb: 20 27 39;
      --ui-bd-rgb: 131 203 231;
      --ui-tx-rgb: 214 232 244;
      --ui-sub-rgb: 127 147 170;
      --btn-bg-rgb: 32 44 63;
      --btn-bg2-rgb: 40 56 80;
      --btn-bd-rgb: 131 203 231;
      --shadow-rgb: 0 0 0;

      --flare-1-rgb: 212 244 255;
      --flare-2-rgb: 131 203 231;
      --flare-3-rgb: 95 143 188;
      --particle-rgb: 131 203 231;
    }
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: rgb(var(--base-bg-rgb));
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Hiragino Sans", "Noto Sans JP", "Yu Gothic", "Meiryo", sans-serif;
    }
    #wrap{
      position: fixed;
      inset: 0;
      background: rgb(var(--base-deep-rgb));
    }
    #stage{
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      overflow: hidden;
      background: rgb(var(--base-deep-rgb));
    }
    canvas{
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }
    .ui{
      position: fixed;
      left: 18px;
      bottom: 18px;
      display: grid;
      gap: 10px;
      padding: 14px 14px 12px;
      border-radius: 16px;
      background: rgb(var(--ui-bg-rgb) / 0.72);
      border: 1px solid rgb(var(--ui-bd-rgb) / 0.24);
      box-shadow: 0 10px 30px rgb(var(--shadow-rgb) / 0.40);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      user-select: none;
    }
    .ui .title{
      font-size: 13px;
      letter-spacing: .02em;
      color: rgb(var(--ui-tx-rgb) / 0.96);
      line-height: 1.25;
    }
    .ui .subtitle{
      font-size: 12px;
      color: rgb(var(--ui-sub-rgb) / 0.92);
      line-height: 1.35;
    }
    .ui .row{
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-top: 2px;
    }
    .field{
      display: grid;
      gap: 6px;
      min-width: 170px;
    }
    .field span{
      font-size: 11px;
      letter-spacing: .03em;
      color: rgb(var(--ui-sub-rgb) / 0.90);
    }
    .field input,
    .field select{
      appearance: none;
      width: 100%;
      box-sizing: border-box;
      border: 1px solid rgb(var(--btn-bd-rgb) / 0.36);
      background: rgb(var(--base-deep-rgb) / 0.52);
      color: rgb(var(--ui-tx-rgb) / 0.96);
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 13px;
      outline: none;
      transition: border-color .15s ease, box-shadow .15s ease, background .15s ease;
    }
    .field select{
      cursor: pointer;
    }
    .field input::placeholder{
      color: rgb(var(--ui-sub-rgb) / 0.72);
    }
    .field input:focus,
    .field select:focus{
      border-color: rgb(var(--accent-soft-rgb) / 0.52);
      box-shadow: 0 0 0 4px rgb(var(--accent-strong-rgb) / 0.12);
      background: rgb(var(--base-deep-rgb) / 0.64);
    }
    button{
      appearance: none;
      border: 1px solid rgb(var(--btn-bd-rgb) / 0.32);
      background: linear-gradient(180deg, rgb(var(--btn-bg2-rgb) / 0.92), rgb(var(--btn-bg-rgb) / 0.72));
      color: rgb(var(--ui-tx-rgb) / 0.96);
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 13px;
      cursor: pointer;
      transition: transform .08s ease, background .15s ease, border-color .15s ease;
      white-space: nowrap;
    }
    .grow{
      flex: 1 1 100%;
    }
    button:hover{
      border-color: rgba(255,255,255,0.30);
    }
    button:active{
      transform: translateY(1px);
    }
    .hint{
      font-size: 11px;
      color: rgba(255,255,255,0.55);
      margin-top: 2px;
    }
    .badge{
      font-size: 11px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.78);
    }
    .topbar{
      position: fixed;
      right: 18px;
      top: 18px;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(10, 10, 16, 0.35);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: rgba(255,255,255,0.70);
      font-size: 12px;
      letter-spacing: .02em;
      user-select: none;
    }
    .topbar kbd{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.85);
      margin-left: 6px;
    }

    /* Light Flare - 光のフレア */
    .light-flare {
      position: absolute;
      top: 18%;
      left: 50%;
      width: 260px;
      height: 260px;
      background: radial-gradient(circle,
        rgb(var(--flare-1-rgb) / 0.18) 0%,
        rgb(var(--flare-2-rgb) / 0.12) 26%,
        rgb(var(--flare-3-rgb) / 0.06) 46%,
        transparent 65%);
      transform: translate(-50%, -50%);
      filter: blur(50px);
      pointer-events: none;
      animation: pulse-flare 6s ease-in-out infinite;
    }

    #stage[data-mode="iphone17pro"] .light-flare {
      top: 22%;
      width: 320px;
      height: 320px;
    }

    @keyframes pulse-flare {
      0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 0.85; transform: translate(-50%, -50%) scale(1.1); }
    }

    /* Light Rays - 光の筋 */
    .light-rays {
      position: absolute;
      bottom: 42%;
      left: 50%;
      width: 140%;
      height: 80%;
      background: conic-gradient(from 0deg at 50% 100%,
        transparent 0deg,
        rgb(var(--flare-1-rgb) / 0.035) 35deg,
        transparent 45deg,
        rgb(var(--flare-2-rgb) / 0.028) 85deg,
        transparent 95deg,
        rgb(var(--flare-3-rgb) / 0.03) 125deg,
        transparent 135deg,
        rgb(var(--flare-1-rgb) / 0.018) 175deg,
        transparent 185deg,
        rgb(var(--flare-2-rgb) / 0.03) 215deg,
        transparent 225deg,
        rgb(var(--flare-3-rgb) / 0.026) 265deg,
        transparent 275deg,
        rgb(var(--flare-1-rgb) / 0.018) 315deg,
        transparent 325deg
      );
      transform: translate(-50%, 0);
      mix-blend-mode: screen;
      pointer-events: none;
      opacity: 0.45;
    }

    #stage[data-mode="iphone17pro"] .light-rays {
      bottom: 36%;
      height: 90%;
      opacity: 0.38;
    }

    /* Film Grain - フィルムグレイン */
    .grain-overlay {
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='2.5' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      opacity: 0.05;
      mix-blend-mode: overlay;
      pointer-events: none;
    }

    /* Glow Particles - 浮遊粒子 */
    .glow-particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: rgb(var(--particle-rgb));
      border-radius: 50%;
      box-shadow: 0 0 10px 2px rgb(var(--particle-rgb) / 0.42);
      pointer-events: none;
    }

    .glow-particle:nth-child(1) {
      left: 20%; top: 30%;
      animation: float1 12s infinite ease-in-out;
    }
    .glow-particle:nth-child(2) {
      left: 75%; top: 25%;
      animation: float2 15s infinite ease-in-out;
    }
    .glow-particle:nth-child(3) {
      left: 50%; top: 40%;
      animation: float3 18s infinite ease-in-out;
    }
    .glow-particle:nth-child(4),
    .glow-particle:nth-child(5),
    .glow-particle:nth-child(6) { display: none; }

    @keyframes float1 {
      0%, 100% { transform: translate(0, 0); opacity: 0.3; }
      25% { transform: translate(15px, -25px); opacity: 0.7; }
      50% { transform: translate(5px, -40px); opacity: 0.9; }
      75% { transform: translate(-10px, -20px); opacity: 0.6; }
    }

    @keyframes float2 {
      0%, 100% { transform: translate(0, 0); opacity: 0.4; }
      33% { transform: translate(-20px, -30px); opacity: 0.8; }
      66% { transform: translate(10px, -50px); opacity: 0.7; }
    }

    @keyframes float3 {
      0%, 100% { transform: translate(0, 0); opacity: 0.35; }
      50% { transform: translate(8px, -35px); opacity: 0.85; }
    }
  </style>
</head>
<body>
  <div id="wrap">
    <div id="stage" data-mode="fullhd">
      <canvas id="c"></canvas>

      <!-- Visual Effects -->
      <div class="light-flare"></div>
      <div class="light-rays"></div>
      <div class="grain-overlay"></div>

      <!-- Floating Particles -->
      <div class="glow-particle"></div>
      <div class="glow-particle"></div>
      <div class="glow-particle"></div>
      <div class="glow-particle"></div>
      <div class="glow-particle"></div>
      <div class="glow-particle"></div>
    </div>
  </div>

  <div class="topbar">
    Static render
    <kbd>R</kbd> で再描画
  </div>

  <div class="ui">
    <div class="title">Wireframe Grid Wallpaper</div>
    <div class="subtitle">Base color spectrum / 7-tone depth</div>
    <div class="row">
      <label class="field">
        <span>基準カラーコード</span>
        <input id="colorInput" type="text" placeholder="#e6b422" maxlength="7" autocomplete="off" spellcheck="false" aria-label="基準カラーコード" />
      </label>
      <button id="btnRegenerate">再生成</button>
    </div>
    <div class="row">
      <label class="field">
        <span>表示モード</span>
        <select id="modeSelect" aria-label="表示モード">
          <option value="fullhd">フルHD (1920×1080)</option>
          <option value="iphone17pro">iPhone 17 Pro (1206×2622)</option>
        </select>
      </label>
      <button id="btnPng">PNGを保存</button>
      <span class="badge" id="status">待機中</span>
    </div>
    <div class="hint">※ 有効なカラーコードなら配色も更新。空欄なら現在の配色のまま再生成。</div>
  </div>

  <!-- Three.js (ES Module版) -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';

    // メインの初期化処理
    function init() {
      const canvas = document.getElementById("c");
      const stage = document.getElementById("stage");
      const btnPng = document.getElementById("btnPng");
      const btnRegenerate = document.getElementById("btnRegenerate");
      const colorInput = document.getElementById("colorInput");
      const modeSelect = document.getElementById("modeSelect");
      const statusEl = document.getElementById("status");
      const rootStyle = document.documentElement.style;
      let statusTimer = 0;

      // ---------- Utils ----------
      function clamp(x, a, b){ return Math.max(a, Math.min(b, x)); }
      function smoothstep(edge0, edge1, x){
        const t = clamp((x - edge0) / (edge1 - edge0), 0, 1);
        return t * t * (3 - 2 * t);
      }
      function wrapHue(h){
        let next = h % 1;
        if (next < 0) next += 1;
        return next;
      }
      function shortestHueDelta(from, to){
        let delta = to - from;
        if (delta > 0.5) delta -= 1;
        if (delta < -0.5) delta += 1;
        return delta;
      }
      function toHex(color){
        return `#${color.getHexString()}`;
      }
      function hexToHsl(hex){
        const hsl = { h: 0, s: 0, l: 0 };
        new THREE.Color(hex).getHSL(hsl);
        return hsl;
      }
      function hslToHex(h, s, l){
        const color = new THREE.Color();
        color.setHSL(wrapHue(h), clamp(s, 0, 1), clamp(l, 0, 1));
        return toHex(color);
      }
      function mixHex(a, b, t){
        const color = new THREE.Color(a);
        color.lerp(new THREE.Color(b), clamp(t, 0, 1));
        return toHex(color);
      }
      function hexToRgbString(hex){
        const color = new THREE.Color(hex);
        return `${Math.round(color.r * 255)} ${Math.round(color.g * 255)} ${Math.round(color.b * 255)}`;
      }
      function setRgbVar(name, hex){
        rootStyle.setProperty(name, hexToRgbString(hex));
      }
      function normalizeHex(value){
        let text = (value || "").trim();
        if (!text) return "";
        if (!text.startsWith("#")) text = `#${text}`;
        if (/^#([0-9a-f]{3})$/i.test(text)) {
          const short = text.slice(1);
          return `#${short[0]}${short[0]}${short[1]}${short[1]}${short[2]}${short[2]}`.toLowerCase();
        }
        if (/^#([0-9a-f]{6})$/i.test(text)) {
          return text.toLowerCase();
        }
        return null;
      }
      function clonePalette(palette){
        return {
          css: { ...palette.css },
          shader: { ...palette.shader },
          wireStops: palette.wireStops.map((stop) => ({ ...stop })),
          wireHighlight: palette.wireHighlight,
          fog: palette.fog,
          star: palette.star
        };
      }
      function setStatus(text, holdMs = 0){
        if (statusTimer) {
          clearTimeout(statusTimer);
          statusTimer = 0;
        }
        statusEl.textContent = text;
        if (holdMs > 0) {
          statusTimer = window.setTimeout(() => {
            statusEl.textContent = "待機中";
            statusTimer = 0;
          }, holdMs);
        }
      }
      function buildTimestamp(){
        const now = new Date();
        return now.getFullYear() +
          String(now.getMonth() + 1).padStart(2, '0') +
          String(now.getDate()).padStart(2, '0') +
          String(now.getHours()).padStart(2, '0') +
          String(now.getMinutes()).padStart(2, '0') +
          String(now.getSeconds()).padStart(2, '0');
      }

      const MODES = {
        fullhd: {
          label: "フルHD",
          width: 1920,
          height: 1080,
          filenameSize: "1920x1080",
          camera: {
            fov: 86,
            position: [0, 58, 90],
            target: [0, 0, -220]
          }
        },
        iphone17pro: {
          label: "iPhone 17 Pro",
          width: 1206,
          height: 2622,
          filenameSize: "1206x2622",
          camera: {
            fov: 62,
            position: [0, 108, 152],
            target: [0, 18, -255]
          }
        }
      };
      let currentModeKey = "fullhd";

      function getCurrentMode(){
        return MODES[currentModeKey];
      }

      // ---------- Palette ----------
      const defaultPalette = {
        css: {
          baseBg: "#141b27",
          baseDeep: "#0a1018",
          baseMid: "#202c3f",
          textMain: "#d6e8f4",
          textSub: "#7f93aa",
          accentBase: "#5f8fbc",
          accentStrong: "#83cbe7",
          accentSoft: "#d4f4ff",
          uiBg: "#141b27",
          uiBd: "#83cbe7",
          uiTx: "#d6e8f4",
          uiSub: "#7f93aa",
          btnBg: "#202c3f",
          btnBg2: "#283850",
          btnBd: "#83cbe7",
          flare1: "#d4f4ff",
          flare2: "#83cbe7",
          flare3: "#5f8fbc",
          particle: "#83cbe7"
        },
        shader: {
          cTop: "#233248",
          cMid: "#141b27",
          cBot: "#0d131d",
          cDeep: "#070c12",
          cAur1: "#5f8fbc",
          cAur2: "#83cbe7",
          cAur3: "#d4f4ff"
        },
        wireStops: [
          { t: 0.00, color: "#edf9ff" },
          { t: 0.14, color: "#d8f2ff" },
          { t: 0.30, color: "#bce9ff" },
          { t: 0.46, color: "#98ddfb" },
          { t: 0.62, color: "#74c9ec" },
          { t: 0.80, color: "#4f9fce" },
          { t: 1.00, color: "#315e97" }
        ],
        wireHighlight: "#f7fdff",
        fog: "#0a1018",
        star: "#dbeefa"
      };
      const referenceBaseHsl = hexToHsl(defaultPalette.css.accentStrong);
      let currentPalette = clonePalette(defaultPalette);
      let activeWireStops = currentPalette.wireStops.map((stop) => ({ t: stop.t, color: new THREE.Color(stop.color) }));
      const activeWireHighlight = new THREE.Color(currentPalette.wireHighlight);

      function buildPaletteFromBaseColor(baseHex){
        const baseHsl = hexToHsl(baseHex);
        const paletteJitter = {
          s: (Math.random() - 0.5) * 0.08,
          l: (Math.random() - 0.5) * 0.07
        };

        function retarget(referenceHex, options = {}){
          const referenceHsl = hexToHsl(referenceHex);
          const baseHueOffset = options.hueOffset ?? 0;
          const referenceHueWeight = options.referenceHueWeight ?? 0;
          const hue = wrapHue(
            baseHsl.h +
            baseHueOffset +
            shortestHueDelta(referenceBaseHsl.h, referenceHsl.h) * referenceHueWeight +
            (Math.random() - 0.5) * (options.hJitter ?? 0.004)
          );
          const saturation = clamp(
            baseHsl.s +
            (referenceHsl.s - referenceBaseHsl.s) +
            paletteJitter.s * (options.jitterScaleS ?? 0.55) +
            (Math.random() - 0.5) * (options.sJitter ?? 0.03),
            options.minS ?? 0.04,
            options.maxS ?? 0.96
          );
          const lightness = clamp(
            baseHsl.l +
            (referenceHsl.l - referenceBaseHsl.l) +
            paletteJitter.l * (options.jitterScaleL ?? 0.7) +
            (Math.random() - 0.5) * (options.lJitter ?? 0.028),
            options.minL ?? 0.04,
            options.maxL ?? 0.97
          );
          return hslToHex(hue, saturation, lightness);
        }

        const core = {
          baseBg: retarget(defaultPalette.css.baseBg, { minL: 0.07, maxL: 0.26, maxS: 0.60, hJitter: 0.002, sJitter: 0.018, lJitter: 0.018 }),
          baseDeep: retarget(defaultPalette.css.baseDeep, { minL: 0.03, maxL: 0.16, maxS: 0.48, hJitter: 0.002, sJitter: 0.016, lJitter: 0.014 }),
          baseMid: retarget(defaultPalette.css.baseMid, { minL: 0.12, maxL: 0.38, maxS: 0.72, hJitter: 0.003, sJitter: 0.024, lJitter: 0.022 }),
          textMain: retarget(defaultPalette.css.textMain, { minL: 0.86, maxL: 0.98, maxS: 0.46, hJitter: 0.002, sJitter: 0.018, lJitter: 0.018 }),
          textSub: retarget(defaultPalette.css.textSub, { minL: 0.48, maxL: 0.78, maxS: 0.42, hJitter: 0.002, sJitter: 0.020, lJitter: 0.020 }),
          accentBase: retarget(defaultPalette.css.accentBase, { minL: 0.38, maxL: 0.68, minS: 0.20, maxS: 0.88, hJitter: 0.003, sJitter: 0.022, lJitter: 0.022 }),
          accentStrong: retarget(defaultPalette.css.accentStrong, { minL: 0.58, maxL: 0.84, minS: 0.22, maxS: 0.92, hJitter: 0.002, sJitter: 0.018, lJitter: 0.020 }),
          accentSoft: retarget(defaultPalette.css.accentSoft, { minL: 0.84, maxL: 0.97, maxS: 0.56, hJitter: 0.002, sJitter: 0.016, lJitter: 0.016 })
        };

        return {
          css: {
            ...core,
            uiBg: mixHex(core.baseBg, core.baseDeep, 0.18),
            uiBd: mixHex(core.accentStrong, core.accentSoft, 0.18),
            uiTx: core.textMain,
            uiSub: mixHex(core.textSub, core.textMain, 0.08),
            btnBg: core.baseMid,
            btnBg2: mixHex(core.baseMid, core.accentBase, 0.22),
            btnBd: mixHex(core.accentStrong, core.accentSoft, 0.12),
            flare1: core.accentSoft,
            flare2: core.accentStrong,
            flare3: core.accentBase,
            particle: core.accentStrong
          },
          shader: {
            cTop: retarget(defaultPalette.shader.cTop, { minL: 0.18, maxL: 0.40, maxS: 0.58, hJitter: 0.002, sJitter: 0.020, lJitter: 0.020 }),
            cMid: core.baseBg,
            cBot: retarget(defaultPalette.shader.cBot, { minL: 0.05, maxL: 0.22, maxS: 0.48, hJitter: 0.002, sJitter: 0.016, lJitter: 0.016 }),
            cDeep: retarget(defaultPalette.shader.cDeep, { minL: 0.02, maxL: 0.14, maxS: 0.42, hJitter: 0.002, sJitter: 0.014, lJitter: 0.014 }),
            cAur1: core.accentBase,
            cAur2: core.accentStrong,
            cAur3: core.accentSoft
          },
          wireStops: defaultPalette.wireStops.map((stop, index) => {
            const stopOptions = [
              { minL: 0.88, maxL: 0.98, maxS: 0.34, hJitter: 0.001, sJitter: 0.016, lJitter: 0.016 },
              { minL: 0.84, maxL: 0.96, maxS: 0.40, hJitter: 0.001, sJitter: 0.018, lJitter: 0.018 },
              { minL: 0.76, maxL: 0.92, maxS: 0.54, hJitter: 0.001, sJitter: 0.020, lJitter: 0.020 },
              { minL: 0.68, maxL: 0.88, maxS: 0.66, hJitter: 0.001, sJitter: 0.022, lJitter: 0.022 },
              { minL: 0.56, maxL: 0.80, maxS: 0.78, hJitter: 0.001, sJitter: 0.024, lJitter: 0.024 },
              { minL: 0.42, maxL: 0.70, maxS: 0.86, hJitter: 0.001, sJitter: 0.024, lJitter: 0.024 },
              { minL: 0.24, maxL: 0.52, maxS: 0.78, hJitter: 0.001, sJitter: 0.022, lJitter: 0.022 }
            ];
            return { t: stop.t, color: retarget(stop.color, stopOptions[index]) };
          }),
          wireHighlight: retarget(defaultPalette.wireHighlight, { minL: 0.92, maxL: 0.99, maxS: 0.34, hJitter: 0.001, sJitter: 0.012, lJitter: 0.012 }),
          fog: mixHex(core.baseDeep, core.baseBg, 0.34),
          star: mixHex(core.textMain, core.accentSoft, 0.35)
        };
      }

    // ---------- Background Shader (gradient glow + subtle vignette) ----------
    const bgScene = new THREE.Scene();
    const bgCam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

    const bgMat = new THREE.ShaderMaterial({
      uniforms: {
        cTop:    { value: new THREE.Color(defaultPalette.shader.cTop) },
        cMid:    { value: new THREE.Color(defaultPalette.shader.cMid) },
        cBot:    { value: new THREE.Color(defaultPalette.shader.cBot) },
        cDeep:   { value: new THREE.Color(defaultPalette.shader.cDeep) },
        cAur1:   { value: new THREE.Color(defaultPalette.shader.cAur1) },
        cAur2:   { value: new THREE.Color(defaultPalette.shader.cAur2) },
        cAur3:   { value: new THREE.Color(defaultPalette.shader.cAur3) }
      },
      vertexShader: `
        varying vec2 vUv;
        void main(){
          vUv = uv;
          gl_Position = vec4(position.xy, 0.0, 1.0);
        }
      `,
      fragmentShader: `
        precision highp float;
        varying vec2 vUv;
        uniform vec3 cTop;
        uniform vec3 cMid;
        uniform vec3 cBot;
        uniform vec3 cDeep;
        uniform vec3 cAur1;
        uniform vec3 cAur2;
        uniform vec3 cAur3;

        float sCurve(float x){
          return x*x*(3.0 - 2.0*x);
        }

        float band(float y, float center, float width){
          return 1.0 - smoothstep(0.0, 1.0, abs(y - center) / width);
        }

        void main(){
          float y = clamp(vUv.y, 0.0, 1.0);

          // 3-stop blend: bottom -> mid -> top
          float t1 = sCurve(clamp((y - 0.00) / 0.52, 0.0, 1.0)); // bot->mid
          vec3 cA = mix(cBot, cMid, t1);

          float t2 = sCurve(clamp((y - 0.40) / 0.60, 0.0, 1.0)); // mid->top
          vec3 cB = mix(cMid, cTop, t2);

          vec3 col = mix(cA, cB, clamp((y - 0.30) / 0.70, 0.0, 1.0));

          // Deepen bottom
          col = mix(col, cDeep, sCurve(clamp((0.14 - y) / 0.14, 0.0, 1.0)) * 0.70);

          // Glow band (upper sky)
          float b1 = band(y, 0.72, 0.16);
          float b2 = band(y, 0.60, 0.18);
          float waves = sin(vUv.x * 8.0 + y * 6.5) * 0.5 + 0.5;
          float ripple = sin(vUv.x * 18.0 - y * 12.0) * 0.5 + 0.5;
          float glowBlend = (b1 * 0.8 + b2 * 0.6) * (0.55 + 0.45 * waves) * (0.65 + 0.35 * ripple);

          vec3 aurCol = mix(cAur1, cAur2, waves);
          aurCol = mix(aurCol, cAur3, ripple * 0.6);
          col = mix(col, aurCol, glowBlend * 0.35);

          // Subtle vignette
          vec2 p = vUv * 2.0 - 1.0;
          float v = 1.0 - smoothstep(0.40, 1.45, length(p));
          col *= (0.72 + 0.28 * v);

          gl_FragColor = vec4(col, 1.0);
        }
      `,
      depthTest: false,
      depthWrite: false
    });

    const bgQuad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), bgMat);
    bgScene.add(bgQuad);

    // Add subtle stars
    const starCount = 70;
    const starGeom = new THREE.BufferGeometry();
    const starPositions = new Float32Array(starCount * 3);
    const starSizes = new Float32Array(starCount);
    
    for (let i = 0; i < starCount; i++) {
      starPositions[i * 3] = (Math.random() - 0.5) * 2.5;
      starPositions[i * 3 + 1] = Math.random() * 1.2 - 0.3;
      starPositions[i * 3 + 2] = 0;
      starSizes[i] = Math.random() * 1.5 + 0.5;
    }
    
    starGeom.setAttribute("position", new THREE.BufferAttribute(starPositions, 3));
    starGeom.setAttribute("size", new THREE.BufferAttribute(starSizes, 1));
    
    const starMat = new THREE.PointsMaterial({
      color: defaultPalette.star,
      size: 0.008,
      transparent: true,
      opacity: 0.30,
      sizeAttenuation: false,
      blending: THREE.AdditiveBlending
    });
    
    const stars = new THREE.Points(starGeom, starMat);
    bgScene.add(stars);

    // ---------- Main Scene (Wireframe terrain) ----------
    const scene = new THREE.Scene();

    // Fog for depth
    scene.fog = new THREE.Fog(new THREE.Color(defaultPalette.fog), 140, 720);

    const initialMode = getCurrentMode();
    const camera = new THREE.PerspectiveCamera(initialMode.camera.fov, initialMode.width / initialMode.height, 0.1, 1400);
    const cameraTarget = new THREE.Vector3();

    // Terrain size and resolution (wider for horizontal spread)
    const WIDTH = 1300;          // X (wider) - かなり広め
    const DEPTH = 900;           // Z (deeper) - 地平線まで
    const SEGX = 420;
    const SEGZ = 340;

    const geom = new THREE.PlaneGeometry(WIDTH, DEPTH, SEGX, SEGZ);
    geom.rotateX(-Math.PI / 2);
    geom.translate(0, 0, -DEPTH * 0.45); // push to far horizon

    function createRandomTerrainParams(){
      return {
        phase1: Math.random() * Math.PI * 2,
        phase2: Math.random() * Math.PI * 2,
        phase3: Math.random() * Math.PI * 2,
        phase4: Math.random() * Math.PI * 2,
        phase5: Math.random() * Math.PI * 2,
        amp1: 18.0 + Math.random() * 8.0,
        amp2: 10.0 + Math.random() * 6.0,
        amp3: 7.0 + Math.random() * 5.0,
        amp4: 14.0 + Math.random() * 6.0,
        amp5: 9.0 + Math.random() * 4.0,
        valleyAmp: 6.0 + Math.random() * 3.0
      };
    }

    let randomParams = createRandomTerrainParams();

    // Function to generate terrain with current random parameters
    function generateTerrain() {
      const pos = geom.attributes.position;
      const v = new THREE.Vector3();

      for (let i = 0; i < pos.count; i++){
        v.fromBufferAttribute(pos, i);
        const x = v.x;
        const z = v.z;

        // Distance factor for depth
        const distFactor = clamp((-z) / (DEPTH * 0.65), 0, 1);
        
        // Rolling hills pattern (dramatic mountains and valleys with random phases)
        const hill1 = Math.sin(x * 0.010 + randomParams.phase1) * randomParams.amp1;
        const hill2 = Math.cos(x * 0.015 + z * 0.008 + randomParams.phase2) * randomParams.amp2;
        const hill3 = Math.sin(x * 0.012 - z * 0.005 + randomParams.phase3) * randomParams.amp3;
        const hill4 = Math.sin(x * 0.006 + z * 0.004 + randomParams.phase4) * randomParams.amp4;
        const hill5 = Math.cos(x * 0.008 - z * 0.006 + randomParams.phase5) * randomParams.amp5;
        
        // Smooth longitudinal variation (deeper valleys)
        const depthWave = Math.sin(z * 0.022) * 4.0 * (1.0 - distFactor * 0.6);
        const valleyEffect = Math.cos(x * 0.006) * randomParams.valleyAmp;
        
        // Combine hills with dramatic variation
        let h = (hill1 + hill2 + hill3 + hill4 + hill5 + valleyEffect) * (0.65 + distFactor * 0.45) + depthWave;
        
        // Lift and scale by distance (more dramatic)
        h += (2.0 - distFactor * 2.6);
        h *= (0.85 + distFactor * 0.35);

        v.y = h;
        pos.setXYZ(i, v.x, v.y, v.z);
      }
      pos.needsUpdate = true;
    }

    // Initial terrain generation
    generateTerrain();

    // Wireframe lines (main)
    function sampleWireColor(t, target) {
      const clamped = clamp(t, 0, 1);
      for (let i = 1; i < activeWireStops.length; i++) {
        const prev = activeWireStops[i - 1];
        const next = activeWireStops[i];
        if (clamped <= next.t) {
          const localT = (clamped - prev.t) / (next.t - prev.t);
          return target.copy(prev.color).lerp(next.color, localT);
        }
      }
      return target.copy(activeWireStops[activeWireStops.length - 1].color);
    }

    function applyWireGradient(lineGeometry) {
      const pos = lineGeometry.attributes.position;
      const colors = new Float32Array(pos.count * 3);
      const c = new THREE.Color();

      for (let i = 0; i < pos.count; i++) {
        const y = pos.getY(i);
        const z = pos.getZ(i);
        const depthT = clamp((-z) / (DEPTH * 0.88), 0, 1);
        const heightT = clamp((y + 30.0) / 58.0, 0, 1);
        const shimmer = Math.sin(z * 0.010 + y * 0.12) * 0.025;
        const mixT = clamp(depthT * 0.76 + heightT * 0.16 + shimmer, 0, 1);
        sampleWireColor(mixT, c);
        c.lerp(activeWireHighlight, 0.08);

        colors[i * 3] = c.r;
        colors[i * 3 + 1] = c.g;
        colors[i * 3 + 2] = c.b;
      }

      lineGeometry.setAttribute("color", new THREE.BufferAttribute(colors, 3));
      return lineGeometry;
    }

    const matMain = new THREE.LineBasicMaterial({
      vertexColors: true,
      transparent: true,
      opacity: 0.62,
      blending: THREE.AdditiveBlending
    });

    const matGlow = new THREE.LineBasicMaterial({
      vertexColors: true,
      transparent: true,
      opacity: 0.14,
      blending: THREE.AdditiveBlending
    });

    const wireGeom = applyWireGradient(new THREE.WireframeGeometry(geom));
    const linesMain = new THREE.LineSegments(wireGeom, matMain);
    const linesGlow = new THREE.LineSegments(wireGeom.clone(), matGlow);
    linesGlow.scale.set(1.0006, 1.0006, 1.0006);

    scene.add(linesGlow);
    scene.add(linesMain);

    function applyPalette(palette){
      currentPalette = clonePalette(palette);

      setRgbVar("--base-bg-rgb", currentPalette.css.baseBg);
      setRgbVar("--base-deep-rgb", currentPalette.css.baseDeep);
      setRgbVar("--base-mid-rgb", currentPalette.css.baseMid);
      setRgbVar("--text-main-rgb", currentPalette.css.textMain);
      setRgbVar("--text-sub-rgb", currentPalette.css.textSub);
      setRgbVar("--accent-base-rgb", currentPalette.css.accentBase);
      setRgbVar("--accent-strong-rgb", currentPalette.css.accentStrong);
      setRgbVar("--accent-soft-rgb", currentPalette.css.accentSoft);
      setRgbVar("--ui-bg-rgb", currentPalette.css.uiBg);
      setRgbVar("--ui-bd-rgb", currentPalette.css.uiBd);
      setRgbVar("--ui-tx-rgb", currentPalette.css.uiTx);
      setRgbVar("--ui-sub-rgb", currentPalette.css.uiSub);
      setRgbVar("--btn-bg-rgb", currentPalette.css.btnBg);
      setRgbVar("--btn-bg2-rgb", currentPalette.css.btnBg2);
      setRgbVar("--btn-bd-rgb", currentPalette.css.btnBd);
      setRgbVar("--shadow-rgb", currentPalette.css.baseDeep);
      setRgbVar("--flare-1-rgb", currentPalette.css.flare1);
      setRgbVar("--flare-2-rgb", currentPalette.css.flare2);
      setRgbVar("--flare-3-rgb", currentPalette.css.flare3);
      setRgbVar("--particle-rgb", currentPalette.css.particle);

      bgMat.uniforms.cTop.value.set(currentPalette.shader.cTop);
      bgMat.uniforms.cMid.value.set(currentPalette.shader.cMid);
      bgMat.uniforms.cBot.value.set(currentPalette.shader.cBot);
      bgMat.uniforms.cDeep.value.set(currentPalette.shader.cDeep);
      bgMat.uniforms.cAur1.value.set(currentPalette.shader.cAur1);
      bgMat.uniforms.cAur2.value.set(currentPalette.shader.cAur2);
      bgMat.uniforms.cAur3.value.set(currentPalette.shader.cAur3);

      scene.fog.color.set(currentPalette.fog);
      starMat.color.set(currentPalette.star);

      activeWireStops = currentPalette.wireStops.map((stop) => ({
        t: stop.t,
        color: new THREE.Color(stop.color)
      }));
      activeWireHighlight.set(currentPalette.wireHighlight);
    }

    // ---------- Renderer ----------
    const renderer = new THREE.WebGLRenderer({
      canvas,
      antialias: true,
      alpha: false,
      powerPreference: "high-performance",
      preserveDrawingBuffer: false
    });
    renderer.autoClear = false;

    function applyModeCamera(modeKey = currentModeKey){
      const mode = MODES[modeKey];
      camera.fov = mode.camera.fov;
      camera.aspect = mode.width / mode.height;
      camera.position.set(...mode.camera.position);
      cameraTarget.set(...mode.camera.target);
      camera.lookAt(cameraTarget);
      camera.updateProjectionMatrix();
    }

    function updateStageLayout(){
      const mode = getCurrentMode();
      const viewportW = Math.max(1, window.innerWidth);
      const viewportH = Math.max(1, window.innerHeight);
      const modeAspect = mode.width / mode.height;
      const viewportAspect = viewportW / viewportH;

      let stageW = viewportW;
      let stageH = stageW / modeAspect;

      if (stageH > viewportH) {
        stageH = viewportH;
        stageW = stageH * modeAspect;
      }

      stage.style.width = `${Math.round(stageW)}px`;
      stage.style.height = `${Math.round(stageH)}px`;
      stage.dataset.mode = currentModeKey;
    }

    function syncRendererToMode(){
      const mode = getCurrentMode();
      renderer.setPixelRatio(1);
      renderer.setSize(mode.width, mode.height, false);
      updateStageLayout();
      applyModeCamera();
    }

    function renderOnce(target){
      target.clear(true, true, true);
      target.render(bgScene, bgCam);
      target.render(scene, camera);
    }

    function rebuildWireframe(){
      const newWireGeom = applyWireGradient(new THREE.WireframeGeometry(geom));
      const glowGeom = newWireGeom.clone();

      linesMain.geometry.dispose();
      linesGlow.geometry.dispose();

      linesMain.geometry = newWireGeom;
      linesGlow.geometry = glowGeom;
    }

    function renderCurrentMode(){
      syncRendererToMode();
      renderOnce(renderer);
    }

    function rebuildScene(){
      randomParams = createRandomTerrainParams();
      generateTerrain();
      rebuildWireframe();
    }

    function regenerateScene(){
      const rawInput = colorInput.value.trim();
      const normalized = rawInput ? normalizeHex(rawInput) : "";
      let resultMessage = "再生成完了";

      setStatus("再生成中…");

      if (rawInput) {
        if (normalized) {
          applyPalette(buildPaletteFromBaseColor(normalized));
          colorInput.value = "";
          resultMessage = `配色更新 ${normalized}`;
        } else {
          resultMessage = "色コード不正。現行配色で再生成";
        }
      }

      rebuildScene();
      renderCurrentMode();
      setStatus(resultMessage, 1100);
    }

    function changeMode(nextModeKey){
      if (!MODES[nextModeKey] || nextModeKey === currentModeKey) return;

      currentModeKey = nextModeKey;
      setStatus(`${getCurrentMode().label}へ切替中…`);
      rebuildScene();
      renderCurrentMode();
      setStatus(`${getCurrentMode().label}へ切替`, 1100);
    }

    window.addEventListener("resize", () => renderCurrentMode(), { passive: true });
    window.addEventListener("keydown", (e) => {
      if ((e.key || "").toLowerCase() === "r"){
        if (document.activeElement === colorInput) return;
        regenerateScene();
      }
    });
    colorInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        regenerateScene();
      }
    });

    function exportPng(){
      setStatus("PNG出力中…");

      const mode = getCurrentMode();
      const W = mode.width;
      const H = mode.height;

      const off = document.createElement("canvas");
      off.width = W; off.height = H;

      const r = new THREE.WebGLRenderer({
        canvas: off,
        antialias: true,
        alpha: false,
        powerPreference: "high-performance",
        preserveDrawingBuffer: true
      });
      r.autoClear = false;
      r.setSize(W, H, false);
      r.setPixelRatio(1);

      const prevState = {
        fov: camera.fov,
        aspect: camera.aspect,
        position: camera.position.clone(),
        target: cameraTarget.clone()
      };

      applyModeCamera(currentModeKey);

      r.clear(true, true, true);
      r.render(bgScene, bgCam);
      r.render(scene, camera);

      camera.fov = prevState.fov;
      camera.aspect = prevState.aspect;
      camera.position.copy(prevState.position);
      cameraTarget.copy(prevState.target);
      camera.lookAt(cameraTarget);
      camera.updateProjectionMatrix();

      const url = off.toDataURL("image/png");
      const a = document.createElement("a");
      a.href = url;
      a.download = `wireframe_wallpaper_${mode.filenameSize}_${buildTimestamp()}.png`;
      
      document.body.appendChild(a);
      a.click();
      a.remove();

      r.dispose();

      setStatus("PNG保存完了", 1100);
    }

    btnPng.addEventListener("click", exportPng);
    btnRegenerate.addEventListener("click", regenerateScene);
    modeSelect.addEventListener("change", (e) => changeMode(e.target.value));

    applyPalette(currentPalette);
    modeSelect.value = currentModeKey;
    applyModeCamera();
    renderCurrentMode();
    }

    // DOM読み込み完了後に初期化
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
</html>
