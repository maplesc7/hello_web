<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>MONOLITH TIMER</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg: #11151c;
      --bg-2: #1a212c;
      --panel: rgba(34, 42, 55, 0.62);
      --line: rgba(255, 255, 255, 0.13);
      --line-strong: rgba(255, 255, 255, 0.24);
      --text: #e1e8f4;
      --muted: #98a4b8;
      --accent: #d8e3f4;
      --accent-soft: rgba(216, 227, 244, 0.18);
      --ink: #0d1219;
      --shadow: 0 24px 72px rgba(0, 0, 0, 0.42);
      --scene-progress: 0;
      --scene-dim: 0;
      --scene-power: 1;
      --scene-angle: 0deg;
      --scene-sweep-opacity: 0;
      --scene-sweep-blur: 4px;
      --sweep-origin-x: 50%;
      --sweep-origin-y: 34%;
      --ring-power: 1;
      --sweep-shade: 4 7 12;
      --body-glow-rgb: 214 225 246;
      --panel-glow-rgb: 233 240 255;
      --ray-rgb: 223 233 255;
      --chrome-alpha: 0.75;
      --control-width: min(440px, 100%);
      --dial-max-width: 420px;
      --photo-image: none;
      --photo-opacity: 0;
      --photo-brightness: 0.76;
      --photo-saturate: 1.08;
      --photo-contrast: 1.08;
    }

    [data-theme="light"] {
      color-scheme: light;
      --bg: #f4f7fb;
      --bg-2: #ffffff;
      --panel: rgba(255, 255, 255, 0.67);
      --line: rgba(29, 39, 52, 0.12);
      --line-strong: rgba(29, 39, 52, 0.22);
      --text: #1f2733;
      --muted: #667385;
      --accent: #384659;
      --accent-soft: rgba(56, 70, 89, 0.12);
      --ink: #ffffff;
      --shadow: 0 24px 58px rgba(24, 38, 56, 0.14);
      --sweep-shade: 190 200 215;
      --body-glow-rgb: 130 160 208;
      --panel-glow-rgb: 103 125 156;
      --ray-rgb: 106 131 165;
    }

    [data-theme="darkcity"] {
      color-scheme: dark;
      --bg: #081018;
      --bg-2: #121b25;
      --panel: rgba(11, 16, 24, 0.58);
      --line: rgba(255, 255, 255, 0.12);
      --line-strong: rgba(255, 255, 255, 0.24);
      --text: #e5edf8;
      --muted: #9ba7b9;
      --accent: #d9e4f7;
      --accent-soft: rgba(217, 228, 247, 0.15);
      --ink: #060b10;
      --shadow: 0 24px 76px rgba(0, 0, 0, 0.52);
      --sweep-shade: 2 5 9;
      --body-glow-rgb: 122 146 184;
      --panel-glow-rgb: 200 217 240;
      --ray-rgb: 170 196 231;
      --photo-opacity: 0.6;
      --photo-brightness: 0.52;
      --photo-saturate: 1.04;
      --photo-contrast: 1.12;
    }

    [data-theme="lightcity"] {
      color-scheme: light;
      --bg: #dfe7f1;
      --bg-2: #f9fcff;
      --panel: rgba(248, 251, 255, 0.54);
      --line: rgba(29, 39, 52, 0.14);
      --line-strong: rgba(29, 39, 52, 0.24);
      --text: #172332;
      --muted: #5f6f83;
      --accent: #253548;
      --accent-soft: rgba(37, 53, 72, 0.14);
      --ink: #ffffff;
      --shadow: 0 24px 58px rgba(24, 38, 56, 0.16);
      --sweep-shade: 104 120 143;
      --body-glow-rgb: 144 166 194;
      --panel-glow-rgb: 120 142 168;
      --ray-rgb: 119 144 174;
      --photo-opacity: 0.72;
      --photo-brightness: 0.86;
      --photo-saturate: 0.98;
      --photo-contrast: 0.92;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: "Bahnschrift", "Segoe UI", "Noto Sans JP", sans-serif;
      color: var(--text);
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-text-size-adjust: 100%;
    }

    html {
      background:
        radial-gradient(120vw 90vh at 50% -10%,
          rgb(var(--body-glow-rgb) / calc(0.11 + var(--scene-power) * 0.18)),
          transparent 58%),
        radial-gradient(90vw 70vh at 100% 0%,
          rgb(var(--body-glow-rgb) / calc(0.04 + var(--scene-power) * 0.12)),
          transparent 62%),
        linear-gradient(180deg, var(--bg), var(--bg-2));
      transition: background 180ms linear;
    }

    body {
      display: grid;
      place-items: start center;
      min-height: 100svh;
      height: auto;
      padding:
        calc(env(safe-area-inset-top) + 10px)
        clamp(12px, 2.2vw, 24px)
        calc(env(safe-area-inset-bottom) + 10px);
      position: relative;
      isolation: isolate;
      background: transparent;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: var(--photo-image);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: var(--photo-opacity);
      filter: saturate(var(--photo-saturate)) brightness(var(--photo-brightness)) contrast(var(--photo-contrast));
      transform: scale(1.04);
      pointer-events: none;
      z-index: -1;
      transition: opacity 180ms linear, filter 180ms linear;
    }

    .app {
      width: min(920px, 100%);
      height: auto;
      border: 1px solid var(--line);
      border-radius: 22px;
      background:
        linear-gradient(160deg,
          rgb(var(--panel-glow-rgb) / calc((0.12 + var(--scene-power) * 0.16) * var(--chrome-alpha))),
          rgb(var(--panel-glow-rgb) / calc((0.04 + var(--scene-power) * 0.05) * var(--chrome-alpha))) 38%,
          rgb(var(--panel-glow-rgb) / calc((0.06 + var(--scene-power) * 0.1) * var(--chrome-alpha)))),
        var(--panel);
      backdrop-filter: blur(16px) saturate(115%);
      -webkit-backdrop-filter: blur(16px) saturate(115%);
      box-shadow:
        0 24px 72px rgb(0 0 0 / calc(0.18 + var(--scene-power) * 0.24)),
        0 0 calc(10px + var(--scene-power) * 28px) rgb(var(--panel-glow-rgb) / calc(0.01 + var(--scene-power) * 0.05));
      padding: clamp(12px, 2.5vw, 22px);
      display: grid;
      gap: 12px;
      overflow: hidden;
      position: relative;
      transition: background 180ms linear, box-shadow 180ms linear, border-color 180ms linear;
    }

    .app::before,
    .app::after {
      content: "";
      position: absolute;
      pointer-events: none;
      border: 1px solid var(--line);
      border-radius: 20px;
      inset: 6px;
      opacity: calc((0.18 + var(--scene-power) * 0.52) * var(--chrome-alpha));
    }

    .app::after {
      inset: 12px;
      border-color: rgba(255, 255, 255, 0.03);
      opacity: calc((0.2 + var(--scene-power) * 0.42) * var(--chrome-alpha));
    }

    .stage {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: clamp(12px, 2.4vw, 18px);
      display: grid;
      gap: 10px;
      align-content: start;
      position: relative;
      background:
        radial-gradient(120% 82% at 50% 0%,
          rgb(var(--panel-glow-rgb) / calc((0.06 + var(--scene-power) * 0.16) * var(--chrome-alpha))),
          rgb(var(--panel-glow-rgb) / calc((0.02 + var(--scene-power) * 0.05) * var(--chrome-alpha))) 48%,
          transparent 100%),
        linear-gradient(180deg,
          rgb(var(--panel-glow-rgb) / calc((0.03 + var(--scene-power) * 0.08) * var(--chrome-alpha))),
          rgb(var(--panel-glow-rgb) / 0));
      box-shadow: inset 0 1px 0 rgb(255 255 255 / calc((0.03 + var(--scene-power) * 0.1) * var(--chrome-alpha)));
      overflow: hidden;
      transition: background 180ms linear, box-shadow 180ms linear, border-color 180ms linear;
    }

    .scene-sweep {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        conic-gradient(from 0deg at var(--sweep-origin-x) var(--sweep-origin-y),
          rgb(var(--sweep-shade) / var(--scene-sweep-opacity)) 0deg,
          rgb(var(--sweep-shade) / calc(var(--scene-sweep-opacity) * 0.88)) calc(var(--scene-angle) * 0.9),
          rgb(var(--sweep-shade) / calc(var(--scene-sweep-opacity) * 0.34)) calc(var(--scene-angle) + 3deg),
          transparent calc(var(--scene-angle) + 8deg),
          transparent 360deg);
      mix-blend-mode: multiply;
      filter: blur(var(--scene-sweep-blur));
      transform: scale(1.015);
      opacity: min(1, calc(var(--scene-progress) * 12));
      transition: background 220ms ease, opacity 220ms ease, filter 220ms ease;
    }

    .wire-grid {
      position: absolute;
      inset: 0;
      pointer-events: none;
      border-radius: inherit;
      background-image:
        linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 22px 22px;
      mask-image: radial-gradient(circle at 50% 35%, black 45%, transparent 85%);
      opacity: calc(0.12 + var(--scene-power) * 0.5);
      transition: opacity 180ms linear;
    }

    .aurora-flare {
      position: absolute;
      top: 14%;
      left: 50%;
      width: min(64vw, 520px);
      height: min(48vw, 380px);
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle,
        rgb(var(--ray-rgb) / calc(0.06 + var(--scene-power) * 0.18)) 0%,
        rgb(var(--ray-rgb) / calc(0.03 + var(--scene-power) * 0.1)) 28%,
        rgb(var(--ray-rgb) / calc(0.01 + var(--scene-power) * 0.04)) 45%,
        transparent 70%);
      filter: blur(38px);
      opacity: calc(0.08 + var(--scene-power) * 0.66);
      pointer-events: none;
      z-index: 0;
      transition: opacity 180ms linear, background 180ms linear;
    }

    .aurora-rays {
      position: absolute;
      left: 50%;
      bottom: 36%;
      width: 140%;
      height: 80%;
      transform: translateX(-50%);
      background: conic-gradient(from 0deg at 50% 100%,
        transparent 0deg,
        rgb(var(--ray-rgb) / calc(0.01 + var(--scene-power) * 0.06)) 35deg,
        transparent 48deg,
        rgb(var(--ray-rgb) / calc(0.01 + var(--scene-power) * 0.038)) 85deg,
        transparent 104deg,
        rgb(var(--ray-rgb) / calc(0.01 + var(--scene-power) * 0.046)) 125deg,
        transparent 148deg,
        rgb(var(--ray-rgb) / calc(0.01 + var(--scene-power) * 0.052)) 215deg,
        transparent 226deg,
        rgb(var(--ray-rgb) / calc(0.01 + var(--scene-power) * 0.038)) 265deg,
        transparent 278deg);
      mix-blend-mode: screen;
      opacity: calc(0.05 + var(--scene-power) * 0.42);
      pointer-events: none;
      z-index: 0;
      transition: opacity 180ms linear, background 180ms linear;
    }

    .particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: rgb(var(--panel-glow-rgb) / calc(0.12 + var(--scene-power) * 0.7));
      box-shadow: 0 0 10px rgb(var(--panel-glow-rgb) / calc(0.04 + var(--scene-power) * 0.3));
      opacity: calc(0.08 + var(--scene-power) * 0.42);
      transition: opacity 180ms linear, background 180ms linear, box-shadow 180ms linear;
    }

    .particle:nth-child(1) { left: 20%; top: 28%; }
    .particle:nth-child(2) { left: 73%; top: 24%; }
    .particle:nth-child(3) { left: 52%; top: 42%; }

    [data-theme="light"] .wire-grid {
      background-image:
        linear-gradient(to right, rgba(41, 62, 90, 0.06) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(41, 62, 90, 0.06) 1px, transparent 1px);
    }

    .dial-shell {
      display: grid;
      place-items: center;
      width: min(100%, var(--dial-max-width));
      margin-inline: auto;
      margin-top: 2px;
      position: relative;
      z-index: 1;
    }

    .dial {
      container-type: inline-size;
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      position: relative;
      display: grid;
      place-items: center;
      border: 1px solid var(--line-strong);
      background:
        radial-gradient(circle at center,
          rgb(var(--panel-glow-rgb) / calc(0.02 + var(--scene-power) * 0.06)),
          transparent 62%);
      box-shadow:
        0 0 0 1px rgb(255 255 255 / calc(0.04 + var(--scene-power) * 0.16)),
        0 0 calc(10px + var(--scene-power) * 22px) rgb(var(--panel-glow-rgb) / calc(0.02 + var(--scene-power) * 0.08));
      overflow: hidden;
      transition: background 180ms linear, box-shadow 180ms linear, border-color 180ms linear;
    }

    .seg-ring {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .seg {
      position: absolute;
      inset: 0;
      transform: rotate(var(--deg));
    }

    .seg::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 7px;
      width: 2px;
      height: 10px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      opacity: 0.3;
      transition: background 160ms linear, opacity 160ms linear, box-shadow 160ms linear;
    }

    .seg.on::before {
      background: var(--accent);
      opacity: calc(0.44 + var(--ring-power) * 0.56);
      box-shadow: 0 0 calc(2px + var(--ring-power) * 8px) rgb(var(--panel-glow-rgb) / calc(0.08 + var(--ring-power) * 0.28));
    }

    .dial::before,
    .dial::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      border: 1px solid var(--line);
    }

    .dial::before {
      inset: 8%;
    }

    .dial::after {
      inset: 16%;
      border-color: rgba(255, 255, 255, 0.06);
    }

    .dial-brand {
      position: absolute;
      top: 25%;
      width: 68%;
      margin: 0;
      font-size: clamp(0.98rem, 5.4cqi, 1.58rem);
      letter-spacing: 0.12em;
      line-height: 1.05;
      text-align: center;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 800;
      z-index: 1;
    }

    .time {
      margin: 0;
      width: 72%;
      transform: translateY(14px);
      z-index: 1;
      font-size: clamp(3.4rem, 24.5cqi, 6.4rem);
      font-weight: 800;
      letter-spacing: 0.015em;
      line-height: 0.92;
      text-align: center;
      font-variant-numeric: tabular-nums;
      font-family: "Barlow Condensed", "Segoe UI", sans-serif;
      color: var(--text);
    }

    .meta {
      position: relative;
      z-index: 1;
      display: flex;
      width: var(--control-width);
      margin: 0 auto;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: nowrap;
    }

    .state {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.76rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 800;
    }

    .state::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #7b8390;
      box-shadow: 0 0 0 2px var(--accent-soft);
    }

    .state[data-status="running"]::before { background: #bac2ce; }
    .state[data-status="paused"]::before { background: #939dab; }
    .state[data-status="finished"]::before { background: #d3d9e2; }

    .inputs {
      position: relative;
      z-index: 1;
      width: var(--control-width);
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      align-items: start;
    }

    .input-wrap {
      display: grid;
      grid-template-rows: auto minmax(54px, auto);
      gap: 6px;
    }

    .input-wrap label {
      color: var(--muted);
      font-size: 0.74rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 800;
      text-align: center;
    }

    .input-wrap input {
      appearance: textfield;
      width: 100%;
      min-height: 54px;
      border: 1px solid var(--line-strong);
      border-radius: 11px;
      background: rgb(var(--panel-glow-rgb) / calc((0.01 + var(--scene-power) * 0.04) * var(--chrome-alpha)));
      color: var(--text);
      padding: 0 10px;
      text-align: center;
      font-size: clamp(1.18rem, 3.8vw, 1.5rem);
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      font-family: "Bahnschrift", "Segoe UI", "Noto Sans JP", sans-serif;
    }

    .action-row {
      position: relative;
      z-index: 1;
      width: var(--control-width);
      margin: 0 auto;
      display: block;
    }

    .controls {
      width: var(--control-width);
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .control {
      min-height: 54px;
      border-radius: 12px;
      border: 1px solid var(--line-strong);
      background: rgb(var(--panel-glow-rgb) / calc((0.01 + var(--scene-power) * 0.04) * var(--chrome-alpha)));
      color: var(--text);
      font-size: 1.5rem;
      font-weight: 900;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      line-height: 1;
      font-family: "Segoe UI Symbol", "Bahnschrift", "Segoe UI", sans-serif;
      transition: border-color 120ms ease, transform 120ms ease, background 120ms ease;
    }

    .control:hover {
      border-color: var(--accent);
      background: rgb(var(--panel-glow-rgb) / calc((0.01 + var(--scene-power) * 0.03) * var(--chrome-alpha)));
    }

    .control:active { transform: translateY(1px); }

    .control.primary {
      background: linear-gradient(180deg,
        rgb(var(--panel-glow-rgb) / calc((0.12 + var(--scene-power) * 0.16) * var(--chrome-alpha))),
        rgb(var(--panel-glow-rgb) / calc((0.08 + var(--scene-power) * 0.1) * var(--chrome-alpha))));
      border-color: rgba(255, 255, 255, 0.26);
      color: var(--text);
    }

    .theme-dock {
      width: fit-content;
      flex: 0 0 auto;
      padding: 3px;
      border-radius: 999px;
      border: 1px solid var(--line-strong);
      box-shadow: inset 0 0 0 1px rgb(255 255 255 / calc((0.02 + var(--scene-power) * 0.05) * var(--chrome-alpha)));
      background: rgb(var(--panel-glow-rgb) / calc((0.01 + var(--scene-power) * 0.03) * var(--chrome-alpha)));
    }

    .theme {
      appearance: none;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgb(var(--panel-glow-rgb) / calc((0.01 + var(--scene-power) * 0.05) * var(--chrome-alpha)));
      color: var(--text);
      min-width: 172px;
      padding: 9px 12px;
      font-size: 0.86rem;
      font-weight: 700;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 12px;
      transform: translateX(-50%) translateY(16px);
      opacity: 0;
      border: 1px solid var(--line-strong);
      border-radius: 10px;
      background: rgba(18, 18, 18, 0.88);
      color: var(--text);
      padding: 9px 12px;
      max-width: min(92vw, 580px);
      font-size: 0.88rem;
      pointer-events: none;
      z-index: 99;
      transition: opacity 160ms ease, transform 160ms ease;
      backdrop-filter: blur(8px);
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .theme:focus-visible,
    .input-wrap input:focus-visible,
    .control:focus-visible {
      outline: 2px solid rgba(157, 167, 182, 0.7);
      outline-offset: 2px;
    }

    @media (max-width: 520px) {
      body {
        padding:
          calc(env(safe-area-inset-top) + 8px)
          8px
          calc(env(safe-area-inset-bottom) + 8px);
      }
      .dial-shell { width: 100%; }
      .meta {
        width: 100%;
        gap: 8px;
      }
      .inputs,
      .action-row,
      .controls {
        width: 100%;
      }
      .theme { min-width: 0; width: 100%; }
      .app { padding: 10px; }
      .stage { padding: 10px; gap: 8px; }
      .control { min-height: 50px; }
    }

    @media (max-height: 820px) {
      .stage { gap: 8px; }
      .dial-shell { width: min(100%, 360px); }
      .dial-brand {
        top: 25%;
      }
      .time {
        transform: translateY(12px);
      }
      .control { min-height: 48px; }
      .input-wrap input { padding: 8px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="stage" aria-live="polite">
      <div class="aurora-flare" aria-hidden="true"></div>
      <div class="aurora-rays" aria-hidden="true"></div>
      <div class="particles" aria-hidden="true">
        <span class="particle"></span>
        <span class="particle"></span>
        <span class="particle"></span>
      </div>
      <div class="wire-grid" aria-hidden="true"></div>
      <div class="scene-sweep" aria-hidden="true"></div>

      <div class="dial-shell">
        <div id="dial" class="dial" style="--p: 0;">
          <div id="segRing" class="seg-ring" aria-hidden="true"></div>
          <p class="dial-brand">Monolith Timer</p>
          <p id="timeText" class="time">30:00</p>
        </div>
      </div>

      <div class="meta">
        <span id="statusText" class="state" data-status="stopped">stopped</span>
        <div class="theme-dock">
          <select id="themeSelect" class="theme" aria-label="Theme">
            <option value="dark">Dark</option>
            <option value="light">Light</option>
            <option value="darkcity">Dark - City</option>
            <option value="lightcity">Light - City</option>
          </select>
        </div>
      </div>

      <div class="inputs">
        <div class="input-wrap">
          <label for="minutesInput">MIN</label>
          <input id="minutesInput" type="number" min="0" max="99" step="1" inputmode="numeric" value="5">
        </div>
        <div class="input-wrap">
          <label for="secondsInput">SEC</label>
          <input id="secondsInput" type="number" min="0" max="59" step="1" inputmode="numeric" value="0">
        </div>
      </div>

      <div class="action-row">
        <div id="controls" class="controls"></div>
      </div>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="assertive"></div>

  <script>
    (() => {
      const STATUS = { STOPPED: "stopped", RUNNING: "running", PAUSED: "paused", FINISHED: "finished" };
      const ICON = { START: "▶", PAUSE: "⏸", END: "■", RESUME: "▶", RESTART: "▶" };
      const CITY_IMAGE_URLS = [
        "https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?auto=format&fit=crop&w=1600&q=80",
        "https://images.unsplash.com/photo-1479839672679-a46483c0e7c8?auto=format&fit=crop&w=1600&q=80",
        "https://images.unsplash.com/photo-1465447142348-e9952c393450?auto=format&fit=crop&w=1600&q=80",
        "https://images.unsplash.com/photo-1449824913935-59a10b8d2000?auto=format&fit=crop&w=1600&q=80",
        "https://images.unsplash.com/photo-1499092346589-b9b6be3e94b2?auto=format&fit=crop&w=1600&q=80"
      ];

      const el = {
        stage: document.querySelector(".stage"),
        dial: document.getElementById("dial"),
        themeSelect: document.getElementById("themeSelect"),
        statusText: document.getElementById("statusText"),
        minutesInput: document.getElementById("minutesInput"),
        secondsInput: document.getElementById("secondsInput"),
        timeText: document.getElementById("timeText"),
        controls: document.getElementById("controls"),
        segRing: document.getElementById("segRing"),
        toast: document.getElementById("toast")
      };

      const state = {
        status: STATUS.STOPPED,
        durationSec: 1800,
        remainingSec: 1800,
        remainingMs: 1800 * 1000,
        cityPhotoIndex: -1,
        intervalId: null,
        endAtMs: 0,
        toastTimer: null
      };

      const clamp = (v, min, max) => Math.min(max, Math.max(min, v));
      const two = (n) => String(n).padStart(2, "0");
      const fmt = (sec) => `${two(Math.floor(sec / 60))}:${two(sec % 60)}`;
      const SEG_COUNT = 60;
      let segNodes = [];

      function isCityTheme(mode) {
        return mode === "darkcity" || mode === "lightcity";
      }

      function applyCityPhoto(index) {
        state.cityPhotoIndex = index;
        document.documentElement.style.setProperty("--photo-image", `url("${CITY_IMAGE_URLS[index]}")`);
      }

      function pickRandomCityPhoto(forceChange = false) {
        if (CITY_IMAGE_URLS.length === 0) return;
        let nextIndex = Math.floor(Math.random() * CITY_IMAGE_URLS.length);
        if (forceChange && CITY_IMAGE_URLS.length > 1) {
          while (nextIndex === state.cityPhotoIndex) {
            nextIndex = Math.floor(Math.random() * CITY_IMAGE_URLS.length);
          }
        }
        applyCityPhoto(nextIndex);
      }

      function getProgressRatio() {
        if (state.status === STATUS.FINISHED) return 1;
        if ((state.status === STATUS.RUNNING || state.status === STATUS.PAUSED) && state.durationSec > 0) {
          const totalMs = state.durationSec * 1000;
          return clamp(1 - (state.remainingMs / totalMs), 0, 1);
        }
        return 0;
      }

      function getDisplayProgressRatio() {
        if (state.status === STATUS.FINISHED) return 1;
        if ((state.status === STATUS.RUNNING || state.status === STATUS.PAUSED) && state.durationSec > 0) {
          return clamp((state.durationSec - state.remainingSec) / state.durationSec, 0, 1);
        }
        return 0;
      }

      function applySceneProgress() {
        const progress = getProgressRatio();
        const displayProgress = getDisplayProgressRatio();
        const remaining = 1 - progress;
        const dimProgress = displayProgress <= 0 ? 0 : Math.pow(displayProgress, 0.94);
        const power = Math.max(0.16, 1 - dimProgress * 0.84);
        const sweepOpacity = displayProgress <= 0 ? 0 : Math.min(0.52, 0.14 + dimProgress * 0.24);

        document.documentElement.style.setProperty("--scene-progress", progress.toFixed(4));
        document.documentElement.style.setProperty("--scene-dim", dimProgress.toFixed(4));
        document.documentElement.style.setProperty("--scene-power", power.toFixed(4));
        document.documentElement.style.setProperty("--scene-angle", `${(displayProgress * 360).toFixed(2)}deg`);
        document.documentElement.style.setProperty("--scene-sweep-opacity", sweepOpacity.toFixed(4));
        document.documentElement.style.setProperty("--ring-power", Math.max(0.2, remaining).toFixed(4));

        return { progress, remaining };
      }

      function updateSweepOrigin() {
        const stageRect = el.stage.getBoundingClientRect();
        const dialRect = el.dial.getBoundingClientRect();
        const centerX = ((dialRect.left + (dialRect.width / 2)) - stageRect.left) / stageRect.width;
        const centerY = ((dialRect.top + (dialRect.height / 2)) - stageRect.top) / stageRect.height;

        el.stage.style.setProperty("--sweep-origin-x", `${(centerX * 100).toFixed(2)}%`);
        el.stage.style.setProperty("--sweep-origin-y", `${(centerY * 100).toFixed(2)}%`);
      }

      function setupSegments() {
        const frag = document.createDocumentFragment();
        for (let i = 0; i < SEG_COUNT; i++) {
          const s = document.createElement("span");
          s.className = "seg";
          s.style.setProperty("--deg", `${(360 / SEG_COUNT) * i}deg`);
          frag.appendChild(s);
          segNodes.push(s);
        }
        el.segRing.innerHTML = "";
        el.segRing.appendChild(frag);
      }

      function parseInputs() {
        const min = clamp(parseInt(el.minutesInput.value || "0", 10) || 0, 0, 99);
        const sec = clamp(parseInt(el.secondsInput.value || "0", 10) || 0, 0, 59);
        el.minutesInput.value = String(min);
        el.secondsInput.value = String(sec);
        return min * 60 + sec;
      }

      function syncInputs(totalSec) {
        const safe = Math.max(0, totalSec | 0);
        el.minutesInput.value = String(Math.floor(safe / 60));
        el.secondsInput.value = String(safe % 60);
      }

      function setProgress() {
        const { progress } = applySceneProgress();
        const offCount = Math.min(SEG_COUNT, Math.floor(progress * SEG_COUNT + 0.0001));
        for (let i = 0; i < SEG_COUNT; i++) {
          segNodes[i].classList.toggle("on", i >= offCount);
        }
      }

      function renderTime() {
        el.timeText.textContent = fmt(Math.max(0, state.remainingSec));
        setProgress();
      }

      function showToast(msg) {
        if (state.toastTimer) clearTimeout(state.toastTimer);
        el.toast.textContent = msg;
        el.toast.classList.add("show");
        state.toastTimer = setTimeout(() => el.toast.classList.remove("show"), 2400);
      }

      function stopTicker() {
        if (state.intervalId) {
          clearInterval(state.intervalId);
          state.intervalId = null;
        }
      }

      function setStatus(status) {
        state.status = status;
        el.statusText.dataset.status = status;
        el.statusText.textContent = status;
        const editable = status === STATUS.STOPPED || status === STATUS.FINISHED;
        el.minutesInput.disabled = !editable;
        el.secondsInput.disabled = !editable;
        renderControls();
      }

      function tick() {
        state.remainingMs = Math.max(0, state.endAtMs - Date.now());
        const left = Math.ceil(state.remainingMs / 1000);
        state.remainingSec = Math.max(0, left);
        renderTime();
        if (state.remainingSec <= 0) handleFinish();
      }

      function startWith(seconds) {
        const safe = Math.max(1, seconds | 0);
        stopTicker();
        state.durationSec = safe;
        state.remainingSec = safe;
        state.remainingMs = safe * 1000;
        state.endAtMs = Date.now() + state.remainingMs;
        renderTime();
        setStatus(STATUS.RUNNING);
        state.intervalId = setInterval(tick, 200);
      }

      function handleFinish() {
        stopTicker();
        state.remainingSec = 0;
        state.remainingMs = 0;
        renderTime();
        setStatus(STATUS.FINISHED);
        notifyDone();
      }

      function startFromInputs() {
        const sec = parseInputs();
        if (sec <= 0) {
          showToast("set 1 sec or more");
          return;
        }
        startWith(sec);
      }

      function pauseTimer() {
        if (state.status !== STATUS.RUNNING) return;
        tick();
        stopTicker();
        setStatus(STATUS.PAUSED);
      }

      function resumeTimer() {
        if (state.status !== STATUS.PAUSED) return;
        state.endAtMs = Date.now() + state.remainingMs;
        setStatus(STATUS.RUNNING);
        state.intervalId = setInterval(tick, 200);
      }

      function endToStopped() {
        stopTicker();
        state.remainingSec = state.durationSec;
        state.remainingMs = state.durationSec * 1000;
        syncInputs(state.durationSec);
        renderTime();
        setStatus(STATUS.STOPPED);
      }

      function restartFromInputs() {
        startFromInputs();
      }

      function notifyDone() {
        showToast("timer finished");
      }

      function mkControl(icon, ariaLabel, onClick, primary = false) {
        const b = document.createElement("button");
        b.type = "button";
        b.className = `control${primary ? " primary" : ""}`;
        b.textContent = icon;
        b.title = ariaLabel;
        b.setAttribute("aria-label", ariaLabel);
        b.addEventListener("click", onClick);
        return b;
      }

      function renderControls() {
        el.controls.innerHTML = "";
        if (state.status === STATUS.STOPPED) {
          el.controls.append(mkControl(ICON.START, "start", startFromInputs, true));
          el.controls.append(mkControl(ICON.END, "end", endToStopped));
        } else if (state.status === STATUS.RUNNING) {
          el.controls.append(mkControl(ICON.PAUSE, "pause", pauseTimer));
          el.controls.append(mkControl(ICON.END, "end", endToStopped));
        } else if (state.status === STATUS.PAUSED) {
          el.controls.append(mkControl(ICON.RESUME, "resume", resumeTimer, true));
          el.controls.append(mkControl(ICON.END, "end", endToStopped));
        } else if (state.status === STATUS.FINISHED) {
          el.controls.append(mkControl(ICON.RESTART, "resume", restartFromInputs, true));
          el.controls.append(mkControl(ICON.END, "end", endToStopped));
        }
      }

      function applyTheme(mode, previousMode = "") {
        if (isCityTheme(mode)) {
          const enteringCity = !isCityTheme(previousMode);
          if (enteringCity || state.cityPhotoIndex < 0) {
            pickRandomCityPhoto(enteringCity);
          }
        }
        document.documentElement.setAttribute("data-theme", mode);
      }

      function initTheme() {
        const saved = localStorage.getItem("monolith_theme") || "dark";
        const allowedThemes = ["dark", "light", "darkcity", "lightcity"];
        const normalized = allowedThemes.includes(saved) ? saved : "dark";
        el.themeSelect.value = normalized;
        applyTheme(normalized);
      }

      function onInputChange() {
        const sec = parseInputs();
        state.durationSec = sec;
        state.remainingSec = sec;
        state.remainingMs = sec * 1000;
        renderTime();
      }

      function init() {
        syncInputs(1800);
        setupSegments();
        renderTime();
        setStatus(STATUS.STOPPED);
        initTheme();
        updateSweepOrigin();

        el.themeSelect.addEventListener("change", (e) => {
          const previousMode = document.documentElement.getAttribute("data-theme") || "dark";
          const mode = e.target.value;
          localStorage.setItem("monolith_theme", mode);
          applyTheme(mode, previousMode);
        });

        el.minutesInput.addEventListener("change", onInputChange);
        el.secondsInput.addEventListener("change", onInputChange);
        window.addEventListener("resize", updateSweepOrigin);
      }

      init();
    })();
  </script>
</body>
</html>
