<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>MONOLITH TIMER</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #11151c;
      --bg-2: #1a212c;
      --panel: rgba(34, 42, 55, 0.82);
      --line: rgba(255, 255, 255, 0.13);
      --line-strong: rgba(255, 255, 255, 0.24);
      --text: #e1e8f4;
      --muted: #98a4b8;
      --accent: #d8e3f4;
      --accent-soft: rgba(216, 227, 244, 0.18);
      --ink: #0d1219;
      --shadow: 0 24px 72px rgba(0, 0, 0, 0.42);
      --scene-progress: 0;
      --scene-dim: 0;
      --scene-power: 1;
      --scene-angle: 0deg;
      --ring-power: 1;
      --sweep-shade: 4 7 12;
      --body-glow-rgb: 214 225 246;
      --panel-glow-rgb: 233 240 255;
      --ray-rgb: 223 233 255;
    }

    [data-theme="light"] {
      color-scheme: light;
      --bg: #f4f7fb;
      --bg-2: #ffffff;
      --panel: rgba(255, 255, 255, 0.88);
      --line: rgba(29, 39, 52, 0.12);
      --line-strong: rgba(29, 39, 52, 0.22);
      --text: #1f2733;
      --muted: #667385;
      --accent: #384659;
      --accent-soft: rgba(56, 70, 89, 0.12);
      --ink: #ffffff;
      --shadow: 0 24px 58px rgba(24, 38, 56, 0.14);
      --sweep-shade: 190 200 215;
      --body-glow-rgb: 130 160 208;
      --panel-glow-rgb: 103 125 156;
      --ray-rgb: 106 131 165;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Bahnschrift", "Segoe UI", "Noto Sans JP", sans-serif;
      color: var(--text);
      background:
        conic-gradient(from 0deg at 50% 46%,
          rgb(var(--sweep-shade) / calc(0.02 + var(--scene-dim) * 0.34)) 0deg,
          rgb(var(--sweep-shade) / calc(0.02 + var(--scene-dim) * 0.34)) var(--scene-angle),
          transparent calc(var(--scene-angle) + 18deg),
          transparent 360deg),
        radial-gradient(120vw 90vh at 50% -10%,
          rgb(var(--body-glow-rgb) / calc(0.11 + var(--scene-power) * 0.18)),
          transparent 58%),
        radial-gradient(90vw 70vh at 100% 0%,
          rgb(var(--body-glow-rgb) / calc(0.04 + var(--scene-power) * 0.12)),
          transparent 62%),
        linear-gradient(180deg, var(--bg), var(--bg-2));
      overflow-x: hidden;
      transition: background 180ms linear;
    }

    body {
      display: grid;
      place-items: start center;
      min-height: 100dvh;
      padding: clamp(12px, 2.2vw, 24px);
    }

    .app {
      width: min(920px, 100%);
      max-height: calc(100svh - 24px);
      border: 1px solid var(--line);
      border-radius: 22px;
      background:
        conic-gradient(from 0deg at 50% 50%,
          rgb(var(--sweep-shade) / calc(0.03 + var(--scene-dim) * 0.4)) 0deg,
          rgb(var(--sweep-shade) / calc(0.03 + var(--scene-dim) * 0.4)) var(--scene-angle),
          transparent calc(var(--scene-angle) + 18deg),
          transparent 360deg),
        linear-gradient(160deg,
          rgb(var(--panel-glow-rgb) / calc(0.12 + var(--scene-power) * 0.16)),
          rgb(var(--panel-glow-rgb) / calc(0.04 + var(--scene-power) * 0.05)) 38%,
          rgb(var(--panel-glow-rgb) / calc(0.06 + var(--scene-power) * 0.1))),
        var(--panel);
      backdrop-filter: blur(16px) saturate(115%);
      -webkit-backdrop-filter: blur(16px) saturate(115%);
      box-shadow:
        0 24px 72px rgb(0 0 0 / calc(0.18 + var(--scene-power) * 0.24)),
        0 0 calc(10px + var(--scene-power) * 28px) rgb(var(--panel-glow-rgb) / calc(0.01 + var(--scene-power) * 0.05));
      padding: clamp(12px, 2.5vw, 22px);
      display: grid;
      gap: 12px;
      overflow: auto;
      position: relative;
      transition: background 180ms linear, box-shadow 180ms linear, border-color 180ms linear;
    }

    .app::before,
    .app::after {
      content: "";
      position: absolute;
      pointer-events: none;
      border: 1px solid var(--line);
      border-radius: 20px;
      inset: 6px;
      opacity: calc(0.18 + var(--scene-power) * 0.52);
    }

    .app::after {
      inset: 12px;
      border-color: rgba(255, 255, 255, 0.03);
      opacity: calc(0.2 + var(--scene-power) * 0.42);
    }

    .stage {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: clamp(12px, 2.4vw, 18px);
      display: grid;
      gap: 10px;
      position: relative;
      background:
        conic-gradient(from 0deg at 50% 44%,
          rgb(var(--sweep-shade) / calc(0.02 + var(--scene-dim) * 0.32)) 0deg,
          rgb(var(--sweep-shade) / calc(0.02 + var(--scene-dim) * 0.32)) var(--scene-angle),
          transparent calc(var(--scene-angle) + 16deg),
          transparent 360deg),
        radial-gradient(120% 82% at 50% 0%,
          rgb(var(--panel-glow-rgb) / calc(0.06 + var(--scene-power) * 0.16)),
          rgb(var(--panel-glow-rgb) / calc(0.02 + var(--scene-power) * 0.05)) 48%,
          transparent 100%),
        linear-gradient(180deg,
          rgb(var(--panel-glow-rgb) / calc(0.03 + var(--scene-power) * 0.08)),
          rgb(var(--panel-glow-rgb) / 0));
      box-shadow: inset 0 1px 0 rgb(255 255 255 / calc(0.03 + var(--scene-power) * 0.1));
      overflow: hidden;
      transition: background 180ms linear, box-shadow 180ms linear, border-color 180ms linear;
    }

    .wire-grid {
      position: absolute;
      inset: 0;
      pointer-events: none;
      border-radius: inherit;
      background-image:
        linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 22px 22px;
      mask-image: radial-gradient(circle at 50% 35%, black 45%, transparent 85%);
      opacity: calc(0.12 + var(--scene-power) * 0.5);
      transition: opacity 180ms linear;
    }

    .aurora-flare {
      position: absolute;
      top: 14%;
      left: 50%;
      width: min(64vw, 520px);
      height: min(48vw, 380px);
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle,
        rgb(var(--ray-rgb) / calc(0.06 + var(--scene-power) * 0.18)) 0%,
        rgb(var(--ray-rgb) / calc(0.03 + var(--scene-power) * 0.1)) 28%,
        rgb(var(--ray-rgb) / calc(0.01 + var(--scene-power) * 0.04)) 45%,
        transparent 70%);
      filter: blur(38px);
      opacity: calc(0.08 + var(--scene-power) * 0.66);
      pointer-events: none;
      z-index: 0;
      transition: opacity 180ms linear, background 180ms linear;
    }

    .aurora-rays {
      position: absolute;
      left: 50%;
      bottom: 36%;
      width: 140%;
      height: 80%;
      transform: translateX(-50%);
      background: conic-gradient(from 0deg at 50% 100%,
        transparent 0deg,
        rgb(var(--ray-rgb) / calc(0.01 + var(--scene-power) * 0.06)) 35deg,
        transparent 48deg,
        rgb(var(--ray-rgb) / calc(0.01 + var(--scene-power) * 0.038)) 85deg,
        transparent 104deg,
        rgb(var(--ray-rgb) / calc(0.01 + var(--scene-power) * 0.046)) 125deg,
        transparent 148deg,
        rgb(var(--ray-rgb) / calc(0.01 + var(--scene-power) * 0.052)) 215deg,
        transparent 226deg,
        rgb(var(--ray-rgb) / calc(0.01 + var(--scene-power) * 0.038)) 265deg,
        transparent 278deg);
      mix-blend-mode: screen;
      opacity: calc(0.05 + var(--scene-power) * 0.42);
      pointer-events: none;
      z-index: 0;
      transition: opacity 180ms linear, background 180ms linear;
    }

    .particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: rgb(var(--panel-glow-rgb) / calc(0.12 + var(--scene-power) * 0.7));
      box-shadow: 0 0 10px rgb(var(--panel-glow-rgb) / calc(0.04 + var(--scene-power) * 0.3));
      opacity: calc(0.08 + var(--scene-power) * 0.42);
      transition: opacity 180ms linear, background 180ms linear, box-shadow 180ms linear;
    }

    .particle:nth-child(1) { left: 20%; top: 28%; }
    .particle:nth-child(2) { left: 73%; top: 24%; }
    .particle:nth-child(3) { left: 52%; top: 42%; }

    [data-theme="light"] .wire-grid {
      background-image:
        linear-gradient(to right, rgba(41, 62, 90, 0.06) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(41, 62, 90, 0.06) 1px, transparent 1px);
    }

    .dial-shell {
      display: grid;
      place-items: center;
      margin-top: 2px;
      position: relative;
      z-index: 1;
    }

    .dial {
      width: min(64vw, 360px);
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      position: relative;
      display: grid;
      place-items: center;
      border: 1px solid var(--line-strong);
      background:
        radial-gradient(circle at center,
          rgb(var(--panel-glow-rgb) / calc(0.02 + var(--scene-power) * 0.06)),
          transparent 62%);
      box-shadow:
        0 0 0 1px rgb(255 255 255 / calc(0.04 + var(--scene-power) * 0.16)),
        0 0 calc(10px + var(--scene-power) * 22px) rgb(var(--panel-glow-rgb) / calc(0.02 + var(--scene-power) * 0.08));
      overflow: hidden;
      transition: background 180ms linear, box-shadow 180ms linear, border-color 180ms linear;
    }

    .seg-ring {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .seg {
      position: absolute;
      inset: 0;
      transform: rotate(var(--deg));
    }

    .seg::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 7px;
      width: 2px;
      height: 10px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      opacity: 0.3;
      transition: background 160ms linear, opacity 160ms linear, box-shadow 160ms linear;
    }

    .seg.on::before {
      background: var(--accent);
      opacity: calc(0.44 + var(--ring-power) * 0.56);
      box-shadow: 0 0 calc(2px + var(--ring-power) * 8px) rgb(var(--panel-glow-rgb) / calc(0.08 + var(--ring-power) * 0.28));
    }

    .dial::before,
    .dial::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      border: 1px solid var(--line);
    }

    .dial::before {
      inset: 8%;
    }

    .dial::after {
      inset: 16%;
      border-color: rgba(255, 255, 255, 0.06);
    }

    .dial-brand {
      position: absolute;
      top: 30%;
      margin: 0;
      font-size: clamp(0.52rem, 1.4vw, 0.74rem);
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 800;
      z-index: 1;
    }

    .time {
      margin: 0;
      transform: translateY(8px);
      z-index: 1;
      font-size: clamp(2.45rem, 11vw, 5.4rem);
      font-weight: 900;
      letter-spacing: 0.08em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      color: var(--text);
    }

    .meta {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .state {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.76rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 800;
    }

    .state::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #7b8390;
      box-shadow: 0 0 0 2px var(--accent-soft);
    }

    .state[data-status="running"]::before { background: #bac2ce; }
    .state[data-status="paused"]::before { background: #939dab; }
    .state[data-status="finished"]::before { background: #d3d9e2; }

    .icon-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1px solid var(--line-strong);
      background: rgb(var(--panel-glow-rgb) / calc(0.01 + var(--scene-power) * 0.05));
      color: var(--text);
      font-size: 1.04rem;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: border-color 120ms ease, transform 120ms ease;
      box-shadow: inset 0 1px 0 rgb(255 255 255 / calc(0.02 + var(--scene-power) * 0.08));
    }

    .icon-btn:hover { border-color: var(--accent); }
    .icon-btn:active { transform: translateY(1px); }

    .inputs {
      position: relative;
      z-index: 1;
      width: min(440px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(2, minmax(120px, 1fr));
      gap: 10px;
    }

    .input-wrap { display: grid; gap: 6px; }

    .input-wrap label {
      color: var(--muted);
      font-size: 0.74rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 800;
    }

    .input-wrap input {
      width: 100%;
      border: 1px solid var(--line-strong);
      border-radius: 11px;
      background: rgb(var(--panel-glow-rgb) / calc(0.01 + var(--scene-power) * 0.04));
      color: var(--text);
      padding: 10px;
      text-align: center;
      font-size: clamp(1.05rem, 3.8vw, 1.5rem);
      font-weight: 900;
      font-variant-numeric: tabular-nums;
    }

    .action-row {
      position: relative;
      z-index: 1;
      width: min(620px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 10px;
    }

    .controls {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(2, minmax(110px, 1fr));
      gap: 10px;
    }

    .control {
      min-height: 54px;
      border-radius: 12px;
      border: 1px solid var(--line-strong);
      background: rgb(var(--panel-glow-rgb) / calc(0.01 + var(--scene-power) * 0.04));
      color: var(--text);
      font-size: 1.18rem;
      font-weight: 900;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: border-color 120ms ease, transform 120ms ease, background 120ms ease;
    }

    .control:hover {
      border-color: var(--accent);
      background: rgb(var(--panel-glow-rgb) / calc(0.01 + var(--scene-power) * 0.03));
    }

    .control:active { transform: translateY(1px); }

    .control.primary {
      background: linear-gradient(180deg,
        rgb(var(--panel-glow-rgb) / calc(0.12 + var(--scene-power) * 0.16)),
        rgb(var(--panel-glow-rgb) / calc(0.08 + var(--scene-power) * 0.1)));
      border-color: rgba(255, 255, 255, 0.26);
      color: #e2e2e2;
    }

    .theme-dock {
      width: fit-content;
      padding: 3px;
      border-radius: 999px;
      border: 1px solid var(--line-strong);
      box-shadow: inset 0 0 0 1px rgb(255 255 255 / calc(0.02 + var(--scene-power) * 0.05));
      background: rgb(var(--panel-glow-rgb) / calc(0.01 + var(--scene-power) * 0.03));
    }

    .theme {
      appearance: none;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgb(var(--panel-glow-rgb) / calc(0.01 + var(--scene-power) * 0.05));
      color: var(--text);
      min-width: 140px;
      padding: 9px 12px;
      font-size: 0.86rem;
      font-weight: 700;
    }

    .hint {
      position: relative;
      z-index: 1;
      margin: 2px 0 0;
      text-align: center;
      color: var(--muted);
      font-size: 0.82rem;
      letter-spacing: 0.03em;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 12px;
      transform: translateX(-50%) translateY(16px);
      opacity: 0;
      border: 1px solid var(--line-strong);
      border-radius: 10px;
      background: rgba(18, 18, 18, 0.88);
      color: var(--text);
      padding: 9px 12px;
      max-width: min(92vw, 580px);
      font-size: 0.88rem;
      pointer-events: none;
      z-index: 99;
      transition: opacity 160ms ease, transform 160ms ease;
      backdrop-filter: blur(8px);
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .theme:focus-visible,
    .icon-btn:focus-visible,
    .input-wrap input:focus-visible,
    .control:focus-visible {
      outline: 2px solid rgba(157, 167, 182, 0.7);
      outline-offset: 2px;
    }

    @media (max-width: 520px) {
      .dial { width: min(74vw, 336px); }
      .action-row { grid-template-columns: 1fr; }
      .controls { grid-template-columns: 1fr; }
      .theme-dock { justify-self: stretch; }
      .theme { width: 100%; }
      .app { max-height: calc(100svh - 16px); }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="stage" aria-live="polite">
      <div class="aurora-flare" aria-hidden="true"></div>
      <div class="aurora-rays" aria-hidden="true"></div>
      <div class="particles" aria-hidden="true">
        <span class="particle"></span>
        <span class="particle"></span>
        <span class="particle"></span>
      </div>
      <div class="wire-grid" aria-hidden="true"></div>

      <div class="dial-shell">
        <div id="dial" class="dial" style="--p: 0;">
          <div id="segRing" class="seg-ring" aria-hidden="true"></div>
          <p class="dial-brand">Monolith Timer</p>
          <p id="timeText" class="time">30:00</p>
        </div>
      </div>

      <div class="meta">
        <span id="statusText" class="state" data-status="stopped">stopped</span>
        <button id="notifyBtn" class="icon-btn" type="button" title="Enable notifications" aria-label="Enable notifications">🔔</button>
      </div>

      <div class="inputs">
        <div class="input-wrap">
          <label for="minutesInput">MIN</label>
          <input id="minutesInput" type="number" min="0" max="99" step="1" inputmode="numeric" value="5">
        </div>
        <div class="input-wrap">
          <label for="secondsInput">SEC</label>
          <input id="secondsInput" type="number" min="0" max="59" step="1" inputmode="numeric" value="0">
        </div>
      </div>

      <div class="action-row">
        <div id="controls" class="controls"></div>
        <div class="theme-dock">
          <select id="themeSelect" class="theme" aria-label="Theme">
            <option value="dark">Dark</option>
            <option value="light">Light</option>
            <option value="device">Device</option>
          </select>
        </div>
      </div>

      <p id="hint" class="hint">▶ start / ⏸ pause / ■ end / ▶ resume</p>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="assertive"></div>

  <script>
    (() => {
      const STATUS = { STOPPED: "stopped", RUNNING: "running", PAUSED: "paused", FINISHED: "finished" };
      const ICON = { START: "▶", PAUSE: "⏸", END: "■", RESUME: "▶", RESTART: "▶" };

      const el = {
        themeSelect: document.getElementById("themeSelect"),
        statusText: document.getElementById("statusText"),
        notifyBtn: document.getElementById("notifyBtn"),
        minutesInput: document.getElementById("minutesInput"),
        secondsInput: document.getElementById("secondsInput"),
        timeText: document.getElementById("timeText"),
        controls: document.getElementById("controls"),
        segRing: document.getElementById("segRing"),
        toast: document.getElementById("toast")
      };

      const state = {
        status: STATUS.STOPPED,
        durationSec: 1800,
        remainingSec: 1800,
        intervalId: null,
        endAtMs: 0,
        toastTimer: null
      };

      const clamp = (v, min, max) => Math.min(max, Math.max(min, v));
      const two = (n) => String(n).padStart(2, "0");
      const fmt = (sec) => `${two(Math.floor(sec / 60))}:${two(sec % 60)}`;
      const SEG_COUNT = 60;
      let segNodes = [];

      function getProgressRatio() {
        if (state.status === STATUS.FINISHED) return 1;
        if ((state.status === STATUS.RUNNING || state.status === STATUS.PAUSED) && state.durationSec > 0) {
          return clamp((state.durationSec - state.remainingSec) / state.durationSec, 0, 1);
        }
        return 0;
      }

      function applySceneProgress() {
        const progress = getProgressRatio();
        const remaining = 1 - progress;
        const power = Math.max(0.16, 1 - progress * 0.84);

        document.documentElement.style.setProperty("--scene-progress", progress.toFixed(4));
        document.documentElement.style.setProperty("--scene-dim", progress.toFixed(4));
        document.documentElement.style.setProperty("--scene-power", power.toFixed(4));
        document.documentElement.style.setProperty("--scene-angle", `${(progress * 360).toFixed(2)}deg`);
        document.documentElement.style.setProperty("--ring-power", Math.max(0.2, remaining).toFixed(4));

        return { progress, remaining };
      }

      function setupSegments() {
        const frag = document.createDocumentFragment();
        for (let i = 0; i < SEG_COUNT; i++) {
          const s = document.createElement("span");
          s.className = "seg";
          s.style.setProperty("--deg", `${(360 / SEG_COUNT) * i}deg`);
          frag.appendChild(s);
          segNodes.push(s);
        }
        el.segRing.innerHTML = "";
        el.segRing.appendChild(frag);
      }

      function parseInputs() {
        const min = clamp(parseInt(el.minutesInput.value || "0", 10) || 0, 0, 99);
        const sec = clamp(parseInt(el.secondsInput.value || "0", 10) || 0, 0, 59);
        el.minutesInput.value = String(min);
        el.secondsInput.value = String(sec);
        return min * 60 + sec;
      }

      function syncInputs(totalSec) {
        const safe = Math.max(0, totalSec | 0);
        el.minutesInput.value = String(Math.floor(safe / 60));
        el.secondsInput.value = String(safe % 60);
      }

      function setProgress() {
        const { remaining } = applySceneProgress();
        const onCount = Math.round(clamp(remaining, 0, 1) * SEG_COUNT);
        const offCount = SEG_COUNT - onCount;
        for (let i = 0; i < SEG_COUNT; i++) {
          segNodes[i].classList.toggle("on", i >= offCount);
        }
      }

      function renderTime() {
        el.timeText.textContent = fmt(Math.max(0, state.remainingSec));
        setProgress();
      }

      function showToast(msg) {
        if (state.toastTimer) clearTimeout(state.toastTimer);
        el.toast.textContent = msg;
        el.toast.classList.add("show");
        state.toastTimer = setTimeout(() => el.toast.classList.remove("show"), 2400);
      }

      function stopTicker() {
        if (state.intervalId) {
          clearInterval(state.intervalId);
          state.intervalId = null;
        }
      }

      function setStatus(status) {
        state.status = status;
        el.statusText.dataset.status = status;
        el.statusText.textContent = status;
        const editable = status === STATUS.STOPPED || status === STATUS.FINISHED;
        el.minutesInput.disabled = !editable;
        el.secondsInput.disabled = !editable;
        renderControls();
      }

      function tick() {
        const left = Math.ceil((state.endAtMs - Date.now()) / 1000);
        state.remainingSec = Math.max(0, left);
        renderTime();
        if (state.remainingSec <= 0) handleFinish();
      }

      function startWith(seconds) {
        const safe = Math.max(1, seconds | 0);
        stopTicker();
        state.durationSec = safe;
        state.remainingSec = safe;
        state.endAtMs = Date.now() + safe * 1000;
        renderTime();
        setStatus(STATUS.RUNNING);
        state.intervalId = setInterval(tick, 200);
      }

      function handleFinish() {
        stopTicker();
        state.remainingSec = 0;
        renderTime();
        setStatus(STATUS.FINISHED);
        notifyDone();
      }

      function startFromInputs() {
        const sec = parseInputs();
        if (sec <= 0) {
          showToast("set 1 sec or more");
          return;
        }
        startWith(sec);
      }

      function pauseTimer() {
        if (state.status !== STATUS.RUNNING) return;
        tick();
        stopTicker();
        setStatus(STATUS.PAUSED);
      }

      function resumeTimer() {
        if (state.status !== STATUS.PAUSED) return;
        state.endAtMs = Date.now() + state.remainingSec * 1000;
        setStatus(STATUS.RUNNING);
        state.intervalId = setInterval(tick, 200);
      }

      function endToStopped() {
        stopTicker();
        state.remainingSec = state.durationSec;
        syncInputs(state.durationSec);
        renderTime();
        setStatus(STATUS.STOPPED);
      }

      function restartFromInputs() {
        startFromInputs();
      }

      function canUseSystemNotification() {
        if (!window.isSecureContext) return { ok: false, reason: "Notifications need HTTPS or localhost" };
        if (!("Notification" in window)) return { ok: false, reason: "Notification API not supported" };
        return { ok: true, reason: "" };
      }

      function updateNotifyButtonState() {
        const support = canUseSystemNotification();
        if (!support.ok) {
          el.notifyBtn.title = support.reason;
          return;
        }
        if (Notification.permission === "granted") el.notifyBtn.title = "Notifications: On";
        else if (Notification.permission === "denied") el.notifyBtn.title = "Notifications: Blocked";
        else el.notifyBtn.title = "Allow notifications";
      }

      function requestNotifyPermission() {
        const support = canUseSystemNotification();
        if (!support.ok) {
          showToast(`${support.reason} (fallback toast)`);
          updateNotifyButtonState();
          return;
        }

        if (Notification.permission === "granted") {
          showToast("notifications already enabled");
          updateNotifyButtonState();
          return;
        }

        Notification.requestPermission().then((p) => {
          if (p === "granted") {
            showToast("notifications enabled");
            try {
              const preview = new Notification("Monolith Timer", { body: "test notification" });
              setTimeout(() => preview.close(), 1800);
            } catch (_) {}
          } else if (p === "denied") {
            showToast("notifications blocked (toast fallback)");
          } else {
            showToast("notifications not granted (toast fallback)");
          }
          updateNotifyButtonState();
        }).catch(() => {
          showToast("notification request failed");
          updateNotifyButtonState();
        });
      }

      function notifyDone() {
        const support = canUseSystemNotification();
        if (support.ok && Notification.permission === "granted") {
          try {
            new Notification("Monolith Timer", { body: "timer finished" });
          } catch (_) {}
        }
        showToast("timer finished");
      }

      function mkControl(icon, ariaLabel, onClick, primary = false) {
        const b = document.createElement("button");
        b.type = "button";
        b.className = `control${primary ? " primary" : ""}`;
        b.textContent = icon;
        b.title = ariaLabel;
        b.setAttribute("aria-label", ariaLabel);
        b.addEventListener("click", onClick);
        return b;
      }

      function renderControls() {
        el.controls.innerHTML = "";
        if (state.status === STATUS.STOPPED) {
          el.controls.append(mkControl(ICON.START, "start", startFromInputs, true));
        } else if (state.status === STATUS.RUNNING) {
          el.controls.append(mkControl(ICON.PAUSE, "pause", pauseTimer));
          el.controls.append(mkControl(ICON.END, "end", endToStopped));
        } else if (state.status === STATUS.PAUSED) {
          el.controls.append(mkControl(ICON.RESUME, "resume", resumeTimer, true));
          el.controls.append(mkControl(ICON.END, "end", endToStopped));
        } else if (state.status === STATUS.FINISHED) {
          el.controls.append(mkControl(ICON.RESTART, "resume", restartFromInputs, true));
        }
      }

      function applyTheme(mode) {
        if (mode === "device") {
          const dark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
        } else {
          document.documentElement.setAttribute("data-theme", mode);
        }
      }

      function initTheme() {
        const saved = localStorage.getItem("monolith_theme") || "dark";
        el.themeSelect.value = saved;
        applyTheme(saved);
      }

      function onInputChange() {
        const sec = parseInputs();
        state.durationSec = sec;
        state.remainingSec = sec;
        renderTime();
      }

      function init() {
        syncInputs(1800);
        setupSegments();
        renderTime();
        setStatus(STATUS.STOPPED);
        initTheme();
        updateNotifyButtonState();

        el.themeSelect.addEventListener("change", (e) => {
          const mode = e.target.value;
          localStorage.setItem("monolith_theme", mode);
          applyTheme(mode);
        });

        window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", () => {
          if (el.themeSelect.value === "device") applyTheme("device");
        });

        el.minutesInput.addEventListener("change", onInputChange);
        el.secondsInput.addEventListener("change", onInputChange);
        el.notifyBtn.addEventListener("click", requestNotifyPermission);
      }

      init();
    })();
  </script>
</body>
</html>
