<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Glassmorphism Sample (One File)</title>
  <style>
    :root{
      --bg1:#0ea5e9;
      --bg2:#a855f7;
      --bg3:#22c55e;
      --text:#0b1220;
      --muted: rgba(15, 23, 42, 0.65);
      --glass: rgba(255, 255, 255, 0.14);
      --stroke: rgba(255, 255, 255, 0.22);
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.25);
    }

    *{ box-sizing: border-box; }
    html, body { height: 100%; }
    body{
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans JP", "Hiragino Sans", "Yu Gothic UI", "Yu Gothic", "Meiryo", sans-serif;
      color: var(--text);
      overflow-x: hidden;
      background: #0b1220;
    }

    /* Background: gradient + subtle noise-ish pattern */
    .bg{
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: 48px 20px;
      position: relative;
      isolation: isolate;
    }
    .bg::before{
      content:"";
      position:absolute;
      inset:-20%;
      background:
        radial-gradient(900px 600px at 15% 25%, color-mix(in srgb, var(--bg1) 70%, transparent) 0%, transparent 60%),
        radial-gradient(900px 700px at 85% 15%, color-mix(in srgb, var(--bg2) 70%, transparent) 0%, transparent 55%),
        radial-gradient(800px 600px at 70% 90%, color-mix(in srgb, var(--bg3) 55%, transparent) 0%, transparent 60%),
        linear-gradient(180deg, #0b1220 0%, #0b1220 100%);
      filter: saturate(1.2);
      z-index: -2;
    }
    .bg::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 1px 1px, rgba(255,255,255,0.06) 1px, transparent 1.2px);
      background-size: 18px 18px;
      opacity: 0.35;
      z-index: -1;
      pointer-events:none;
      mix-blend-mode: overlay;
    }

    /* Floating blobs */
    .blob{
      position:absolute;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      filter: blur(0.2px);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.06) inset;
      transform: translateZ(0);
      z-index: -1;
    }
    .blob.one{ top: 8%; left: 8%; background: rgba(14,165,233,0.22); }
    .blob.two{ top: 18%; right: 10%; background: rgba(168,85,247,0.22); width: 460px; height: 460px; }
    .blob.three{ bottom: 8%; left: 18%; background: rgba(34,197,94,0.18); width: 520px; height: 520px; }

    /* Glass card */
    .card{
      width: min(920px, 100%);
      border-radius: 24px;
      background: var(--glass);
      border: 1px solid var(--stroke);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      overflow: hidden;
      position: relative;
    }
    .card::before{
      content:"";
      position:absolute;
      inset: -2px;
      background:
        linear-gradient(135deg,
          rgba(255,255,255,0.35) 0%,
          rgba(255,255,255,0.08) 35%,
          rgba(255,255,255,0.22) 70%,
          rgba(255,255,255,0.06) 100%);
      opacity: 0.35;
      pointer-events:none;
    }

    .content{
      position: relative;
      padding: 28px;
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 20px;
    }

    h1{
      margin: 0 0 8px;
      font-size: clamp(20px, 2.6vw, 30px);
      letter-spacing: 0.2px;
    }
    p{
      margin: 0 0 16px;
      color: rgba(15, 23, 42, 0.78);
      line-height: 1.7;
      font-size: 14.5px;
    }

    .pill{
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.22);
      color: rgba(15, 23, 42, 0.85);
      font-size: 12.5px;
      user-select: none;
    }
    .dot{
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(15, 23, 42, 0.45);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.18);
    }

    .actions{
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .btn{
      appearance: none;
      border: 1px solid rgba(255,255,255,0.28);
      background: rgba(255,255,255,0.16);
      color: rgba(15, 23, 42, 0.88);
      padding: 10px 12px;
      border-radius: 14px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: transform 120ms ease, background 120ms ease, border-color 120ms ease;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .btn:hover{
      transform: translateY(-1px);
      background: rgba(255,255,255,0.22);
      border-color: rgba(255,255,255,0.36);
    }
    .btn.primary{
      background: rgba(15, 23, 42, 0.72);
      color: rgba(255,255,255,0.92);
      border-color: rgba(255,255,255,0.18);
    }
    .btn.primary:hover{
      background: rgba(15, 23, 42, 0.78);
    }

    .side{
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .mini{
      border-radius: 18px;
      padding: 14px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.22);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .mini h2{
      margin: 0 0 6px;
      font-size: 13px;
      letter-spacing: 0.2px;
      color: rgba(15, 23, 42, 0.85);
    }
    .mini .row{
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 0;
      border-top: 1px solid rgba(255,255,255,0.16);
      font-size: 13px;
      color: rgba(15, 23, 42, 0.78);
    }
    .mini .row:first-of-type{ border-top: none; padding-top: 0; }
    .mini .val{
      font-variant-numeric: tabular-nums;
      color: rgba(15, 23, 42, 0.9);
      font-weight: 650;
    }

    .footer{
      position: relative;
      padding: 14px 28px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      border-top: 1px solid rgba(255,255,255,0.18);
      color: rgba(15, 23, 42, 0.68);
      font-size: 12px;
    }
    .kbd{
      padding: 4px 8px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.22);
      background: rgba(255,255,255,0.14);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      color: rgba(15, 23, 42, 0.78);
    }

    /* Responsive */
    @media (max-width: 780px){
      .content{ grid-template-columns: 1fr; }
      .blob{ filter: blur(0.6px); opacity: 0.9; }
    }
  </style>
</head>
<body>
  <main class="bg">
    <div class="blob one" aria-hidden="true"></div>
    <div class="blob two" aria-hidden="true"></div>
    <div class="blob three" aria-hidden="true"></div>

    <section class="card" role="region" aria-label="Glassmorphism sample card">
      <div class="content">
        <div>
          <span class="pill"><span class="dot"></span> Glassmorphism UI</span>
          <h1>ワンファイルのグラスモーフィズム（HTML + CSS）</h1>
          <p>
            半透明のパネル + ぼかし（backdrop-filter）+ 輪郭の薄いストロークで、
            それっぽい雰囲気を最小構成で作っています。
          </p>

          <div class="actions">
            <button class="btn primary" type="button">Primary</button>
            <button class="btn" type="button">Secondary</button>
            <button class="btn" type="button">Ghost</button>
          </div>
        </div>

        <aside class="side" aria-label="Side widgets">
          <div class="mini">
            <h2>Quick Stats</h2>
            <div class="row"><span>Blur</span><span class="val">14px</span></div>
            <div class="row"><span>Opacity</span><span class="val">0.14</span></div>
            <div class="row"><span>Border</span><span class="val">1px</span></div>
          </div>

          <div class="mini">
            <h2>Notes</h2>
            <div class="row"><span>Edge</span><span class="val">soft</span></div>
            <div class="row"><span>Shadow</span><span class="val">deep</span></div>
            <div class="row"><span>BG</span><span class="val">gradient</span></div>
          </div>
        </aside>
      </div>

      <div class="footer">
        <span>Tip: backdrop-filter が効かないブラウザでは透明パネル風に見えます。</span>
        <span class="kbd">One file</span>
      </div>
    </section>
  </main>
</body>
</html>
