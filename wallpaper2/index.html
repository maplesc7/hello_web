<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Wallpaper2 - Future Design Generator</title>
  <style>
    :root{
      --bg:#070b14;
      --ui-bg: rgba(8, 13, 24, 0.72);
      --ui-bd: rgba(159, 227, 255, 0.26);
      --ui-tx: rgba(232, 247, 255, 0.96);
      --ui-sub: rgba(170, 198, 216, 0.9);
      --btn-bg: rgba(24, 38, 56, 0.88);
      --btn-bd: rgba(166, 228, 255, 0.3);
    }
    html, body { margin:0; height:100%; overflow:hidden; background:var(--bg); font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Hiragino Sans","Noto Sans JP",sans-serif; }
    #wrap, canvas { position:fixed; inset:0; width:100%; height:100%; display:block; }
    .topbar{
      position:fixed; right:18px; top:18px; z-index:5;
      padding:10px 12px; border-radius:12px;
      color:rgba(255,255,255,.75); font-size:12px;
      background:rgba(0,0,0,.28); border:1px solid rgba(255,255,255,.14);
      backdrop-filter:blur(10px);
    }
    .topbar kbd{ font-family:ui-monospace,Menlo,Consolas,monospace; font-size:11px; padding:2px 6px; border-radius:8px; border:1px solid rgba(255,255,255,.22); margin-left:4px; }
    .ui{
      position:fixed; left:18px; bottom:18px; z-index:6;
      display:grid; gap:10px; width:min(580px, calc(100vw - 36px));
      padding:14px; border-radius:16px;
      background:var(--ui-bg); border:1px solid var(--ui-bd);
      box-shadow:0 16px 38px rgba(0,0,0,.42); backdrop-filter:blur(12px);
      user-select:none;
    }
    .title{ font-size:13px; color:var(--ui-tx); }
    .subtitle{ font-size:12px; color:var(--ui-sub); }
    .mode-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
    .mode{
      border:1px solid var(--btn-bd); background:var(--btn-bg); color:var(--ui-tx);
      border-radius:10px; padding:10px; text-align:left; cursor:pointer;
      font-size:12px; line-height:1.25;
    }
    .mode span{ display:block; color:var(--ui-sub); font-size:11px; margin-top:4px; }
    .mode.active{ border-color:rgba(151,240,255,.8); box-shadow:0 0 0 1px rgba(151,240,255,.45) inset; }
    .row{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    button.action{
      appearance:none; border:1px solid var(--btn-bd); background:linear-gradient(180deg, rgba(31,48,71,.92), rgba(20,31,48,.92));
      color:var(--ui-tx); border-radius:11px; padding:10px 12px; font-size:13px; cursor:pointer;
    }
    .badge{ font-size:11px; padding:6px 9px; border-radius:999px; border:1px solid rgba(255,255,255,.2); color:rgba(255,255,255,.84); }
    .hint{ font-size:11px; color:rgba(255,255,255,.58); }
    @media (max-width:720px){ .mode-grid{ grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div id="wrap"><canvas id="c"></canvas></div>

  <div class="topbar">Wallpaper2 · 先進デザイン提案 <kbd>1</kbd><kbd>2</kbd><kbd>3</kbd><kbd>R</kbd></div>

  <div class="ui">
    <div class="title">Wallpaper2 - 3つの実装済み提案</div>
    <div class="subtitle">Three.jsベースで描画。静止レンダリング + フルHD PNG保存を維持。</div>

    <div class="mode-grid" id="modeGrid">
      <button class="mode" data-mode="flux">Neon Flux Grid<span>多層ワイヤーフレーム + 発光ノード</span></button>
      <button class="mode" data-mode="rings">Crystal Ring Array<span>屈折感のあるリング群 + 星雲ポイント</span></button>
      <button class="mode" data-mode="strata">Data Strata Ribbons<span>流体リボン線群 + 体積フォグ</span></button>
    </div>

    <div class="row">
      <button id="btnRefresh" class="action">再生成</button>
      <button id="btnPng" class="action">PNG(1920×1080) を保存</button>
      <span class="badge" id="status">Ready</span>
    </div>
    <div class="hint">※ 開いた時点で1回描画。Rキーで再生成、1/2/3で案を切り替え。</div>
  </div>

  <script type="importmap">
    { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js" } }
  </script>

  <script type="module">
    import * as THREE from 'three';

    const canvas = document.getElementById('c');
    const statusEl = document.getElementById('status');
    const modeBtns = [...document.querySelectorAll('.mode')];

    const scene = new THREE.Scene();
    const bgScene = new THREE.Scene();
    const bgCam = new THREE.OrthographicCamera(-1,1,1,-1,0,1);
    const camera = new THREE.PerspectiveCamera(72, 16/9, 0.1, 1500);
    camera.position.set(0, 55, 145);

    const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:false, powerPreference:'high-performance', preserveDrawingBuffer:false });
    renderer.autoClear = false;

    const bgUniforms = {
      c1: { value: new THREE.Color('#101a2f') },
      c2: { value: new THREE.Color('#060a14') },
      c3: { value: new THREE.Color('#1f3152') },
      pulse: { value: 0.5 }
    };

    const bgMat = new THREE.ShaderMaterial({
      uniforms: bgUniforms,
      depthTest:false, depthWrite:false,
      vertexShader:`varying vec2 vUv; void main(){ vUv=uv; gl_Position=vec4(position.xy,0.0,1.0); }`,
      fragmentShader:`
        precision highp float; varying vec2 vUv;
        uniform vec3 c1; uniform vec3 c2; uniform vec3 c3; uniform float pulse;
        float noise(vec2 p){ return fract(sin(dot(p, vec2(12.9898,78.233))) * 43758.5453); }
        void main(){
          vec2 p=vUv*2.0-1.0;
          float radial=1.0-smoothstep(0.2,1.35,length(p));
          float g=smoothstep(0.0,1.0,vUv.y);
          vec3 col=mix(c2,c1,g);
          float band=sin((vUv.x*8.0 + vUv.y*2.5 + pulse*3.14)*3.1415)*0.5+0.5;
          col=mix(col,c3,band*0.26);
          col += noise(vUv*920.0)*0.018;
          col *= (0.74 + 0.26*radial);
          gl_FragColor=vec4(col,1.0);
        }`
    });
    bgScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2), bgMat));

    scene.fog = new THREE.FogExp2('#0a0f1a', 0.0036);

    const root = new THREE.Group();
    scene.add(root);

    let mode = 'flux';
    let seed = Math.random() * 10000;

    const rand = (() => {
      let s = 1;
      return {
        set(v){ s = (v|0) || 1; },
        next(){ s ^= s << 13; s ^= s >> 17; s ^= s << 5; return ((s >>> 0) / 4294967296); }
      };
    })();

    function setStatus(t){ statusEl.textContent = t; }
    function clearRoot(){ while(root.children.length){ const o=root.children.pop(); o.traverse(n=>{ if(n.geometry) n.geometry.dispose(); if(n.material){ if(Array.isArray(n.material)) n.material.forEach(m=>m.dispose()); else n.material.dispose(); }}); } }

    function buildFlux(){
      camera.position.set(0,58,120); camera.lookAt(0,0,-260);
      bgUniforms.c1.value.set('#1f355d'); bgUniforms.c2.value.set('#070c16'); bgUniforms.c3.value.set('#39b9ff'); bgUniforms.pulse.value = 0.24;

      const W=1200,D=980,SX=240,SZ=170;
      const geom = new THREE.PlaneGeometry(W,D,SX,SZ);
      geom.rotateX(-Math.PI/2); geom.translate(0,-8,-D*0.48);
      const pos = geom.attributes.position;
      for(let i=0;i<pos.count;i++){
        const x=pos.getX(i), z=pos.getZ(i);
        const y = Math.sin(x*0.009 + seed*0.001)*16 + Math.cos(z*0.013 - seed*0.0012)*12 + Math.sin((x-z)*0.006)*9;
        pos.setY(i, y*(0.65+Math.min(Math.max(-z/(D*0.8),0),1)*0.4));
      }
      pos.needsUpdate = true;
      const wire = new THREE.WireframeGeometry(geom);
      const col = new Float32Array(wire.attributes.position.count*3);
      const c = new THREE.Color();
      for(let i=0;i<wire.attributes.position.count;i++){
        const y=wire.attributes.position.getY(i), z=wire.attributes.position.getZ(i);
        c.setHSL(0.55 + Math.min(Math.max(-z/900,0),1)*0.08, 0.74, 0.44 + (y+30)*0.003);
        col[i*3]=c.r; col[i*3+1]=c.g; col[i*3+2]=c.b;
      }
      wire.setAttribute('color', new THREE.BufferAttribute(col,3));
      const main = new THREE.LineSegments(wire, new THREE.LineBasicMaterial({vertexColors:true, transparent:true, opacity:0.72, blending:THREE.AdditiveBlending}));
      const glow = new THREE.LineSegments(wire.clone(), new THREE.LineBasicMaterial({vertexColors:true, transparent:true, opacity:0.14, blending:THREE.AdditiveBlending}));
      glow.scale.setScalar(1.002);
      root.add(glow, main);

      const starsG = new THREE.BufferGeometry();
      const stars = new Float32Array(450*3);
      for(let i=0;i<450;i++){ stars[i*3]=(rand.next()-0.5)*1000; stars[i*3+1]=rand.next()*260+20; stars[i*3+2]=-rand.next()*950; }
      starsG.setAttribute('position', new THREE.BufferAttribute(stars,3));
      root.add(new THREE.Points(starsG, new THREE.PointsMaterial({color:'#a7e9ff', size:1.3, sizeAttenuation:true, transparent:true, opacity:0.38, blending:THREE.AdditiveBlending})));
    }

    function buildRings(){
      camera.position.set(0,26,198); camera.lookAt(0,0,-120);
      bgUniforms.c1.value.set('#2a1f48'); bgUniforms.c2.value.set('#090814'); bgUniforms.c3.value.set('#6ae5ff'); bgUniforms.pulse.value = 0.7;

      const group = new THREE.Group();
      const ringMat = new THREE.MeshBasicMaterial({ color:'#84ddff', wireframe:true, transparent:true, opacity:0.26, blending:THREE.AdditiveBlending });
      for(let i=0;i<36;i++){
        const t=i/36;
        const r=18 + t*130 + rand.next()*16;
        const tube= 0.9 + rand.next()*1.8;
        const ring = new THREE.Mesh(new THREE.TorusGeometry(r, tube, 16, 140), ringMat.clone());
        ring.position.z = -40 - t*220;
        ring.rotation.x = t*1.3 + rand.next()*0.6;
        ring.rotation.y = t*2.1 + rand.next()*0.6;
        ring.material.opacity = 0.1 + (1-t)*0.3;
        group.add(ring);
      }
      root.add(group);

      const ico = new THREE.IcosahedronGeometry(34, 2);
      const crystal = new THREE.Mesh(ico, new THREE.MeshBasicMaterial({color:'#d2f4ff', wireframe:true, transparent:true, opacity:0.36}));
      crystal.position.set(0,8,-120);
      root.add(crystal);

      const neb = new THREE.BufferGeometry();
      const pts = new Float32Array(1200*3);
      for(let i=0;i<1200;i++){
        const a = rand.next()*Math.PI*2;
        const rr = Math.pow(rand.next(),0.6)*220;
        pts[i*3] = Math.cos(a)*rr;
        pts[i*3+1] = (rand.next()-0.5)*140;
        pts[i*3+2] = -rand.next()*380 - 10;
      }
      neb.setAttribute('position', new THREE.BufferAttribute(pts,3));
      root.add(new THREE.Points(neb, new THREE.PointsMaterial({color:'#82ebff', size:1.2, transparent:true, opacity:0.33, blending:THREE.AdditiveBlending})));
    }

    function buildStrata(){
      camera.position.set(0,35,160); camera.lookAt(0,10,-220);
      bgUniforms.c1.value.set('#153b3a'); bgUniforms.c2.value.set('#071314'); bgUniforms.c3.value.set('#58ffe0'); bgUniforms.pulse.value = 0.48;

      for(let k=0;k<18;k++){
        const arr = [];
        const zBase = -k*36 - 10;
        for(let i=0;i<320;i++){
          const t = i/319;
          const x = -300 + t*600;
          const y = Math.sin(x*0.015 + k*0.42 + seed*0.0007)*(8+k*0.7) + Math.cos(x*0.004 - k*0.5)*10 + (k-8)*2.8;
          const z = zBase + Math.sin(t*10 + k*0.8)*6;
          arr.push(x, y, z);
        }
        const g = new THREE.BufferGeometry();
        g.setAttribute('position', new THREE.Float32BufferAttribute(arr,3));
        const hue = 0.44 + k*0.006;
        const m = new THREE.LineBasicMaterial({ color: new THREE.Color().setHSL(hue, 0.72, 0.62), transparent:true, opacity:0.16 + k*0.012, blending:THREE.AdditiveBlending });
        root.add(new THREE.Line(g,m));
      }

      const horizon = new THREE.Mesh(new THREE.PlaneGeometry(1600,480,1,1), new THREE.MeshBasicMaterial({color:'#7fffe1', transparent:true, opacity:0.06, blending:THREE.AdditiveBlending}));
      horizon.position.set(0,24,-240);
      root.add(horizon);
    }

    function renderOnce(target){
      target.clear(true,true,true);
      target.render(bgScene,bgCam);
      target.render(scene,camera);
    }

    function regenerate(nextMode = mode){
      mode = nextMode;
      modeBtns.forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
      setStatus('Generating…');
      seed = Math.random() * 100000;
      rand.set((seed * 214013) | 0);
      clearRoot();
      if(mode === 'flux') buildFlux();
      if(mode === 'rings') buildRings();
      if(mode === 'strata') buildStrata();
      renderOnce(renderer);
      setTimeout(()=>setStatus('Ready'), 360);
    }

    function resizeAndRender(){
      const w=Math.max(1,innerWidth), h=Math.max(1,innerHeight);
      renderer.setPixelRatio(Math.min(devicePixelRatio || 1,2));
      renderer.setSize(w,h,false);
      camera.aspect=w/h;
      camera.updateProjectionMatrix();
      renderOnce(renderer);
    }

    function exportPng1920(){
      setStatus('Exporting…');
      const W=1920, H=1080;
      const off = document.createElement('canvas'); off.width=W; off.height=H;
      const r = new THREE.WebGLRenderer({canvas:off, antialias:true, alpha:false, powerPreference:'high-performance', preserveDrawingBuffer:true});
      r.autoClear=false; r.setPixelRatio(1); r.setSize(W,H,false);
      const prev = camera.aspect;
      camera.aspect = W / H; camera.updateProjectionMatrix();
      renderOnce(r);
      camera.aspect = prev; camera.updateProjectionMatrix();
      const a = document.createElement('a');
      const ts = new Date().toISOString().replace(/[-:TZ.]/g,'').slice(0,14);
      a.href = off.toDataURL('image/png');
      a.download = `wallpaper2_${mode}_1920x1080_${ts}.png`;
      document.body.appendChild(a); a.click(); a.remove();
      r.dispose();
      setStatus('Saved');
      setTimeout(()=>setStatus('Ready'), 900);
    }

    modeBtns.forEach(btn => btn.addEventListener('click', ()=>regenerate(btn.dataset.mode)));
    document.getElementById('btnRefresh').addEventListener('click', ()=>regenerate(mode));
    document.getElementById('btnPng').addEventListener('click', exportPng1920);
    window.addEventListener('resize', resizeAndRender, {passive:true});
    window.addEventListener('keydown', (e)=>{
      const key = (e.key || '').toLowerCase();
      if(key === 'r') regenerate(mode);
      if(key === '1') regenerate('flux');
      if(key === '2') regenerate('rings');
      if(key === '3') regenerate('strata');
    });

    regenerate('flux');
    resizeAndRender();
  </script>
</body>
</html>
