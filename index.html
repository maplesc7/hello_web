<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
  />
  <title>Minute Vapor Timer</title>
  <style>
    /* ===================== VARIABLES ===================== */
    :root {
      --bg1: #0e0e1a;
      --bg2: #1a1a2e;
      --bg3: #000000;

      --glow: #ff45ff;
      --glow2: #45e6ff;
      --text: #ffffff;

      --wire-main: rgba(255, 255, 255, 0.9);
      --wire-sub: rgba(255, 255, 255, 0.5);
      --floor-grid-main: rgba(255, 69, 255, 0.7);
      --floor-grid-accent: rgba(69, 230, 255, 0.65);

      --panel-bg: rgba(0, 0, 0, 0.55);
      --panel-border: rgba(255, 255, 255, 0.28);
      --panel-blur: 14px;

      --btn-bg: rgba(255,255,255,0.06);
      --btn-bg-hover: rgba(255,255,255,0.12);
      --btn-border: rgba(255,255,255,0.22);
      --danger: #ff6b6b;
      --ok: #7dffb3;

      /* 時計フォント */
      --minutes-fs: clamp(200px, 56vw, 360px);
      --time-fs: clamp(128px, 36vw, 240px);
    }

    /* ===================== RESET & BASE ===================== */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
      background: var(--bg1);
      -webkit-text-size-adjust: 100%;
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      background: var(--bg1);
    }

    /* ===================== SCENE & FLOOR GRID ===================== */
    .scene {
      position: relative;
      width: 100%;
      max-width: 100vw;
      min-height: 100vh;
      min-height: 100svh;
      overflow: hidden;
      box-sizing: border-box;
      padding-bottom: max(0px, env(safe-area-inset-bottom, 0px));
      background: var(--bg1);
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }

    .scene-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .scene-grid {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .scene-grid::before {
      content: "";
      position: absolute;
      left: -30%;
      right: -30%;
      bottom: -25%;
      height: 75vh;
      background-image:
        radial-gradient(circle at 50% 100%, rgba(255, 255, 255, 0.15) 0%, transparent 45%),
        repeating-linear-gradient(
          90deg,
          var(--floor-grid-main) 0,
          var(--floor-grid-main) 1.5px,
          transparent 1.5px,
          transparent 42px
        ),
        repeating-linear-gradient(
          0deg,
          var(--floor-grid-accent) 0,
          var(--floor-grid-accent) 1.5px,
          transparent 1.5px,
          transparent 42px
        );
      opacity: 0.25;
      transform-origin: bottom center;
      transform: perspective(750px) rotateX(68deg);
      filter: blur(0.4px);
      mix-blend-mode: screen;
      animation: gridFlow 20s linear infinite;
    }

    @keyframes gridFlow {
      0% { background-position: 0 0, 0 0, 0 0; }
      100% { background-position: 0 0, 42px 42px, -42px -42px; }
    }

    .scene-grid::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle at 20% 30%, var(--glow) 0%, transparent 25%),
        radial-gradient(circle at 80% 50%, var(--glow2) 0%, transparent 30%);
      opacity: 0.12;
      animation: glowPulse 8s ease-in-out infinite alternate;
      pointer-events: none;
    }

    @keyframes glowPulse {
      0% { opacity: 0.08; filter: blur(60px); }
      100% { opacity: 0.18; filter: blur(80px); }
    }

    /* ===================== CLOCK AREA ===================== */
    .mid-area {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 1px;             /* JSが実高さを入れる */
      display: flex;
      align-items: center;      /* ど真ん中 */
      justify-content: center;
      box-sizing: border-box;
      padding: 0 10px;          /* 横だけ少し */
    }

    /* ===================== CLOCK / TIMER DISPLAY ===================== */
    .clock {
      user-select: none;
      pointer-events: none;
      text-align: center;
      text-shadow:
        0 0 26px var(--glow),
        0 0 54px var(--glow2),
        0 0 84px rgba(0, 0, 0, 0.9);
      animation: pulse 6s ease-in-out infinite;
      line-height: 1.0;
    }

    .clock .minutes-line {
      font-size: var(--minutes-fs);
      font-weight: 650;
      letter-spacing: -0.04em;
      white-space: nowrap;
      margin-bottom: clamp(20px, 4vh, 40px);
    }

    .clock .minutes-unit {
      font-size: 0.28em;
      font-weight: 550;
      opacity: 0.92;
      margin-left: 0.10em;
      letter-spacing: 0;
    }

    .clock .nowtime {
      font-size: var(--time-fs);
      font-weight: 620;
      letter-spacing: 0.06em;
      opacity: 0.93;
      margin-top: clamp(20px, 4vh, 40px);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; filter: hue-rotate(0deg); }
      50% { opacity: 0.86; filter: hue-rotate(18deg); }
    }

    /* ===================== THEMES ===================== */
    [data-theme="midnight"] {
      --bg1: #0a0a1e;
      --bg2: #1a1a3e;
      --bg3: #000014;
      --glow: #6b7dff;
      --glow2: #b794f6;
      --text: #e8e8ff;
      --floor-grid-main: rgba(107, 125, 255, 0.85);
      --floor-grid-accent: rgba(183, 148, 246, 0.75);
      --panel-bg: rgba(10, 10, 30, 0.6);
    }

    [data-theme="aurora"] {
      --bg1: #001a14;
      --bg2: #002818;
      --bg3: #000a08;
      --glow: #10f5c4;
      --glow2: #ff6ec7;
      --text: #e0fff8;
      --floor-grid-main: rgba(16, 245, 196, 0.88);
      --floor-grid-accent: rgba(255, 110, 199, 0.82);
    }

    [data-theme="coral"] {
      --bg1: #1a1012;
      --bg2: #2e1820;
      --bg3: #0f0508;
      --glow: #ff7f6e;
      --glow2: #4ecdc4;
      --text: #ffe8e5;
      --floor-grid-main: rgba(255, 127, 110, 0.86);
      --floor-grid-accent: rgba(78, 205, 196, 0.78);
    }

    [data-theme="lavender"] {
      --bg1: #14111a;
      --bg2: #2d2040;
      --bg3: #0a0712;
      --glow: #b08bf2;
      --glow2: #7ec8e3;
      --text: #f0ebff;
      --floor-grid-main: rgba(176, 139, 242, 0.84);
      --floor-grid-accent: rgba(126, 200, 227, 0.76);
    }

    [data-theme="emerald"] {
      --bg1: #0f1a0f;
      --bg2: #1a3020;
      --bg3: #050a05;
      --glow: #52c893;
      --glow2: #f4c430;
      --text: #e8ffe8;
      --floor-grid-main: rgba(82, 200, 147, 0.88);
      --floor-grid-accent: rgba(244, 196, 48, 0.74);
    }

    [data-theme="rosegold"] {
      --bg1: #1a1214;
      --bg2: #3a2028;
      --bg3: #0f0508;
      --glow: #f8b4c0;
      --glow2: #eab676;
      --text: #fff0f0;
      --floor-grid-main: rgba(248, 180, 192, 0.86);
      --floor-grid-accent: rgba(234, 182, 118, 0.78);
    }

    [data-theme="arctic"] {
      --bg1: #0d1216;
      --bg2: #18252e;
      --bg3: #050a0f;
      --glow: #c0f3ff;
      --glow2: #a7cfdf;
      --text: #f0f8ff;
      --floor-grid-main: rgba(192, 243, 255, 0.82);
      --floor-grid-accent: rgba(167, 207, 223, 0.72);
    }

    /* ===================== THEME PANEL UI ===================== */
    .theme-toggle {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 16px);
      right: 16px;
      width: 44px;
      height: 44px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(var(--panel-blur));
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      z-index: 10;
      -webkit-tap-highlight-color: transparent;
    }

    .theme-panel {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 76px);
      right: 16px;
      width: 246px;
      max-width: calc(100vw - 32px);
      background: rgba(6, 10, 30, 0.96);
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
      padding: 10px 12px 12px;
      backdrop-filter: blur(20px);
      z-index: 11;
      display: none;
    }

    .theme-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 12px;
      opacity: 0.9;
    }

    .theme-close {
      background: none;
      border: none;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      padding: 0 4px;
      -webkit-tap-highlight-color: transparent;
    }

    .theme-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .theme-chip {
      flex: 0 0 calc(50% - 3px);
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.28);
      background: rgba(255, 255, 255, 0.03);
      font-size: 11px;
      color: #fff;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .theme-chip-swatch {
      width: 14px;
      height: 14px;
      border-radius: 999px;
      flex-shrink: 0;
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.6);
    }

    .theme-chip.active {
      border-color: #ffffff;
      background: rgba(255, 255, 255, 0.08);
    }

    /* ===================== TIMER CONTROLS ===================== */
    .controls {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 14px);
      left: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 14px;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(var(--panel-blur));
      z-index: 10;
      box-shadow: 0 10px 28px rgba(0,0,0,0.55);
      -webkit-tap-highlight-color: transparent;
    }

    .ctrl-btn {
      appearance: none;
      border: 1px solid var(--btn-border);
      background: var(--btn-bg);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 650;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: background .15s ease, border-color .15s ease, transform .08s ease;
      min-width: 62px;
      text-align: center;
    }

    .ctrl-btn:hover { background: var(--btn-bg-hover); }
    .ctrl-btn:active { transform: translateY(1px) scale(0.98); }

    .ctrl-btn.primary {
      border-color: rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.12);
    }

    .ctrl-btn.stop {
      border-color: color-mix(in srgb, var(--danger) 60%, white 0%);
      color: #fff;
    }

    .ctrl-btn.reset {
      border-color: rgba(255,255,255,0.18);
      opacity: 0.85;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.35);
      box-shadow: 0 0 8px rgba(255,255,255,0.35);
      margin-right: 2px;
    }

    .status-dot.running {
      background: var(--ok);
      box-shadow: 0 0 10px color-mix(in srgb, var(--ok) 70%, white 0%);
    }

    .status-text {
      font-size: 10px;
      opacity: 0.85;
      margin-right: 6px;
      user-select: none;
      white-space: nowrap;
    }

    @media (max-width: 480px) {
      .theme-panel {
        bottom: calc(env(safe-area-inset-bottom, 0px) + 72px);
        right: 12px;
        left: 12px;
        margin: 0 auto;
      }
      .theme-toggle { right: 12px; }
      .controls {
        left: 10px;
        right: 70px;
        justify-content: space-between;
      }
      .ctrl-btn {
        min-width: 58px;
        padding: 8px 10px;
      }
    }
  </style>
</head>
<body>
  <!-- Three.js (ES Module版) -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js"
      }
    }
  </script>

  <div class="scene" id="scene">
    <canvas class="scene-canvas" id="sceneCanvas"></canvas>
    <div class="scene-grid"></div>

    <!-- 時計エリア -->
    <div class="clock-area" id="clockArea" aria-hidden="false">
      <div class="clock" id="clock" aria-label="経過分と現在時刻">
        <div class="minutes-line">
          <span id="minuteValue">0</span><span class="minutes-unit">分</span>
        </div>
        <div class="nowtime" id="timeNow">--:--</div>
      </div>
    </div>

    <!-- 下: 操作UI -->
    <div class="controls" id="controls" role="group" aria-label="タイマー操作">
      <span class="status-dot" id="statusDot" aria-hidden="true"></span>
      <span class="status-text" id="statusText">停止中</span>

      <button class="ctrl-btn primary" id="startBtn" type="button">スタート</button>
      <button class="ctrl-btn stop" id="stopBtn" type="button" disabled>ストップ</button>
      <button class="ctrl-btn reset" id="resetBtn" type="button">リセット</button>
    </div>

    <!-- テーマ -->
    <button class="theme-toggle" id="themeToggle" type="button" aria-label="テーマ切り替え">🎨</button>

    <div class="theme-panel" id="themePanel">
      <div class="theme-panel-header">
        <span>テーマ選択</span>
        <button type="button" class="theme-close" id="themeClose">×</button>
      </div>
      <div class="theme-list" id="themeList"></div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';

    // ===================== THREE.JS GRADIENT SCENE =====================
    const canvas = document.getElementById("sceneCanvas");
    let renderer, bgScene, bgCam, bgMat, terrainScene, terrainCam, wireGeom, linesMain, linesGlow;

    const themeColors = {
      default:  { top: "#eb971a", mid: "#76167f", bot: "#0f0862", deep: "#050211", wire: 0xFFA560, glow: 0x6B8CAE },
      midnight: { top: "#b794f6", mid: "#6b7dff", bot: "#0a0a1e", deep: "#000014", wire: 0x9BA8FF, glow: 0xC5A3F8 },
      aurora:   { top: "#ff6ec7", mid: "#10f5c4", bot: "#001a14", deep: "#000a08", wire: 0x15FFC8, glow: 0xFF7BCE },
      coral:    { top: "#4ecdc4", mid: "#ff7f6e", bot: "#1a1012", deep: "#0f0508", wire: 0xFF8B7A, glow: 0x58D9CF },
      lavender: { top: "#7ec8e3", mid: "#b08bf2", bot: "#14111a", deep: "#0a0712", wire: 0xBB96F5, glow: 0x88CFEA },
      emerald:  { top: "#f4c430", mid: "#52c893", bot: "#0f1a0f", deep: "#050a05", wire: 0x5AD09D, glow: 0xF6CA3C },
      rosegold: { top: "#eab676", mid: "#f8b4c0", bot: "#1a1214", deep: "#0f0508", wire: 0xFFBECA, glow: 0xF1BE80 },
      arctic:   { top: "#a7cfdf", mid: "#c0f3ff", bot: "#0d1216", deep: "#050a0f", wire: 0xCAF7FF, glow: 0xB1D5E5 }
    };

    function initThreeJS() {
      renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
      renderer.autoClear = false;
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));

      // Background gradient
      bgScene = new THREE.Scene();
      bgCam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

      bgMat = new THREE.ShaderMaterial({
        uniforms: {
          cTop:  { value: new THREE.Color("#eb971a") },
          cMid:  { value: new THREE.Color("#76167f") },
          cBot:  { value: new THREE.Color("#0f0862") },
          cDeep: { value: new THREE.Color("#050211") }
        },
        vertexShader: `
          varying vec2 vUv;
          void main(){
            vUv = uv;
            gl_Position = vec4(position.xy, 0.0, 1.0);
          }
        `,
        fragmentShader: `
          precision highp float;
          varying vec2 vUv;
          uniform vec3 cTop;
          uniform vec3 cMid;
          uniform vec3 cBot;
          uniform vec3 cDeep;

          float sCurve(float x){
            return x*x*(3.0 - 2.0*x);
          }

          void main(){
            float y = clamp(vUv.y, 0.0, 1.0);
            float t1 = sCurve(clamp((y - 0.00) / 0.48, 0.0, 1.0));
            vec3 cA = mix(cBot, cMid, t1);
            float t2 = sCurve(clamp((y - 0.38) / 0.62, 0.0, 1.0));
            vec3 cB = mix(cMid, cTop, t2);
            vec3 col = mix(cA, cB, clamp((y - 0.28) / 0.72, 0.0, 1.0));
            col = mix(col, cDeep, sCurve(clamp((0.12 - y) / 0.12, 0.0, 1.0)) * 0.70);
            vec2 p = vUv * 2.0 - 1.0;
            float v = 1.0 - smoothstep(0.40, 1.45, length(p));
            col *= (0.72 + 0.28 * v);
            gl_FragColor = vec4(col, 1.0);
          }
        `,
        depthTest: false,
        depthWrite: false
      });

      const bgQuad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), bgMat);
      bgScene.add(bgQuad);

      // Terrain
      terrainScene = new THREE.Scene();
      terrainScene.fog = new THREE.Fog(new THREE.Color("#0f0862"), 45, 180);

      terrainCam = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 600);
      terrainCam.position.set(0, 12, 28);
      terrainCam.lookAt(0, 8, -50);

      createTerrain();
      resizeRenderer();
      renderScene();
    }

    function createTerrain() {
      const WIDTH = 280, DEPTH = 200, SEGX = 280, SEGZ = 200;
      const geom = new THREE.PlaneGeometry(WIDTH, DEPTH, SEGX, SEGZ);
      geom.rotateX(-Math.PI / 2);
      geom.translate(0, 0, -DEPTH * 0.35);

      const pos = geom.attributes.position;
      const v = new THREE.Vector3();

      for (let i = 0; i < pos.count; i++) {
        v.fromBufferAttribute(pos, i);
        const x = v.x, z = v.z;
        const distFactor = Math.max(0, Math.min(1, (-z) / (DEPTH * 0.65)));
        const hill1 = Math.sin(x * 0.018) * 18.0;
        const hill2 = Math.cos(x * 0.032 + z * 0.012) * 9.0;
        const hill3 = Math.sin(x * 0.025 - z * 0.008) * 6.0;
        const depthWave = Math.sin(z * 0.028) * 4.0 * (1.0 - distFactor * 0.6);
        let h = (hill1 + hill2 + hill3) * (0.7 + distFactor * 0.5) + depthWave;
        h += (2.0 - distFactor * 2.0);
        h *= (0.85 + distFactor * 0.35);
        v.y = h;
        pos.setXYZ(i, v.x, v.y, v.z);
      }
      pos.needsUpdate = true;

      wireGeom = new THREE.WireframeGeometry(geom);

      const matMain = new THREE.LineBasicMaterial({
        color: 0xFFA560,
        transparent: true,
        opacity: 0.75,
        blending: THREE.AdditiveBlending
      });

      const matGlow = new THREE.LineBasicMaterial({
        color: 0x6B8CAE,
        transparent: true,
        opacity: 0.28,
        blending: THREE.AdditiveBlending
      });

      linesMain = new THREE.LineSegments(wireGeom, matMain);
      linesGlow = new THREE.LineSegments(wireGeom, matGlow);
      linesGlow.scale.set(1.0006, 1.0006, 1.0006);

      terrainScene.add(linesGlow);
      terrainScene.add(linesMain);
    }

    function updateThemeColors(themeId) {
      const colors = themeColors[themeId] || themeColors.default;
      if (bgMat) {
        bgMat.uniforms.cTop.value.set(colors.top);
        bgMat.uniforms.cMid.value.set(colors.mid);
        bgMat.uniforms.cBot.value.set(colors.bot);
        bgMat.uniforms.cDeep.value.set(colors.deep);
      }
      if (linesMain) linesMain.material.color.setHex(colors.wire);
      if (linesGlow) linesGlow.material.color.setHex(colors.glow);
      if (terrainScene && terrainScene.fog) terrainScene.fog.color.set(colors.bot);
      renderScene();
    }

    function resizeRenderer() {
      const w = window.innerWidth, h = window.innerHeight;
      renderer.setSize(w, h, false);
      terrainCam.aspect = w / h;
      terrainCam.updateProjectionMatrix();
      renderScene();
    }

    function renderScene() {
      if (!renderer) return;
      renderer.clear(true, true, true);
      renderer.render(bgScene, bgCam);
      renderer.render(terrainScene, terrainCam);
    }

    window.addEventListener("resize", resizeRenderer);

    // ===================== ORIGINAL TIMER LOGIC =====================
  </script>

  <script>
    /* =========================================================
       - シンプルな分単位タイマー
       - 現在時刻(HH:MM)は常時表示（分境界で更新）
       - 状態は保存せず、閉じたらリセット
    ========================================================= */

    const minuteValueEl = document.getElementById("minuteValue");
    const timeNowEl     = document.getElementById("timeNow");

    const statusDotEl   = document.getElementById("statusDot");
    const statusTextEl  = document.getElementById("statusText");
    const startBtn      = document.getElementById("startBtn");
    const stopBtn       = document.getElementById("stopBtn");
    const resetBtn      = document.getElementById("resetBtn");

    const sceneEl       = document.getElementById("scene");
    const clockAreaEl   = document.getElementById("clockArea");

    const THEME_KEY   = "minute-vapor-theme:v1";

    let state = { running: false, startEpochMs: null, elapsedMs: 0 };
    let tickHandle = null;
    let nowHandle  = null;

    function pad2(n){ return String(n).padStart(2,"0"); }
    function formatHHMM(d){ return `${pad2(d.getHours())}:${pad2(d.getMinutes())}`; }

    function renderNowTime(){ timeNowEl.textContent = formatHHMM(new Date()); }

    function scheduleNowTime(){
      if (nowHandle) { clearTimeout(nowHandle); nowHandle = null; }
      const now = new Date();
      const ms = now.getSeconds() * 1000 + now.getMilliseconds();
      const wait = Math.max(250, 60000 - ms);
      nowHandle = setTimeout(() => {
        renderNowTime();
        scheduleNowTime();
      }, wait);
    }

    function nowElapsedMs(){
      if (!state.running) return state.elapsedMs;
      if (!state.startEpochMs) return state.elapsedMs;
      const delta = Date.now() - state.startEpochMs;
      return Math.max(0, state.elapsedMs + delta);
    }

    function render(){
      const ms = nowElapsedMs();
      const minutes = Math.floor(ms / 60000);
      minuteValueEl.textContent = String(minutes);

      statusDotEl.classList.toggle("running", state.running);
      statusTextEl.textContent = state.running ? "計測中" : "停止中";

      startBtn.disabled = state.running;
      stopBtn.disabled  = !state.running;

      renderNowTime();
    }

    function scheduleTick(){
      if (tickHandle) { clearTimeout(tickHandle); tickHandle = null; }
      if (!state.running) return;

      const ms = nowElapsedMs();
      const remainder = ms % 60000;
      const wait = Math.max(250, 60000 - remainder);
      tickHandle = setTimeout(() => {
        render();
        scheduleTick();
      }, wait);
    }

    function start(){
      if (state.running) return;
      state.running = true;
      state.startEpochMs = Date.now();
      render();
      scheduleTick();
    }

    function stop(){
      if (!state.running) return;
      state.elapsedMs = nowElapsedMs();
      state.running = false;
      state.startEpochMs = null;
      if (tickHandle) { clearTimeout(tickHandle); tickHandle = null; }
      render();
    }

    function toggleStartStop(){ state.running ? stop() : start(); }

    function reset(){
      state.running = false;
      state.startEpochMs = null;
      state.elapsedMs = 0;
      if (tickHandle) { clearTimeout(tickHandle); tickHandle = null; }
      render();
    }

    startBtn.addEventListener("click", (e)=>{ e.stopPropagation(); start(); });
    stopBtn.addEventListener("click",  (e)=>{ e.stopPropagation(); stop(); });
    resetBtn.addEventListener("click", (e)=>{ e.stopPropagation(); reset(); });

    // ===================== Click/Tap on main area toggles Start/Stop =====================
    function isExcludedTarget(target){
      const t = target;
      return (
        t.closest(".controls") ||
        t.closest(".theme-panel") ||
        t.closest(".theme-toggle") ||
        t.closest(".theme-chip") ||
        t.closest(".theme-close")
      );
    }

    sceneEl.addEventListener("pointerup", (ev)=>{
      if (isExcludedTarget(ev.target)) return;
      toggleStartStop();
    });

    document.addEventListener("keydown", (e)=>{
      if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
        e.preventDefault();
        toggleStartStop();
      }
    });

    // ===================== THEME SWITCH =====================
    const themeDefs = [
      { id: "default",   label: "ミッドナイト", swatch: "linear-gradient(135deg,#6b7dff 0%,#b794f6 100%)" },
      { id: "midnight",  label: "深夜の青紫", swatch: "linear-gradient(135deg,#6b7dff 0%,#b794f6 100%)" },
      { id: "aurora",    label: "オーロラ", swatch: "linear-gradient(135deg,#10f5c4 0%,#ff6ec7 100%)" },
      { id: "coral",     label: "コーラル", swatch: "linear-gradient(135deg,#ff7f6e 0%,#4ecdc4 100%)" },
      { id: "lavender",  label: "ラベンダー", swatch: "linear-gradient(135deg,#b08bf2 0%,#7ec8e3 100%)" },
      { id: "emerald",   label: "エメラルド", swatch: "linear-gradient(135deg,#52c893 0%,#f4c430 100%)" },
      { id: "rosegold",  label: "ローズゴールド", swatch: "linear-gradient(135deg,#f8b4c0 0%,#eab676 100%)" },
      { id: "arctic",    label: "アークティック", swatch: "linear-gradient(135deg,#c0f3ff 0%,#a7cfdf 100%)" }
    ];

    const rootEl   = document.documentElement;
    const panelEl  = document.getElementById("themePanel");
    const toggleEl = document.getElementById("themeToggle");
    const closeEl  = document.getElementById("themeClose");
    const listEl   = document.getElementById("themeList");

    function applyTheme(id){
      if (id === "default") rootEl.removeAttribute("data-theme");
      else rootEl.setAttribute("data-theme", id);
      try { localStorage.setItem(THEME_KEY, id); } catch (_) {}

      listEl.querySelectorAll(".theme-chip").forEach(chip => {
        chip.classList.toggle("active", chip.dataset.themeId === id);
      });

      // Update Three.js colors
      if (typeof updateThemeColors !== 'undefined') {
        updateThemeColors(id);
      }
    }

    function loadTheme(){
      try {
        const id = localStorage.getItem(THEME_KEY);
        if (id) return id;
      } catch (_) {}
      return "default";
    }

    function buildThemeList(){
      const frag = document.createDocumentFragment();
      themeDefs.forEach(theme => {
        const chip = document.createElement("button");
        chip.type = "button";
        chip.className = "theme-chip";
        chip.dataset.themeId = theme.id;

        const swatch = document.createElement("span");
        swatch.className = "theme-chip-swatch";
        swatch.style.background = theme.swatch;

        const label = document.createElement("span");
        label.textContent = theme.label;

        chip.appendChild(swatch);
        chip.appendChild(label);

        chip.addEventListener("click", (e)=>{
          e.stopPropagation();
          applyTheme(theme.id);
        });

        frag.appendChild(chip);
      });
      listEl.innerHTML = "";
      listEl.appendChild(frag);
    }

    buildThemeList();
    applyTheme(loadTheme());

    toggleEl.addEventListener("click", (e)=>{
      e.stopPropagation();
      const showing = panelEl.style.display === "block";
      panelEl.style.display = showing ? "none" : "block";
    });

    closeEl.addEventListener("click", (e)=>{
      e.stopPropagation();
      panelEl.style.display = "none";
    });

    document.addEventListener("click", (event)=>{
      if (
        panelEl.style.display === "block" &&
        !panelEl.contains(event.target) &&
        event.target !== toggleEl
      ) {
        panelEl.style.display = "none";
      }
    });

    // ===================== INIT =====================
    initThreeJS();
    
    render();

    renderNowTime();
    scheduleNowTime();

    document.addEventListener("visibilitychange", ()=>{
      if (!document.hidden) {
        render();
        scheduleTick();
        renderNowTime();
        scheduleNowTime();
      }
    });
  </script>
</body>
</html>
