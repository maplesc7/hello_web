<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello World</title>
  <style>
    :root {
      --bg-1: #f9f7f1;
      --bg-2: #d9e8ff;
      --bg-3: #ffcdb8;
      --text: #111319;
      --muted: #5a6070;
      --glass: rgba(255, 255, 255, 0.58);
      --border: rgba(255, 255, 255, 0.8);
      --shadow: 0 24px 60px rgba(20, 24, 38, 0.18);
      --accent: #0f766e;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      font-family: "Space Grotesk", "Noto Sans JP", "Segoe UI", sans-serif;
      color: var(--text);
      background: radial-gradient(1200px 800px at 10% 10%, var(--bg-2), transparent 60%),
                  radial-gradient(1000px 700px at 90% 85%, var(--bg-3), transparent 55%),
                  linear-gradient(140deg, var(--bg-1), #eef3ff 35%, #fff2ea);
      overflow: hidden;
    }

    body {
      display: grid;
      place-items: center;
      padding: 24px;
      position: relative;
      isolation: isolate;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(3px);
      opacity: 0.55;
      z-index: -1;
      animation: float 14s ease-in-out infinite;
    }

    .orb.a {
      width: 300px;
      aspect-ratio: 1;
      background: #7dd3fc;
      top: -80px;
      left: -90px;
    }

    .orb.b {
      width: 260px;
      aspect-ratio: 1;
      background: #fca5a5;
      bottom: -100px;
      right: -70px;
      animation-delay: -4s;
    }

    .orb.c {
      width: 170px;
      aspect-ratio: 1;
      background: #86efac;
      top: 8%;
      right: 15%;
      animation-delay: -8s;
    }

    .card {
      width: min(700px, 100%);
      border: 1px solid var(--border);
      background: var(--glass);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: clamp(28px, 5vw, 56px);
      transform: translateY(12px);
      opacity: 0;
      animation: rise 900ms cubic-bezier(.2,.8,.2,1) forwards;
    }

    .label {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      letter-spacing: .12em;
      text-transform: uppercase;
      font-size: .72rem;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 8px rgba(15, 118, 110, 0.12);
      animation: pulse 2.2s ease-out infinite;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 4.6rem);
      line-height: 1.02;
      letter-spacing: -0.03em;
      margin-bottom: 12px;
      text-wrap: balance;
    }

    h1 span {
      background: linear-gradient(90deg, #0f172a, #1d4ed8 45%, #0f766e 85%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    p {
      color: var(--muted);
      font-size: clamp(0.98rem, 2.3vw, 1.2rem);
      line-height: 1.75;
      max-width: 52ch;
    }

    .footer {
      margin-top: 28px;
      font-size: .8rem;
      color: #6b7280;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    @keyframes rise {
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @keyframes float {
      0%, 100% {
        transform: translate3d(0, 0, 0);
      }
      50% {
        transform: translate3d(0, -20px, 0);
      }
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.16);
      }
    }

    @media (max-width: 480px) {
      body {
        overflow: auto;
      }

      .card {
        border-radius: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="orb a"></div>
  <div class="orb b"></div>
  <div class="orb c"></div>

  <main class="card" role="main" aria-label="Hello World">
    <div class="label"><span class="dot" aria-hidden="true"></span> Single File Experience</div>
    <h1><span>Hello, World.</span></h1>
    <p>
      最小構成なのに、洗練された印象を持つ 1 ページ。<br />
      HTML・CSS だけで、軽やかなモーションとガラス質感を持つデザインに仕上げています。
    </p>
    <div class="footer">HTML / CSS only</div>
  </main>
</body>
</html>
