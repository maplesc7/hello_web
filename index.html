<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>hello_web | README Sync Portal</title>
  <style>
    :root {
      --bg-0: #0b1220;
      --bg-1: #0f1b34;
      --bg-2: #13274c;
      --glass: rgba(255, 255, 255, 0.12);
      --glass-strong: rgba(255, 255, 255, 0.18);
      --line: rgba(194, 229, 255, 0.26);
      --text: #eaf4ff;
      --muted: #b6cbe1;
      --chip: rgba(122, 230, 255, 0.2);
      --accent: #5be7ff;
      --accent-2: #7bffb6;
      --shadow: 0 22px 48px rgba(0, 0, 0, 0.35);
      --inset: inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100dvh;
      color: var(--text);
      font-family: Inter, "Noto Sans JP", ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: radial-gradient(1200px 700px at -10% 110%, #294b77 0%, transparent 50%),
                  radial-gradient(800px 500px at 110% -20%, #1f3f67 0%, transparent 50%),
                  linear-gradient(145deg, var(--bg-2), var(--bg-1) 48%, var(--bg-0));
      overflow-x: hidden;
    }

    .wrap {
      width: min(1120px, calc(100% - 28px));
      margin: 22px auto 28px;
      display: grid;
      gap: 14px;
    }

    .glass {
      border: 1px solid var(--line);
      background: linear-gradient(135deg, var(--glass-strong), var(--glass));
      backdrop-filter: blur(16px) saturate(140%);
      -webkit-backdrop-filter: blur(16px) saturate(140%);
      box-shadow: var(--shadow), var(--inset);
      border-radius: 16px;
    }

    .hero {
      padding: 18px;
      display: grid;
      gap: 12px;
    }

    .title {
      font-size: clamp(1.1rem, 2.2vw, 1.6rem);
      font-weight: 700;
      letter-spacing: .02em;
    }

    .sub {
      color: var(--muted);
      font-size: .95rem;
      line-height: 1.55;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    button, .btn-link {
      border: 1px solid var(--line);
      background: linear-gradient(140deg, rgba(91, 231, 255, 0.26), rgba(123, 255, 182, 0.2));
      color: var(--text);
      font: inherit;
      border-radius: 11px;
      padding: 8px 12px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .layout {
      display: grid;
      grid-template-columns: 1.1fr .9fr;
      gap: 14px;
    }

    .pane {
      min-height: 420px;
      padding: 14px;
      display: grid;
      gap: 10px;
      align-content: start;
    }

    .pane h2 {
      margin: 0;
      font-size: 1rem;
      letter-spacing: .02em;
    }

    .muted { color: var(--muted); font-size: .85rem; }

    .md {
      display: grid;
      gap: 10px;
      line-height: 1.7;
      font-size: 0.95rem;
      word-break: break-word;
    }

    .md h1, .md h2, .md h3 { margin: 12px 0 2px; line-height: 1.3; }
    .md h1 { font-size: 1.2rem; }
    .md h2 { font-size: 1.05rem; }
    .md h3 { font-size: 0.98rem; }
    .md ul { margin: 0; padding-left: 1.2rem; }
    .md p { margin: 0; }
    .md code {
      background: rgba(0,0,0,.3);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 7px;
      padding: 0 6px;
      font-family: ui-monospace, Menlo, Consolas, monospace;
      font-size: .88em;
    }
    .md a { color: #95ecff; }

    .cards {
      display: grid;
      gap: 8px;
    }

    .card {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.07);
      border-radius: 12px;
      padding: 10px;
      display: grid;
      gap: 6px;
    }

    .card .name { font-weight: 700; }
    .card .desc { color: var(--muted); font-size: .9rem; }
    .card .links { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      border: 1px solid var(--line);
      background: var(--chip);
      border-radius: 999px;
      font-size: .78rem;
      padding: 4px 8px;
      color: #dcf8ff;
    }

    .raw {
      margin: 0;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(0,0,0,.24);
      color: #d8ebff;
      padding: 10px;
      max-height: 260px;
      overflow: auto;
      font-family: ui-monospace, Menlo, Consolas, monospace;
      font-size: .83rem;
      line-height: 1.55;
      display: none;
      white-space: pre-wrap;
    }

    .status {
      justify-self: start;
      font-size: .8rem;
      color: #d6f6ff;
      border: 1px solid rgba(255,255,255,.2);
      padding: 5px 9px;
      border-radius: 999px;
      background: rgba(0,0,0,.24);
    }

    @media (max-width: 920px) {
      .layout { grid-template-columns: 1fr; }
      .pane { min-height: auto; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero glass">
      <div class="title">hello_web README Sync Portal</div>
      <div class="sub">このページは <code>README.md</code> を読み込み、内容を自動反映します。READMEだけ更新しても、ここで機能説明とリンク導線を維持できます（グラスモーフィズムのデモも兼用）。</div>
      <div class="actions">
        <button id="reloadBtn" type="button">🔄 READMEを再読込</button>
        <button id="toggleRawBtn" type="button">🧾 Raw Markdown表示</button>
        <a class="btn-link" href="./README.md" target="_blank" rel="noreferrer noopener">📄 README.md を開く</a>
      </div>
      <div id="status" class="status">Loading…</div>
    </section>

    <section class="layout">
      <article class="pane glass">
        <h2>README Preview</h2>
        <div class="muted">見やすいHTML表示（簡易Markdownパーサ）</div>
        <div id="mdView" class="md"></div>
        <pre id="rawView" class="raw"></pre>
      </article>

      <aside class="pane glass">
        <h2>Tools & Links</h2>
        <div class="muted">READMEの「いま入っているもの」から抽出</div>
        <div id="cards" class="cards"></div>
      </aside>
    </section>
  </main>

  <script>
    const README_PATH = './README.md';
    const statusEl = document.getElementById('status');
    const mdViewEl = document.getElementById('mdView');
    const rawViewEl = document.getElementById('rawView');
    const cardsEl = document.getElementById('cards');
    const reloadBtn = document.getElementById('reloadBtn');
    const toggleRawBtn = document.getElementById('toggleRawBtn');

    function escapeHtml(text) {
      return text.replace(/[&<>"']/g, (ch) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
    }

    function inlineFormat(text) {
      const escaped = escapeHtml(text);
      const withCode = escaped.replace(/`([^`]+)`/g, '<code>$1</code>');
      return withCode.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" rel="noreferrer noopener">$1</a>');
    }

    function markdownToHtml(markdown) {
      const lines = markdown.split('\n');
      let html = '';
      let inList = false;

      const closeList = () => {
        if (inList) {
          html += '</ul>';
          inList = false;
        }
      };

      for (const line of lines) {
        if (/^###\s+/.test(line)) {
          closeList();
          html += `<h3>${inlineFormat(line.replace(/^###\s+/, ''))}</h3>`;
          continue;
        }
        if (/^##\s+/.test(line)) {
          closeList();
          html += `<h2>${inlineFormat(line.replace(/^##\s+/, ''))}</h2>`;
          continue;
        }
        if (/^#\s+/.test(line)) {
          closeList();
          html += `<h1>${inlineFormat(line.replace(/^#\s+/, ''))}</h1>`;
          continue;
        }
        if (/^\s*-\s+/.test(line)) {
          if (!inList) {
            html += '<ul>';
            inList = true;
          }
          html += `<li>${inlineFormat(line.replace(/^\s*-\s+/, ''))}</li>`;
          continue;
        }

        closeList();
        if (line.trim() === '') {
          html += '<p></p>';
        } else {
          html += `<p>${inlineFormat(line)}</p>`;
        }
      }

      closeList();
      return html;
    }

    function extractTools(markdown) {
      const lines = markdown.split('\n');
      const tools = [];
      let i = 0;
      while (i < lines.length) {
        const m = lines[i].match(/^\s*-\s+`([^`]+)`\/?\s*$/);
        if (!m) { i += 1; continue; }

        const tool = { name: m[1], desc: [], links: [] };
        i += 1;
        while (i < lines.length && /^\s{2,}-\s+/.test(lines[i])) {
          const item = lines[i].replace(/^\s{2,}-\s+/, '').trim();
          tool.desc.push(item);
          const u = item.match(/https?:\/\/[^\s)]+/g);
          if (u) tool.links.push(...u);
          i += 1;
        }
        tools.push(tool);
      }
      return tools;
    }

    function renderCards(tools) {
      if (!tools.length) {
        cardsEl.innerHTML = '<div class="card"><div class="name">No tools found</div><div class="desc">READMEの箇条書き構造を確認してください。</div></div>';
        return;
      }

      cardsEl.innerHTML = tools.map((tool) => {
        const desc = tool.desc.slice(0, 2).map((d) => `<div class="desc">${inlineFormat(d)}</div>`).join('');
        const links = [...new Set(tool.links)].map((u) => `<a class="chip" href="${u}" target="_blank" rel="noreferrer noopener">公開ページ</a>`).join('');
        const local = `<a class="chip" href="./${tool.name.replace(/\/$/, '')}/">./${tool.name}</a>`;
        return `<section class="card"><div class="name">${escapeHtml(tool.name)}</div>${desc}<div class="links">${local}${links}</div></section>`;
      }).join('');
    }

    async function loadReadme() {
      statusEl.textContent = 'Loading README…';
      try {
        const res = await fetch(`${README_PATH}?t=${Date.now()}`, { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const markdown = await res.text();

        mdViewEl.innerHTML = markdownToHtml(markdown);
        rawViewEl.textContent = markdown;
        renderCards(extractTools(markdown));
        statusEl.textContent = `README synced (${new Date().toLocaleTimeString('ja-JP')})`;
      } catch (error) {
        mdViewEl.innerHTML = '<p>READMEの読み込みに失敗しました。静的ホスティングで同一ディレクトリ配信されているか確認してください。</p>';
        cardsEl.innerHTML = '';
        statusEl.textContent = `Load failed: ${error.message}`;
      }
    }

    reloadBtn.addEventListener('click', loadReadme);
    toggleRawBtn.addEventListener('click', () => {
      rawViewEl.style.display = rawViewEl.style.display === 'block' ? 'none' : 'block';
    });

    loadReadme();
  </script>
</body>
</html>
